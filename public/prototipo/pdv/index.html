<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Premium Pizzas — PDV / Operação</title>
<style>
  :root{
    --laranja:#ff6000; --laranja2:#ff8534; --escuro:#161310; --escuro2:#211c17;
    --cartao:#fffaf5; --texto:#2a241e; --suave:#8a7f73; --verde:#1faa59; --vermelho:#e23b3b; --azul:#2b7de9; --roxo:#7a5cff; --amarelo:#e2a800;
    --linha:#e7dccf; --bg:#efe7dd; --sombra:0 6px 20px rgba(120,60,0,.10);
  }
  *{box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif;}
  html,body{margin:0; background:var(--bg); color:var(--texto); height:100%;}
  header{background:linear-gradient(160deg,var(--escuro),var(--escuro2)); color:#fff; padding:9px 18px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:30;}
  header img{height:30px;}
  header .tag{background:var(--laranja); color:#fff; font-weight:800; font-size:11px; padding:3px 9px; border-radius:20px;}
  header .nav{display:flex; gap:6px; margin-left:8px;}
  header .nav button{background:rgba(255,255,255,.10); border:none; color:#fff; padding:8px 16px; border-radius:10px; font-weight:800; font-size:13.5px; cursor:pointer;}
  header .nav button.on{background:var(--laranja);}
  header .rel{margin-left:auto; font-weight:700; font-size:14px; opacity:.9;}
  .wrap{padding:14px;}
  .btn{border:none; border-radius:10px; padding:10px 14px; font-weight:800; cursor:pointer; font-size:13.5px; transition:.12s;}
  .btn:active{transform:scale(.97);}
  .btn-laranja{background:var(--laranja); color:#fff;} .btn-verde{background:var(--verde); color:#fff;}
  .btn-escuro{background:var(--escuro); color:#fff;} .btn-azul{background:var(--azul); color:#fff;}
  .btn-claro{background:#fff; color:var(--texto); border:1.5px solid var(--linha);}
  .btn:disabled{background:#e3d8ca; color:#aa9f92; cursor:not-allowed;}
  .btn-sm{padding:7px 11px; font-size:12.5px;} .btn-bloco{display:block; width:100%; padding:13px; font-size:15px; border-radius:11px;}
  input,select,textarea{border:1.5px solid var(--linha); border-radius:10px; padding:10px 12px; font-size:14px; background:#fff; color:var(--texto); font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--laranja);}

  /* ===== DELIVERY: barra + quadro ===== */
  .topbar{display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap;}
  .topbar .btn-novo{font-size:16px; padding:13px 22px; border-radius:12px;}
  .entrando-strip{background:#fff; border:1px solid var(--linha); border-radius:12px; padding:10px; margin-bottom:12px; box-shadow:var(--sombra);}
  .entrando-strip .es-tit{font-weight:800; font-size:13px; margin-bottom:8px; display:flex; align-items:center; gap:6px;}
  .es-cards{display:flex; gap:10px; overflow-x:auto;}
  .es-card{min-width:230px; border:1px solid var(--linha); border-left:4px solid var(--laranja); border-radius:10px; padding:9px 11px; background:var(--cartao);}
  .es-card .canal{font-weight:800; font-size:10.5px; color:#fff; padding:1px 7px; border-radius:8px;}
  .es-card .cli{font-weight:800; font-size:13.5px; margin:4px 0 2px;}
  .es-card .it{color:var(--suave); font-size:11.5px; line-height:1.3;}

  .board{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
  @media(max-width:1000px){ .board{grid-template-columns:1fr 1fr;} }
  @media(max-width:620px){ .board{grid-template-columns:1fr;} }
  .coluna{background:#fff; border-radius:13px; box-shadow:var(--sombra); display:flex; flex-direction:column; min-height:120px;}
  .col-head{padding:11px 13px; font-weight:800; font-size:13.5px; border-bottom:1px solid var(--linha); display:flex; align-items:center; gap:7px; border-radius:13px 13px 0 0;}
  .col-head .pt{width:10px; height:10px; border-radius:50%;}
  .col-head .n{margin-left:auto; background:var(--linha); color:#6b6055; font-size:12px; padding:1px 8px; border-radius:10px;}
  .col-body{padding:10px; display:flex; flex-direction:column; gap:9px;}
  .card{border:1px solid var(--linha); border-radius:11px; padding:10px 11px; background:var(--cartao);}
  .card .topo{display:flex; align-items:center; gap:6px; font-size:11.5px; margin-bottom:4px;}
  .card .num{font-weight:800;} .card .canal{font-weight:800; font-size:10px; color:#fff; padding:1px 6px; border-radius:7px;}
  .card .tempo{margin-left:auto; color:var(--suave);}
  .card .cli{font-weight:800; font-size:14px;}
  .card .det{color:var(--suave); font-size:12px; line-height:1.35; margin:2px 0;}
  .card .obs{color:var(--vermelho); font-size:11.5px; font-weight:700;}
  .card .pg{display:inline-block; font-size:10.5px; font-weight:700; color:#6b6055; background:#f1e9de; padding:1px 7px; border-radius:7px; margin-top:3px;}
  .card .moto{font-size:11.5px; font-weight:700; color:var(--azul); margin-top:3px;}
  .card .val{font-weight:800; color:var(--laranja);}
  .card .acoes{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;}
  .card .link{background:none; border:none; color:var(--suave); font-size:11.5px; cursor:pointer; padding:2px 4px; text-decoration:underline;}
  .vazio{color:var(--suave); text-align:center; padding:18px 8px; font-size:12.5px;}

  /* ===== SALÃO ===== */
  .mesas{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;}
  .mesa{background:#fff; border:2px solid var(--linha); border-radius:14px; padding:16px 12px; text-align:center; cursor:pointer; box-shadow:var(--sombra); transition:.12s;}
  .mesa:active{transform:scale(.97);}
  .mesa.ocupada{border-color:var(--laranja); background:#fff6ee;}
  .mesa .m-num{font-size:30px; font-weight:800; line-height:1;}
  .mesa .m-lbl{font-size:12px; color:var(--suave); margin-top:4px; font-weight:700;}
  .mesa.ocupada .m-lbl{color:var(--laranja);}
  .mesa .m-tot{font-weight:800; color:var(--laranja); margin-top:4px; font-size:14px;}

  /* ===== ADMIN ===== */
  .admin-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:820px){ .admin-grid{grid-template-columns:1fr;} }
  .painel{background:#fff; border-radius:13px; box-shadow:var(--sombra); padding:15px 16px;}
  .painel h3{margin:0 0 12px; font-size:16px; display:flex; align-items:center; gap:8px;}
  .linha-cfg{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .linha-cfg label{flex:1; font-weight:700; font-size:13.5px;}
  .linha-cfg input{width:90px;}
  .lista-row{display:flex; align-items:center; gap:10px; padding:9px 11px; border:1px solid var(--linha); border-radius:10px; margin-bottom:8px;}
  .lista-row .nome{flex:1; font-weight:700; font-size:13.5px;}
  .lista-row .del{background:none; border:none; color:var(--vermelho); cursor:pointer; font-size:16px;}
  .add-row{display:flex; gap:8px; margin-top:6px;}
  .add-row input{flex:1;}
  .toggle{position:relative; width:46px; height:26px; border-radius:20px; background:#cdbfae; cursor:pointer; transition:.15s; flex-shrink:0;}
  .toggle.on{background:var(--verde);}
  .toggle::after{content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.15s;}
  .toggle.on::after{left:23px;}
  .itens-pausa{max-height:320px; overflow-y:auto;}
  .pausa-row{display:flex; align-items:center; gap:10px; padding:7px 4px; border-bottom:1px solid var(--linha);}
  .pausa-row .nome{flex:1; font-size:13.5px; font-weight:600;}
  .pausa-row .nome.off{color:var(--vermelho); text-decoration:line-through;}
  .badge-pausado{font-size:10px; font-weight:800; color:var(--vermelho); background:#ffe3e3; padding:1px 7px; border-radius:7px;}

  /* ===== MODAIS ===== */
  .fundo{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50; display:none; align-items:center; justify-content:center; padding:14px;}
  .fundo.show{display:flex;}
  .modal{background:var(--bg); border-radius:16px; width:100%; max-width:720px; max-height:94vh; display:flex; flex-direction:column; overflow:hidden;}
  .modal.estreito{max-width:430px;}
  .m-top{background:#fff; padding:13px 18px; display:flex; align-items:center; border-bottom:1px solid var(--linha);}
  .m-top h3{margin:0; font-size:17px;}
  .m-top .fechar{margin-left:auto; background:none; border:none; font-size:24px; color:var(--suave); cursor:pointer;}
  .m-body{padding:16px 18px; overflow-y:auto;}
  .m-foot{background:#fff; padding:12px 18px; border-top:1px solid var(--linha); display:flex; align-items:center; gap:10px;}
  .m-foot .preco{font-size:21px; font-weight:800; color:var(--laranja); margin-right:auto;}
  .secao-tit{font-weight:800; font-size:13px; color:#564d42; margin:14px 0 7px;}
  .busca{display:flex; gap:8px;} .busca input{flex:1;}
  .cli-box{background:var(--cartao); border:1px solid var(--linha); border-radius:11px; padding:11px 13px;}
  .cli-box .nome{font-weight:800; font-size:15px;} .cli-box .meta{color:var(--suave); font-size:12.5px; margin-top:2px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .chips{display:flex; flex-wrap:wrap; gap:7px;}
  .chip{border:1.5px solid var(--linha); background:#fff; border-radius:18px; padding:8px 13px; font-size:13px; font-weight:700; cursor:pointer; color:#6b6055;}
  .chip.on{background:var(--escuro); color:#fff; border-color:var(--escuro);}
  .chip.lar.on{background:var(--laranja); border-color:var(--laranja);}
  .chip.rem{text-decoration:line-through; opacity:.6;}
  .chip.add-on{background:var(--verde); color:#fff; border-color:var(--verde);}
  .chip:disabled,.chip.pausado{opacity:.45; cursor:not-allowed; text-decoration:line-through;}
  .item{display:flex; gap:10px; padding:9px; border:1px solid var(--linha); border-radius:10px; margin-bottom:7px; align-items:center; background:#fff;}
  .item .mini{flex-shrink:0;} .item .info{flex:1; min-width:0;}
  .item .i-nome{font-weight:800; font-size:13.5px;} .item .i-det{color:var(--suave); font-size:12px; line-height:1.3;}
  .item .i-obs{color:var(--vermelho); font-size:11.5px; font-weight:700;}
  .item .i-preco{font-weight:800; color:var(--laranja); white-space:nowrap;}
  .item .x{background:none; border:none; color:var(--suave); cursor:pointer; font-size:16px;}
  .add-linha{display:flex; gap:8px;} .add-linha .btn{flex:1;}
  .totais{background:var(--escuro); color:#fff; border-radius:11px; padding:12px 14px; margin-top:6px;}
  .totais .l{display:flex; justify-content:space-between; font-size:13px; color:#d9cfc4; padding:2px 0;}
  .totais .t{display:flex; justify-content:space-between; font-size:19px; font-weight:800; border-top:1px solid rgba(255,255,255,.15); margin-top:5px; padding-top:7px;}
  .seg{display:flex; gap:8px; flex-wrap:wrap;}
  .seg button{flex:1; min-width:120px; border:1.5px solid var(--linha); background:#fff; border-radius:10px; padding:11px; font-weight:800; cursor:pointer; color:#6b6055;}
  .seg button.on{background:var(--laranja); color:#fff; border-color:var(--laranja);}
  .campo{display:block; font-weight:800; font-size:12.5px; margin:14px 0 6px; color:#564d42;}
  .pz-preview{display:flex; align-items:center; gap:14px; background:#fff; border:1px solid var(--linha); border-radius:12px; padding:12px; margin-bottom:6px;}
  .pz-preview .desc{font-size:13px; color:var(--suave); line-height:1.4;} .pz-preview .desc b{color:var(--texto);}
  .moto-pick{display:flex; flex-direction:column; gap:8px;}
  .mc-cab{display:flex; align-items:center; justify-content:space-between; background:var(--cartao); border:1px solid var(--linha); border-radius:10px; padding:8px 11px; margin-bottom:8px; font-size:13px; font-weight:700;}
  .qx{width:26px; height:26px; border-radius:50%; border:1.5px solid var(--linha); background:#fff; font-weight:800; cursor:pointer; color:var(--laranja);}
  .servico-row{display:flex; align-items:center; gap:8px; margin-top:10px; font-size:13px; font-weight:700; color:#564d42;}
  .rodada-tag{display:inline-block; font-size:10px; font-weight:800; color:#fff; background:var(--azul); padding:1px 7px; border-radius:7px; margin-left:6px;}
  .pg-linha{display:flex; gap:8px; align-items:center; margin-bottom:7px;}
  .pg-linha select{flex:1;}
  .pg-resumo{font-size:13px; color:#564d42; margin-top:8px; font-weight:600;}
  .grupo-tit{font-weight:800; font-size:12.5px; color:var(--laranja); margin:12px 0 4px; position:sticky; top:0; background:#fff; padding:3px 0;}
  .salao-box{background:#fff; border:1px solid var(--linha); border-left:5px solid var(--roxo); border-radius:13px; box-shadow:var(--sombra); padding:12px 14px; margin-top:14px;}
  .salao-box .sb-tit{font-weight:800; font-size:14px; color:var(--roxo); margin-bottom:9px;}
  .sb-cards{display:flex; gap:10px; flex-wrap:wrap;}
  .sb-card{min-width:170px; border:1px solid var(--linha); border-radius:10px; padding:9px 11px; background:var(--cartao); cursor:pointer;}
  .sb-card .sb-mesa{font-weight:800; color:var(--roxo);}
  .sb-card .sb-itens{color:var(--suave); font-size:12px; line-height:1.4; margin-top:3px;}
  .toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--escuro); color:#fff; padding:12px 22px; border-radius:30px; font-weight:700; z-index:200; opacity:0; transition:.3s; box-shadow:0 8px 24px rgba(0,0,0,.3);}
  .toast.show{opacity:1; bottom:30px;}
</style>
</head>
<body>
<header>
  <img src="logo.png" alt="Premium">
  <span class="tag">PDV</span>
  <div class="nav">
    <button id="nav-delivery" class="on" onclick="switchView('delivery')">🛵 Delivery / Retirada</button>
    <button id="nav-salao" onclick="switchView('salao')">🍽️ Salão</button>
    <button id="nav-admin" onclick="switchView('admin')">⚙️ Administrativo</button>
  </div>
  <span class="rel" id="relogio"></span>
</header>

<div class="wrap" id="wrap"></div>

<!-- MODAL: novo pedido / editar -->
<div class="fundo" id="modal-pedido" onclick="if(event.target===this)fecharPedido()">
  <div class="modal">
    <div class="m-top"><h3 id="mp-titulo">Novo pedido</h3><button class="fechar" onclick="fecharPedido()">×</button></div>
    <div class="m-body" id="mp-body"></div>
    <div class="m-foot"><span class="preco" id="mp-total">R$ 0,00</span>
      <button class="btn btn-claro" onclick="fecharPedido()">Cancelar</button>
      <button class="btn btn-verde" id="mp-confirma" onclick="lancarPedido()">Lançar pedido</button>
    </div>
  </div>
</div>

<!-- MODAL: comanda de mesa -->
<div class="fundo" id="modal-comanda" onclick="if(event.target===this)fecharComanda()">
  <div class="modal estreito">
    <div class="m-top"><h3 id="mc-titulo">Mesa</h3><button class="fechar" onclick="fecharComanda()">×</button></div>
    <div class="m-body" id="mc-body"></div>
    <div class="m-foot"><span class="preco" id="mc-total">R$ 0,00</span>
      <button class="btn btn-verde" id="mc-fechar" onclick="abrirFecharConta()">Fechar conta</button>
    </div>
  </div>
</div>

<!-- MODAL: montar pizza -->
<div class="fundo" id="modal-pizza" onclick="if(event.target===this)fecharModalPizza()">
  <div class="modal">
    <div class="m-top"><h3>Montar pizza</h3><button class="fechar" onclick="fecharModalPizza()">×</button></div>
    <div class="m-body" id="mpz-body"></div>
    <div class="m-foot"><span class="preco" id="mpz-preco">R$ 0,00</span>
      <button class="btn btn-claro" onclick="fecharModalPizza()">Cancelar</button>
      <button class="btn btn-laranja" id="mpz-add" onclick="confirmarPizza()">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL: bebida -->
<div class="fundo" id="modal-bebida" onclick="if(event.target===this)fecharModalBebida()">
  <div class="modal estreito">
    <div class="m-top"><h3>Bebidas</h3><button class="fechar" onclick="fecharModalBebida()">×</button></div>
    <div class="m-body" id="mb-body"></div>
  </div>
</div>

<!-- MODAL: escolher motoboy -->
<div class="fundo" id="modal-moto" onclick="if(event.target===this)fecharMoto()">
  <div class="modal estreito">
    <div class="m-top"><h3>🛵 Qual motoboy vai levar?</h3><button class="fechar" onclick="fecharMoto()">×</button></div>
    <div class="m-body" id="mmoto-body"></div>
  </div>
</div>

<!-- MODAL: fechar conta (pagamento) -->
<div class="fundo" id="modal-pg" onclick="if(event.target===this)fecharPg()">
  <div class="modal estreito">
    <div class="m-top"><h3>Forma de pagamento</h3><button class="fechar" onclick="fecharPg()">×</button></div>
    <div class="m-body" id="mpg-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="cloud.js"></script>
<script>

const DOCES = {

function corSabor(s){ s=normaliza(s||"");
  if(/nutella|ferrero/.test(s))return"#4a2c1a"; if(/chocolate ao leite|sonho|diamante|prestigio/.test(s))return"#6b4226";

function precoBordaPizza(p){ if(!p.bordaId||p.bordaId==='sem')return 0; const t=tipoBorda(p); return Math.max(precoBordaSabor(t,p.bordaSabEsq),precoBordaSabor(t,p.bordaSabDir||p.bordaSabEsq)); }
function precoPizza(p){ let base; if(p.tamanho==="Pequena") base=p.sabores[0]?precoSabor(p.sabores[0],"Pequena"):0;
  else{ const a=p.sabores[0]?precoSabor(p.sabores[0],"Grande"):0; const b=p.sabores[1]?precoSabor(p.sabores[1],"Grande"):a; base=(a+b)/2; }
  base+=precoBordaPizza(p); base+=(p.adicionais?p.adicionais.length:0)*PRECO_ADICIONAL; return base; }
function precoItem(it){ return it.tipo==='pizza'?precoPizza(it):it.preco; }
function pgPago(pags){ return (pags||[]).reduce((s,x)=>s+(+x.valor||0),0); }

function subtotalItens(itens){ return (itens||[]).reduce((s,i)=>s+precoItem(i)*(i.qtd||1),0); }
function freteDe(p){ if(!p||p.canal!=='delivery')return 0; const r=raios.find(x=>x.nome===p.raio)||raios[0]||{taxa:0}; return r.taxa; }
function descontoDe(p,sub){ if(!p||!p.cupom||!CUPONS[p.cupom])return{desc:0,frete:false}; const c=CUPONS[p.cupom];
  if(c.tipo==='pct')return{desc:sub*c.v/100,frete:false}; if(c.tipo==='valor')return{desc:c.v,frete:false}; if(c.tipo==='frete')return{desc:0,frete:true}; return{desc:0,frete:false}; }
function totalDe(p){ const sub=subtotalItens(p.itens); const d=descontoDe(p,sub); const frete=d.frete?0:freteDe(p); const serv=p.servicoSalao?sub*0.1:0; return Math.max(0,sub-d.desc)+frete+serv; }

function pedidoFake(canal){
  const tam=Math.random()<0.65?"Grande":"Pequena"; const ks=Object.keys(SALGADOS).filter(n=>!pausado('pizza',n));
  const s1=escolha(ks); const meio=tam==="Grande"&&Math.random()<0.45; const sabores=meio?[s1,escolha(ks)]:[s1];
  const bId=escolha(["sem","sem","vulcao","pao","trad"]); const tipo=BORDA_OPCOES.find(b=>b.id===bId).tipo; const bSab=bId==='sem'?null:escolha(BORDA_SABORES[tipo]);
  const pizza={tipo:'pizza',tamanho:tam,sabores,bordaId:bId,bordaSabEsq:bSab,bordaSabDir:bSab,massa:"Tradicional",adicionais:[],remover:[],obs:Math.random()<0.25?escolha(["Bem assada","Sem cebola"]):"",qtd:1};
  const itens=[pizza]; if(Math.random()<0.5)itens.push({tipo:'bebida',...escolha(BEBIDAS),qtd:1});
  const nomes=["Ana","Bruno","Carla","Diego","Elaine","João","Lia","Marcos","Paula"];
  return {id:++seq,idu:uid(),canal,cliente:escolha(nomes)+" "+escolha(["S.","M.","R.","L."]),tel:"(17) 9"+Math.floor(1000+Math.random()*8999)+"-"+Math.floor(1000+Math.random()*8999),
    end:"Rua "+escolha(["das Flores","Brasil","XV","São João"])+", "+Math.floor(10+Math.random()*900),regiao:escolha(["Centro","Zona Sul","Jardim"]),
    itens,raio:escolha(raios).nome,pagamento:escolha(["dinheiro","credito","pixchave"]),obs:""};

let ENTREG_CLOUD=[], _unidCloud=null;
async function unidCloud(){ if(!_unidCloud)_unidCloud=await PZCLOUD.unidade(); return _unidCloud; }
function bordaIdDeTipo(tipo,sab){ if(!tipo)return 'sem'; if(tipo==='Vulcão')return 'vulcao'; if(tipo==='Pãozinho')return 'pao'; if(tipo==='Caracol')return 'caracol'; if(tipo==='Tradicional')return (sab&&sab!=='Sem recheio')?'trad':'sem'; return 'sem'; }
function cloudParaPedido(c){ return { id:c.numero, idu:c.id, cloudId:c.id, canal:c.canal, tipo:c.tipo||'delivery', status:c.status,
    cliente:c.cliente_nome, tel:c.cliente_tel||'', end:c.endereco_txt||'', regiao:'—', raio:(raios[0]||{}).nome,
    itens:(c.pedido_itens||[]).map(i=> i.tipo==='pizza'
      ? {tipo:'pizza',tamanho:i.tamanho,sabores:i.sabores||[],bordaId:bordaIdDeTipo(i.borda_tipo,i.borda_sabor_esq),bordaSabEsq:i.borda_sabor_esq,bordaSabDir:i.borda_sabor_dir,adicionais:[],remover:[],obs:i.obs||'',qtd:i.qtd||1}
      : {tipo:'bebida',nome:i.produto_nome,ico:'🥤',preco:+i.preco,qtd:i.qtd||1}),
    pagamentos:(c.pedido_pagamentos||[]).map(g=>({forma:g.forma,valor:+g.valor})), cupom:'', obs:c.obs||'', motoboy:null }; }
function pedidoParaCloudItens(p){ return (p.itens||[]).map(it=>({ tipo:it.tipo,
    tamanho: it.tipo==='pizza'?it.tamanho:null,
    sabores: it.tipo==='pizza'?(it.tamanho==='Pequena'?[it.sabores[0]]:(it.sabores||[]).filter(Boolean)):null,
    borda_tipo: (it.tipo==='pizza'&&it.bordaId&&it.bordaId!=='sem')?(BORDA_OPCOES.find(b=>b.id===it.bordaId)||{}).tipo:null,
    borda_sabor_esq: (it.tipo==='pizza'&&it.bordaId&&it.bordaId!=='sem')?it.bordaSabEsq:null,
    borda_sabor_dir: (it.tipo==='pizza'&&it.bordaId&&it.bordaId!=='sem')?it.bordaSabDir:null,
    produto_nome: it.tipo==='bebida'?it.nome:null,
    obs: it.tipo==='pizza'?(it.obs||null):null,
    qtd: it.qtd||1, preco: precoItem(it) })); }
async function enviarPedidoCloud(p){ try{ const u=await unidCloud();
    const cCanal=(p.canal==='salao')?'salao':((['site','app','ifood','pdv'].includes(p.canal))?p.canal:'pdv');
    const cTipo=(p.canal==='salao')?'salao':((p.canal==='delivery'||p.canal==='retirada')?p.canal:(p.tipo||'delivery'));
    const novo=(await PZCLOUD.post('pedidos',[{unidade_id:u.id,canal:cCanal,tipo:cTipo,status:p.status||'preparo',etapa:(p.status==='preparo'?'abertura':null),cliente_nome:p.cliente||'Balcão',cliente_tel:p.tel||'',endereco_txt:p.end||'',total:totalDe(p),obs:p.obs||''}]))[0];
    p.cloudId=novo.id; p.id=novo.numero;
    const its=pedidoParaCloudItens(p).map(i=>({...i,pedido_id:novo.id})); if(its.length) await PZCLOUD.post('pedido_itens',its,'return=minimal');
    const pgs=(p.pagamentos&&p.pagamentos.length?p.pagamentos:[{forma:p.pagamento||'dinheiro',valor:totalDe(p)}]).map(g=>({pedido_id:novo.id,forma:g.forma,valor:g.valor})); if(pgs.length) await PZCLOUD.post('pedido_pagamentos',pgs,'return=minimal');
    return novo.id; }catch(e){ console.warn('enviarPedidoCloud',e.message); toast('⚠ nuvem: '+e.message.slice(0,45)); } }
async function mirrorStatus(p,campos){ if(!p||!p.cloudId)return; try{ await PZCLOUD.patch('pedidos','id=eq.'+p.cloudId,campos); }catch(e){ console.warn('mirror',e.message); } }
async function lancarFinanceiroCloud(p){ if(!p||!p.cloudId)return; try{ const u=await unidCloud();
   const ja=await PZCLOUD.get('lancamentos_financeiros?pedido_id=eq.'+p.cloudId+'&select=id'); if(ja.length)return;
   const pgs=(p.pagamentos&&p.pagamentos.length?p.pagamentos:[{forma:p.pagamento||'dinheiro',valor:totalDe(p)}]);
   await PZCLOUD.post('lancamentos_financeiros',pgs.map(g=>({unidade_id:u.id,tipo:'entrada',origem:'pedido',pedido_id:p.cloudId,forma:g.forma,valor:g.valor,pago:true,categoria:'Venda',grupo_dre:'Faturamento'})),'return=minimal'); }catch(e){ console.warn('fin',e.message); } }
async function puxarEntrando(){ try{ const u=await unidCloud();
   const cs=await PZCLOUD.get(`pedidos?unidade_id=eq.${u.id}&status=eq.recebido&canal=in.(site,app,ifood)&select=*,pedido_itens(*),pedido_pagamentos(*)&order=criado_em.asc`);

    ${bSabs.length?`<label class="campo">Recheio da borda <span style="font-weight:600;color:var(--suave)">(toque 1, ou 2 da mesma categoria p/ meio a meio · cobra o mais caro)</span></label><div class="chips">${bSabs.map(s=>pausado('borda',s)?`<div class="chip pausado">${s} (pausado)</div>`:`<div class="chip ${p.bordaSabEsq===s||p.bordaSabDir===s?'on':''}" onclick="setBordaSab('${s.replace(/'/g,"\\'")}')">${s} · ${brl(precoBordaSabor(bTipo,s))}</div>`).join("")}</div>`:""}
    ${ings.length?`<label class="campo">Remover ingrediente</label><div class="chips">${ings.map(ing=>`<div class="chip ${p.remover.includes(ing)?'rem':''}" onclick="toggleRemover('${ing.replace(/'/g,"\\'")}')">${ing}</div>`).join("")}</div>`:""}
    <label class="campo">Adicionar ingrediente <span style="font-weight:600;color:var(--suave)">(+${brl(PRECO_ADICIONAL)} cada)</span></label><div class="chips">${ADICIONAIS.map(a=>`<div class="chip ${p.adicionais.includes(a)?'add-on':''}" onclick="toggleAdicional('${a.replace(/'/g,"\\'")}')">${p.adicionais.includes(a)?'✓ ':'+ '}${a}</div>`).join("")}</div>
    <label class="campo">Observação</label><input id="mpz-obs" placeholder="Ex: bem assada" value="${p.obs||""}" oninput="pzEdit.obs=this.value" style="width:100%">`;
  $("mpz-preco").textContent=brl(precoPizza(p)); $("mpz-add").disabled=!p.sabores[0];
}
function setTam(t){ pzEdit.tamanho=t; if(t==="Pequena")pzEdit.sabores=[pzEdit.sabores[0]]; else if(pzEdit.sabores.length<2)pzEdit.sabores=[pzEdit.sabores[0],null]; renderModalPizza(); }
function setSab(i,v){ pzEdit.sabores[i]=v||null; pzEdit.remover=[]; renderModalPizza(); }
function setBorda(id){ pzEdit.bordaId=id; if(id==='sem'){pzEdit.bordaSabEsq="Sem recheio";pzEdit.bordaSabDir="Sem recheio";}else{pzEdit.bordaSabEsq=null;pzEdit.bordaSabDir=null;} renderModalPizza(); }
function setBordaSab(s){ const p=pzEdit; if(!p.bordaSabEsq||p.bordaSabEsq==='Sem recheio'){p.bordaSabEsq=s;p.bordaSabDir=s;}else if(p.bordaSabDir===p.bordaSabEsq&&p.bordaSabEsq!==s){p.bordaSabDir=s;}else{p.bordaSabEsq=s;p.bordaSabDir=s;} renderModalPizza(); }
function toggleRemover(ing){ const a=pzEdit.remover,i=a.indexOf(ing); if(i<0)a.push(ing);else a.splice(i,1); renderModalPizza(); }
function toggleAdicional(ad){ const a=pzEdit.adicionais,i=a.indexOf(ad); if(i<0)a.push(ad);else a.splice(i,1); renderModalPizza(); }
function confirmarPizza(){ if(!pzEdit.sabores[0]){toast("Escolha 1 sabor");return;} if(pzEdit.tamanho==="Pequena")pzEdit.sabores=[pzEdit.sabores[0]]; itensAlvo.push(JSON.parse(JSON.stringify(pzEdit))); fecharModalPizza(); reRenderItens(); toast("Pizza adicionada 🍕"); }

/* MODAL bebida */
function abrirModalBebida(){ $("mb-body").innerHTML=BEBIDAS.map((b,i)=>{ const off=pausado('bebida',b.nome); return `<div class="item" style="${off?'opacity:.5':'cursor:pointer'}" ${off?'':`onclick="addBebida(${i})"`}><div class="mini" style="font-size:22px;width:38px;text-align:center">${b.ico}</div><div class="info"><div class="i-nome">${b.nome}${off?' <span class="badge-pausado">PAUSADO</span>':''}</div></div><div class="i-preco">${brl(b.preco)}</div></div>`; }).join(""); $("modal-bebida").classList.add("show"); }
function fecharModalBebida(){ $("modal-bebida").classList.remove("show"); }
function addBebida(i){ const b=BEBIDAS[i]; const ex=itensAlvo.find(x=>x.tipo==='bebida'&&x.nome===b.nome); if(ex)ex.qtd++; else itensAlvo.push({tipo:'bebida',nome:b.nome,ico:b.ico,preco:b.preco,qtd:1}); fecharModalBebida(); reRenderItens(); toast(b.nome+" adicionada"); }

/* =========================================================================
   PAINEL SALÃO — 14 mesas / comandas
   ========================================================================= */
function renderSalao(){
  const cards=mesas.map(m=>{
    const oc=m.comanda&&m.comanda.itens.length>=0&&m.comanda.aberta;
    const tot=oc?subtotalItens(m.comanda.itens):0;
    return `<div class="mesa ${oc?'ocupada':''}" onclick="abrirMesa(${m.n})"><div class="m-num">${m.n}</div><div class="m-lbl">${oc?(m.comanda.itens.length+' item(ns)'):'Livre'}</div>${oc?`<div class="m-tot">${brl(tot)}</div>`:'<div class="m-lbl">🍽️ toque p/ abrir</div>'}</div>`;
  }).join("");
  $("wrap").innerHTML=`<div class="topbar"><h2 style="margin:0;font-size:19px">🍽️ Salão — comandas das mesas</h2><div style="margin-left:auto;color:var(--suave);font-size:13px">${mesas.filter(m=>m.comanda&&m.comanda.aberta).length} mesa(s) ocupada(s) de 14</div></div><div class="mesas">${cards}</div>`;
}
function abrirMesa(n){ mesaAtual=n; const m=mesas.find(x=>x.n===n); if(!m.comanda||!m.comanda.aberta){ m.comanda={aberta:true,itens:[],abertaEm:Date.now(),pessoas:2,rodada:1,servico:false}; salvar(); }
  const c=m.comanda; if(c.pessoas==null)c.pessoas=2; if(c.rodada==null)c.rodada=1; if(c.servico==null)c.servico=false;
  itensAlvo=c.itens; reRenderItens=renderComanda; $("modal-comanda").classList.add("show"); renderComanda(); }
function fecharComanda(){ $("modal-comanda").classList.remove("show"); render(); }
function totalMesa(c){ const s=subtotalItens(c.itens); return s+(c.servico?s*0.1:0); }
function renderComanda(){
  const m=mesas.find(x=>x.n===mesaAtual); const c=m.comanda;
  const idx=(it)=>c.itens.indexOf(it);
  const novos=c.itens.filter(i=>!i.lancado), lancados=c.itens.filter(i=>i.lancado);
  const sub=subtotalItens(c.itens); const serv=c.servico?sub*0.1:0;
  $("mc-titulo").textContent="Mesa "+m.n;
  $("mc-body").innerHTML=`
    <div class="mc-cab">
      <div>👥 Pessoas: <button class="qx" onclick="setPessoas(-1)">−</button> <b>${c.pessoas}</b> <button class="qx" onclick="setPessoas(1)">+</button></div>
      <div style="color:var(--suave);font-weight:600">aberta há ${Math.max(0,Math.round((Date.now()-c.abertaEm)/60000))} min</div>
    </div>
    <div class="add-linha" style="margin-bottom:8px"><button class="btn btn-laranja" onclick="abrirModalPizza()">🍕 + Pizza</button><button class="btn btn-claro" onclick="abrirModalBebida()">🥤 + Bebida</button></div>
    <div class="secao-tit">🆕 A lançar${novos.length?' ('+novos.length+')':''}</div>
    <div>${novos.length?novos.map(it=>itemHTML(it,idx(it))).join(""):'<div class="vazio">Adicione itens e clique em “Lançar pedido”.</div>'}</div>
    ${novos.length?`<button class="btn btn-azul btn-bloco" onclick="lancarRodada()">🍳 Lançar pedido (manda pra cozinha)</button>`:""}
    ${lancados.length?`<div class="secao-tit">✅ Já na cozinha</div><div>${lancados.map(it=>`<div style="position:relative">${itemHTML(it,idx(it))}<span class="rodada-tag" style="position:absolute;top:9px;right:34px">rodada ${it.rodada||1}</span></div>`).join("")}</div>`:""}
    <div class="servico-row"><div class="toggle ${c.servico?'on':''}" onclick="toggleServico()"></div> Incluir taxa de serviço 10%</div>
    <div class="totais"><div class="l"><span>Subtotal</span><span>${brl(sub)}</span></div>${c.servico?`<div class="l"><span>Serviço 10%</span><span>${brl(serv)}</span></div>`:""}<div class="t"><span>Total</span><span>${brl(sub+serv)}</span></div>${c.pessoas>1?`<div class="l"><span>Por pessoa (${c.pessoas})</span><span>${brl((sub+serv)/c.pessoas)}</span></div>`:""}</div>
    <div class="add-linha" style="margin-top:10px"><button class="btn btn-claro" onclick="imprimirComanda()">🖨️ Comanda cozinha</button><button class="btn btn-claro" onclick="imprimirConta()">🧾 Pré-conta</button></div>`;
  $("mc-total").textContent=brl(sub+serv);
  $("mc-fechar").disabled=!c.itens.length;
}
function setPessoas(d){ const c=mesas.find(x=>x.n===mesaAtual).comanda; c.pessoas=Math.max(1,(c.pessoas||1)+d); salvar(); renderComanda(); }
function toggleServico(){ const c=mesas.find(x=>x.n===mesaAtual).comanda; c.servico=!c.servico; salvar(); renderComanda(); }
function lancarRodada(){
  const c=mesas.find(x=>x.n===mesaAtual).comanda; const novos=c.itens.filter(i=>!i.lancado); if(!novos.length)return;
  novos.forEach(i=>{ i.lancado=true; i.rodada=c.rodada; }); c.rodada=(c.rodada||1)+1; salvar(); renderComanda();
  toast("Rodada lançada pra cozinha 🍳 (Mesa "+mesaAtual+")");
}
/* ---- IMPRESSÃO (comanda cozinha + pré-conta) ---- */
function imprimirDoc(corpo){
  const w=window.open('','_print','width=380,height=640');
  if(!w){ toast("Permita pop-ups pra imprimir 🖨️"); return; }
  w.document.write(`<html><head><title>Premium Pizzas</title><style>*{font-family:'Courier New',monospace;color:#000} body{width:280px;margin:0 auto;padding:8px;font-size:13px} h2{font-size:16px;text-align:center;margin:4px 0} .c{text-align:center} .b{font-weight:bold} hr{border:none;border-top:1px dashed #000;margin:6px 0} .row{display:flex;justify-content:space-between} .it{margin:4px 0} .obs{font-size:12px;font-style:italic}</style></head><body>${corpo}<scr`+`ipt>window.onload=function(){window.print();}<\/scr`+`ipt></body></html>`);
  w.document.close();
}
function linhaPizzaTxt(it){
  const sab=it.tamanho==='Pequena'?it.sabores[0]:(!it.sabores[1]||it.sabores[0]===it.sabores[1]?it.sabores[0]:it.sabores[0]+' / '+it.sabores[1]);
  const bN=BORDA_OPCOES.find(b=>b.id===it.bordaId)||{}; const bTxt=it.bordaId==='sem'?'sem borda':bN.nome+(it.bordaSabEsq&&it.bordaSabEsq!=='Sem recheio'?' ('+it.bordaSabEsq+(it.bordaSabDir&&it.bordaSabDir!==it.bordaSabEsq?'/'+it.bordaSabDir:'')+')':'');
  const ex=[]; if(it.adicionais&&it.adicionais.length)ex.push('+ '+it.adicionais.join(', ')); if(it.remover&&it.remover.length)ex.push('SEM '+it.remover.join(', '));
  return `<div class="it">${it.qtd>1?it.qtd+'x ':''}PIZZA ${it.tamanho.toUpperCase()} — ${sab}<br>Borda: ${bTxt}${ex.length?'<br><span class="obs">'+ex.join(' | ')+'</span>':''}${it.obs?'<br><span class="obs">OBS: '+it.obs+'</span>':''}</div>`;
}
function imprimirComanda(){
  const m=mesas.find(x=>x.n===mesaAtual); const c=m.comanda;
  const linhas=c.itens.map(it=>it.tipo==='pizza'?linhaPizzaTxt(it):`<div class="it">${it.qtd>1?it.qtd+'x ':''}${it.nome}</div>`).join("");
  imprimirDoc(`<h2>COMANDA COZINHA</h2><div class="c b">MESA ${m.n}</div><div class="c">${new Date().toLocaleString('pt-BR')}</div><hr>${linhas||'<div class="c">vazia</div>'}<hr><div class="c">** ${c.itens.length} item(ns) **</div>`);
}
function imprimirConta(){
  const m=mesas.find(x=>x.n===mesaAtual); const c=m.comanda; const sub=subtotalItens(c.itens); const serv=c.servico?sub*0.1:0; const tot=sub+serv;
  const linhas=c.itens.map(it=>`<div class="row it"><span>${it.qtd>1?it.qtd+'x ':''}${it.tipo==='pizza'?'Pizza '+it.tamanho:it.nome}</span><span>${brl(precoItem(it)*(it.qtd||1))}</span></div>`).join("");
  imprimirDoc(`<h2>Premium Pizzas</h2><div class="c">PRE-CONTA (nao e cupom fiscal)</div><div class="c b">MESA ${m.n} · ${c.pessoas} pessoa(s)</div><div class="c">${new Date().toLocaleString('pt-BR')}</div><hr>${linhas}<hr><div class="row"><span>Subtotal</span><span>${brl(sub)}</span></div>${c.servico?`<div class="row"><span>Servico 10%</span><span>${brl(serv)}</span></div>`:''}<div class="row b" style="font-size:15px"><span>TOTAL</span><span>${brl(tot)}</span></div>${c.pessoas>1?`<div class="row"><span>Por pessoa</span><span>${brl(tot/c.pessoas)}</span></div>`:''}<hr><div class="c obs">Obrigado pela preferencia!</div>`);
}

/* MODAL fechar conta da mesa — com pagamento dividido */
let contaPagamentos=[];
function abrirFecharConta(){ const m=mesas.find(x=>x.n===mesaAtual); contaAlvo={n:m.n}; contaPagamentos=[{forma:'dinheiro',valor:+totalMesa(m.comanda).toFixed(2)}]; abrirPg(); }
function abrirPg(){ renderPg(); $("modal-pg").classList.add("show"); }
function fecharPg(){ $("modal-pg").classList.remove("show"); }
function renderPg(){
  const m=mesas.find(x=>x.n===contaAlvo.n); const c=m.comanda; const sub=subtotalItens(c.itens); const total=totalMesa(c); const pago=pgPago(contaPagamentos); const rest=+(total-pago).toFixed(2);
  $("mpg-body").innerHTML=`
    <div style="font-weight:800;font-size:17px;margin-bottom:2px">Mesa ${m.n} · Total ${brl(total)}</div>
    ${c.servico?`<div style="font-size:12px;color:var(--suave);margin-bottom:4px">(subtotal ${brl(sub)} + serviço 10% ${brl(sub*0.1)})</div>`:""}
    <p style="margin:0 0 10px;color:var(--suave);font-size:12.5px">Pode dividir em formas e valores diferentes.</p>
    <div class="chips" style="margin-bottom:8px">${FORMAS_PG.map(f=>`<div class="chip lar" onclick="cpgQuick('${f.id}')">${f.ico} ${f.nome}</div>`).join("")}</div>
    ${contaPagamentos.map((pg,i)=>`<div class="pg-linha"><select onchange="cpgForma(${i},this.value)">${FORMAS_PG.map(f=>`<option value="${f.id}" ${pg.forma===f.id?'selected':''}>${f.ico} ${f.nome}</option>`).join("")}</select><input type="number" step="0.01" value="${pg.valor}" onchange="cpgValor(${i},this.value)" style="width:110px">${contaPagamentos.length>1?`<button class="x" onclick="cpgDel(${i})">✕</button>`:""}</div>`).join("")}
    <button class="btn btn-claro btn-sm" onclick="cpgAdd()" style="margin-top:4px">+ Dividir / adicionar forma</button>
    <div class="pg-resumo">Pago: <b>${brl(pago)}</b> de ${brl(total)} ${rest>0.01?`· falta <b style="color:var(--vermelho)">${brl(rest)}</b>`:(rest<-0.01?`· troco <b style="color:var(--verde)">${brl(-rest)}</b>`:'· ✓ certo')}</div>
    <button class="btn btn-verde btn-bloco" style="margin-top:12px" ${pago<total-0.01?'disabled':''} onclick="confirmarConta()">✓ Fechar conta da Mesa ${m.n}</button>`;
}
function cpgQuick(f){ const m=mesas.find(x=>x.n===contaAlvo.n); contaPagamentos=[{forma:f,valor:+totalMesa(m.comanda).toFixed(2)}]; renderPg(); }
function cpgAdd(){ const m=mesas.find(x=>x.n===contaAlvo.n); const rest=+(totalMesa(m.comanda)-pgPago(contaPagamentos)).toFixed(2); contaPagamentos.push({forma:'dinheiro',valor:rest>0?rest:0}); renderPg(); }
function cpgForma(i,v){ contaPagamentos[i].forma=v; renderPg(); }
function cpgValor(i,v){ contaPagamentos[i].valor=parseFloat((v||'').toString().replace(',','.'))||0; renderPg(); }
function cpgDel(i){ contaPagamentos.splice(i,1); renderPg(); }
function confirmarConta(){
  const m=mesas.find(x=>x.n===contaAlvo.n); const c=m.comanda;
  const ped={id:++seq,idu:uid(),canal:"salao",tipo:"salao",cliente:"Mesa "+m.n,tel:"",end:"",itens:c.itens,cupom:"",pagamentos:JSON.parse(JSON.stringify(contaPagamentos)),obs:"",status:"concluido",mesa:m.n,servicoSalao:c.servico,pessoas:c.pessoas};
  pedidos.unshift(ped); m.comanda=null; salvar(); fecharPg(); fecharComanda();
  (async()=>{ const id=await enviarPedidoCloud(ped); if(id) lancarFinanceiroCloud(ped); })();
  toast("Conta da Mesa "+ped.mesa+" fechada ("+brl(totalDe(ped))+") ✓");
}

/* =========================================================================
   PAINEL ADMIN
   ========================================================================= */
function renderAdmin(){
  const pizzas=[...Object.keys(SALGADOS),...Object.keys(DOCES)];
  const pausaRow=(tipo,n)=>`<div class="pausa-row"><span class="nome ${pausado(tipo,n)?'off':''}">${n}</span>${pausado(tipo,n)?'<span class="badge-pausado">PAUSADO</span>':''}<div class="toggle ${pausado(tipo,n)?'':'on'}" onclick="togglePausa('${tipo}','${n.replace(/'/g,"\\'")}')"></div></div>`;
  $("wrap").innerHTML=`<div class="admin-grid">
    <div class="painel"><h3>⏱️ Prazos</h3>
      <div class="linha-cfg"><label>Prazo de entrega (min)</label><input type="number" id="cfg-entrega" value="${config.prazoEntrega}"></div>
      <div class="linha-cfg"><label>Prazo de retirada (min)</label><input type="number" id="cfg-retirada" value="${config.prazoRetirada}"></div>
      <button class="btn btn-laranja" onclick="salvarPrazos()">Salvar prazos</button>
    </div>
    <div class="painel"><h3>🛵 Motoboys</h3>
      ${motoboys.map((m,i)=>`<div class="lista-row"><span class="nome">${m.nome}</span><button class="del" onclick="delMotoboy(${i})">🗑️</button></div>`).join("")||'<div class="vazio">Nenhum motoboy.</div>'}
      <div class="add-row"><input id="novo-moto" placeholder="Nome do motoboy" onkeydown="if(event.key==='Enter')addMotoboy()"><button class="btn btn-verde" onclick="addMotoboy()">+ Adicionar</button></div>
    </div>
    <div class="painel"><h3>📍 Raios de entrega e taxas</h3>
      ${raios.map((r,i)=>`<div class="lista-row"><span class="nome">${r.nome}</span><span style="font-weight:800;color:var(--laranja)">${brl(r.taxa)}</span><button class="del" onclick="delRaio(${i})">🗑️</button></div>`).join("")||'<div class="vazio">Nenhum raio.</div>'}
      <div class="add-row"><input id="novo-raio-nome" placeholder="Ex: Até 3 km"><input id="novo-raio-taxa" type="number" placeholder="Taxa" style="width:90px"><button class="btn btn-verde" onclick="addRaio()">+</button></div>
    </div>
    <div class="painel"><h3>⏸️ Pausar itens do cardápio</h3>
      <p style="margin:0 0 8px;color:var(--suave);font-size:12.5px">Itens pausados não podem ser pedidos (acabou o insumo, etc.). Inclui pizzas, bordas e bebidas.</p>
      <div class="itens-pausa">
        <div class="grupo-tit">🍕 Pizzas</div>${pizzas.map(n=>pausaRow('pizza',n)).join("")}
        <div class="grupo-tit">🌋 Bordas (recheios)</div>${BORDA_TODOS_SABORES.map(n=>pausaRow('borda',n)).join("")}
        <div class="grupo-tit">🥤 Bebidas</div>${BEBIDAS.map(b=>pausaRow('bebida',b.nome)).join("")}
      </div>
    </div>
  </div>`;
}
function salvarPrazos(){ config.prazoEntrega=+$("cfg-entrega").value||45; config.prazoRetirada=+$("cfg-retirada").value||20; salvar(); toast("Prazos salvos ✓"); }
function addMotoboy(){ const n=$("novo-moto").value.trim(); if(!n)return; motoboys.push({nome:n}); salvar(); renderAdmin(); toast("Motoboy adicionado"); }
function delMotoboy(i){ motoboys.splice(i,1); salvar(); renderAdmin(); }
function addRaio(){ const n=$("novo-raio-nome").value.trim(), t=+$("novo-raio-taxa").value; if(!n||isNaN(t))return; raios.push({nome:n,taxa:t}); salvar(); renderAdmin(); toast("Raio adicionado"); }
function delRaio(i){ raios.splice(i,1); salvar(); renderAdmin(); }
function togglePausa(tipo,n){ const k=tipo+':'+n; if(pausados.has(k))pausados.delete(k); else pausados.add(k); salvar(); renderAdmin(); }

/* ---- START ---- */
render();
(async()=>{ try{ ENTREG_CLOUD=await PZCLOUD.get('entregadores?select=id,nome'); }catch(e){ console.warn(e.message); }
  puxarEntrando(); setInterval(puxarEntrando,5000); })();
</script>
</body>
</html>
