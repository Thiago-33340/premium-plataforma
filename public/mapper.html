<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Titan Command Center</title>
  <style>
    :root{
      --bg:#08080a; --panel:#111116; --panel2:#17171d; --panel3:#1d1d24; --line:#2b2b34;
      --txt:#f7f7f8; --mut:#aaaab5; --mut2:#747481;
      --orange:#ff6a00; --orange2:#ff922b; --green:#45d483; --red:#ff5a68;
      --yellow:#f8c84e; --blue:#61a8ff; --violet:#a78bfa; --cyan:#67e8f9;
      --shadow:0 22px 90px rgba(0,0,0,.42);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;color:var(--txt);font:14px/1.45 Inter,Segoe UI,system-ui,-apple-system,sans-serif;background:
      radial-gradient(circle at 12% -4%,rgba(255,106,0,.27),transparent 30%),
      radial-gradient(circle at 92% 4%,rgba(97,168,255,.14),transparent 28%),
      linear-gradient(180deg,#09090b,#070708 58%,#0c0c0f)}
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .wrap{max-width:1500px;margin:0 auto;padding:22px}
    .top{position:sticky;top:0;z-index:10;margin:-22px -22px 18px;padding:18px 22px;background:rgba(8,8,10,.78);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07)}
    .topRow{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}
    .brand{display:flex;align-items:center;gap:14px;min-width:0}
    .mark{width:50px;height:50px;border-radius:18px;background:linear-gradient(135deg,var(--orange),#ffc05b);display:grid;place-items:center;color:#140800;font-size:24px;font-weight:950;box-shadow:0 12px 34px rgba(255,106,0,.28)}
    h1{font-size:31px;line-height:1.04;letter-spacing:-.045em;margin:0}
    h2{font-size:18px;letter-spacing:-.02em;margin:0}
    h3{font-size:15px;margin:0}
    .sub{color:var(--mut);margin-top:5px;max-width:860px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{border:1px solid var(--line);background:#17171d;color:var(--txt);border-radius:14px;padding:10px 13px;font-weight:850;transition:.15s ease}
    .btn:hover{border-color:#444450;transform:translateY(-1px)}
    .btn.primary{background:linear-gradient(135deg,var(--orange),var(--orange2));border-color:transparent;color:#140800}
    .btn.ghost{background:transparent}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .tabs{display:flex;gap:8px;overflow:auto;margin-top:14px;padding-bottom:2px}
    .tab{white-space:nowrap;border:1px solid var(--line);background:#111116;color:var(--mut);border-radius:999px;padding:9px 12px;font-weight:850}
    .tab.active{background:rgba(255,106,0,.13);border-color:rgba(255,106,0,.46);color:#ffd7bd}
    .grid{display:grid;gap:14px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.014)),var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}
    .pad{padding:18px}
    .kpis{grid-template-columns:repeat(6,minmax(0,1fr));margin-bottom:14px}
    .kpi strong{font-size:29px;line-height:1.05;display:block;letter-spacing:-.035em}
    .kpi span{display:block;color:var(--mut);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em}
    .kpi small{display:block;color:var(--mut2);margin-top:7px}
    .section{display:none}
    .section.active{display:block}
    .hero{display:grid;grid-template-columns:1.08fr .92fr;gap:14px;margin-bottom:14px}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .split3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .split4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .sectionTitle{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:13px}
    .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border-radius:999px;background:#1b1b22;border:1px solid var(--line);color:var(--mut);font-size:12px;font-weight:900}
    .pill.ok{color:#c5ffd9;border-color:rgba(69,212,131,.38);background:rgba(69,212,131,.09)}
    .pill.warn{color:#ffeab3;border-color:rgba(248,200,78,.4);background:rgba(248,200,78,.09)}
    .pill.bad{color:#ffc1c7;border-color:rgba(255,90,104,.38);background:rgba(255,90,104,.09)}
    .progress{height:10px;background:#24242c;border-radius:99px;overflow:hidden;margin-top:11px}
    .progress i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--orange),var(--green))}
    .list{display:flex;flex-direction:column;gap:9px}
    .item{padding:12px;border-radius:16px;background:rgba(255,255,255,.026);border:1px solid #292932}
    .item b{display:block;margin-bottom:3px}
    .item small,.mut{color:var(--mut)}
    .tag{display:inline-flex;align-items:center;margin:0 5px 5px 0;padding:4px 8px;border-radius:99px;background:#202028;border:1px solid #34343e;color:var(--mut);font-size:11px;font-weight:900}
    .tag.alta,.tag.critica,.tag.critico{color:#ffced3;border-color:rgba(255,90,104,.42);background:rgba(255,90,104,.09)}
    .tag.concluido,.tag.aceita,.tag.ok,.tag.ativo{color:#caffdc;border-color:rgba(69,212,131,.42);background:rgba(69,212,131,.09)}
    .tag.em_andamento,.tag.producao,.tag.codex{color:#cfe5ff;border-color:rgba(97,168,255,.42);background:rgba(97,168,255,.09)}
    .tag.planejado,.tag.parcial,.tag.mitigado_parcial,.tag.claude{color:#ffeab3;border-color:rgba(248,200,78,.42);background:rgba(248,200,78,.09)}
    .tag.thiago{color:#eadcff;border-color:rgba(167,139,250,.42);background:rgba(167,139,250,.09)}
    .filters{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px}
    .field{width:100%;background:#111116;color:var(--txt);border:1px solid var(--line);border-radius:14px;padding:12px 13px;outline:0}
    .field:focus{border-color:rgba(255,106,0,.55);box-shadow:0 0 0 3px rgba(255,106,0,.1)}
    .fieldLabel{display:block;color:var(--mut);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin:0 0 7px 2px}
    .formRow{display:grid;gap:10px;margin-top:14px}
    .authShell{min-height:calc(100vh - 44px);display:grid;place-items:center;padding:24px 0}
    .authCard{width:min(1060px,100%);display:grid;grid-template-columns:1fr .9fr;overflow:hidden}
    .authHero{padding:38px;background:
      radial-gradient(circle at 20% 12%,rgba(255,146,43,.35),transparent 33%),
      linear-gradient(145deg,rgba(255,106,0,.16),rgba(97,168,255,.06));border-right:1px solid var(--line)}
    .authHero h1{font-size:42px;max-width:520px}
    .authHero p{color:#d6d6de;max-width:520px}
    .authPanel{padding:32px;background:rgba(17,17,22,.92)}
    .check{display:flex;align-items:center;gap:9px;color:var(--mut);font-weight:750}
    .check input{width:17px;height:17px;accent-color:var(--orange)}
    .rules{display:grid;gap:6px;margin-top:10px}
    .rule{color:var(--mut2);font-size:12px}
    .rule.ok{color:#bfffd5}
    .userChip{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1px solid var(--line);border-radius:999px;background:#111116;color:var(--mut)}
    .userChip b{color:var(--txt)}
    .inlineActions{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
    .cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .module{padding:14px;border:1px solid #292932;border-radius:18px;background:rgba(255,255,255,.025)}
    .module h3{margin-bottom:7px}
    .bar{height:7px;background:#26262f;border-radius:99px;margin:10px 0;overflow:hidden}
    .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--blue))}
    .timeline{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
    .phase{padding:13px;border-radius:17px;background:#131318;border:1px solid #292932}
    .phase .num{width:29px;height:29px;border-radius:10px;background:#24242c;display:grid;place-items:center;color:var(--orange);font-weight:950;margin-bottom:9px}
    textarea.brief{width:100%;min-height:260px;resize:vertical;background:#0f0f13;color:#e9e9ee;border:1px solid var(--line);border-radius:18px;padding:14px;outline:0;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;line-height:1.55}
    .gate{max-width:570px;margin:10vh auto 0}
    .empty{color:var(--mut2);padding:16px;border:1px dashed #34343c;border-radius:16px;text-align:center}
    .err{color:#ffbdc4;margin-top:10px}
    .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;color:#cfd0d8}
    .callout{border-color:rgba(255,106,0,.36);background:linear-gradient(180deg,rgba(255,106,0,.1),rgba(255,106,0,.035))}
    .table{overflow:auto;border:1px solid #292932;border-radius:18px}
    table{width:100%;border-collapse:collapse;min-width:780px}
    th,td{text-align:left;border-bottom:1px solid #292932;padding:11px;vertical-align:top}
    th{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:#15151b}
    tr:last-child td{border-bottom:0}
    @media(max-width:1180px){.kpis{grid-template-columns:repeat(3,1fr)}.hero,.cols,.split3,.split4{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}.timeline{grid-template-columns:repeat(3,1fr)}.authCard{grid-template-columns:1fr}.authHero{border-right:0;border-bottom:1px solid var(--line)}}
    @media(max-width:720px){.wrap{padding:14px}.top{margin:-14px -14px 14px;padding:14px}.topRow{flex-direction:column}.actions{justify-content:flex-start}.kpis,.cards,.timeline,.filters{grid-template-columns:1fr}h1{font-size:25px}.authHero h1{font-size:30px}.authHero,.authPanel{padding:22px}.mark{width:44px;height:44px;border-radius:15px}}
  </style>
</head>
<body>
  <main class="wrap" id="app"></main>

  <script>
    const $app = document.getElementById('app');
    const API = location.origin;
    const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const fmt = d => d ? new Date(d).toLocaleString('pt-BR') : '—';
    const norm = s => String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const statusLabel = s => String(s || '—').replace(/_/g,' ');
    const pct = n => Math.max(0, Math.min(100, Number(n || 0)));
    const file = (state, name, fallback) => state.files?.[name] ?? fallback;

    let STATE = null;
    let AUTH = null;
    let TOOL_USERS = null;
    let ACCESS_MSG = '';
    let COMMAND_MSG = '';
    let DEPLOY_MSG = '';
    let ACTIVE = 'visao';
    let FILTER = { q:'', module:'', status:'', tool:'' };

    const temPerm = perm => (AUTH?.permissoes || []).includes('acesso_total') || (AUTH?.permissoes || []).includes(perm);
    const senhaOk = s => String(s || '').length >= 8 && /[A-ZÁÀÂÃÉÈÊÍÓÔÕÚÇ]/.test(s) && /\d/.test(s) && /[^A-Za-z0-9]/.test(s);

    async function apiPost(path, payload){
      const res = await fetch(`${API}${path}`, {
        method:'POST',
        credentials:'same-origin',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload || {})
      });
      const data = await res.json().catch(() => ({}));
      if(!res.ok) throw new Error(data.erro || 'Falha na comunicação com o Titan.');
      return data;
    }

    async function authMe(){
      const res = await fetch(`${API}/api/titan/auth/me`, { credentials:'same-origin' });
      return await res.json().catch(() => ({ok:false, usuario:null}));
    }

    function authShell(inner){
      $app.innerHTML = `
        <section class="authShell">
          <div class="card authCard">
            <div class="authHero">
              <div class="brand" style="margin-bottom:26px"><div class="mark">T</div><div><h2>Titan Tools</h2><div class="sub">Command Center + Mapper</div></div></div>
              <h1>Central de criação e controle do Titan.</h1>
              <p>Área técnica separada dos domínios operacionais. Entre com seu e-mail autorizado para acompanhar progresso, mapper, blindagem e próximos passos sem expor ferramentas para clientes.</p>
              <div style="margin-top:22px">
                <span class="tag ok">sessão segura</span>
                <span class="tag">primeiro acesso controlado</span>
                <span class="tag codex">permissões por e-mail</span>
              </div>
            </div>
            <div class="authPanel">${inner}</div>
          </div>
        </section>`;
    }

    function renderLogin(msg=''){
      authShell(`
        <h1>Entrar</h1>
        <div class="sub">Use o e-mail e senha cadastrados no primeiro acesso.</div>
        <div class="formRow">
          <label><span class="fieldLabel">E-mail</span><input class="field" id="loginEmail" type="email" autocomplete="email" placeholder="voce@empresa.com.br"></label>
          <label><span class="fieldLabel">Senha</span><input class="field" id="loginSenha" type="password" autocomplete="current-password" placeholder="Sua senha"></label>
          <label class="check"><input id="remember" type="checkbox"> Manter conectado neste dispositivo</label>
          <button class="btn primary" id="loginBtn">Entrar</button>
          <button class="btn ghost" id="firstBtn">Primeiro acesso</button>
          ${msg ? `<div class="err">${esc(msg)}</div>` : ''}
        </div>`);
      const entrar = async () => {
        try{
          const data = await apiPost('/api/titan/auth/login', {
            email:document.getElementById('loginEmail').value,
            senha:document.getElementById('loginSenha').value,
            remember:document.getElementById('remember').checked
          });
          AUTH = data.usuario;
          await load();
        }catch(e){ renderLogin(e.message); }
      };
      document.getElementById('loginBtn').onclick = entrar;
      document.getElementById('firstBtn').onclick = () => renderFirstAccessEmail();
      ['loginEmail','loginSenha'].forEach(id => document.getElementById(id).onkeydown = e => { if(e.key === 'Enter') entrar(); });
    }

    function renderFirstAccessEmail(msg=''){
      authShell(`
        <h1>Primeiro acesso</h1>
        <div class="sub">Informe o e-mail autorizado pelo gestor. Se ele estiver liberado, você cria sua senha na próxima etapa.</div>
        <div class="formRow">
          <label><span class="fieldLabel">E-mail autorizado</span><input class="field" id="firstEmail" type="email" autocomplete="email" placeholder="voce@empresa.com.br"></label>
          <button class="btn primary" id="continueFirst">Continuar</button>
          <button class="btn ghost" id="backLogin">Voltar ao login</button>
          ${msg ? `<div class="err">${esc(msg)}</div>` : ''}
        </div>`);
      const seguir = async () => {
        const email = document.getElementById('firstEmail').value.trim();
        try{
          const data = await apiPost('/api/titan/auth/first-access/check', { email });
          if(data.ja_configurado) return renderLogin('Este e-mail já tem senha. Use o login normal.');
          renderFirstAccessPassword(email);
        }catch(e){ renderFirstAccessEmail(e.message); }
      };
      document.getElementById('continueFirst').onclick = seguir;
      document.getElementById('backLogin').onclick = () => renderLogin();
      document.getElementById('firstEmail').onkeydown = e => { if(e.key === 'Enter') seguir(); };
    }

    function renderFirstAccessPassword(email, msg=''){
      authShell(`
        <h1>Criar senha</h1>
        <div class="sub">E-mail autorizado: <b>${esc(email)}</b>. A senha fica criptografada no banco e será usada nos próximos logins.</div>
        <div class="formRow">
          <label><span class="fieldLabel">Senha</span><input class="field" id="newPass" type="password" autocomplete="new-password" placeholder="Mínimo 8 caracteres"></label>
          <label><span class="fieldLabel">Confirmar senha</span><input class="field" id="newPass2" type="password" autocomplete="new-password" placeholder="Digite novamente"></label>
          <div class="rules" id="rules"></div>
          <label class="check"><input id="rememberFirst" type="checkbox"> Manter conectado neste dispositivo</label>
          <button class="btn primary" id="createPass" disabled>Criar senha e entrar</button>
          <button class="btn ghost" id="backFirstEmail">Trocar e-mail</button>
          ${msg ? `<div class="err">${esc(msg)}</div>` : ''}
        </div>`);
      const update = () => {
        const s = document.getElementById('newPass').value;
        const c = document.getElementById('newPass2').value;
        const rules = [
          ['8 caracteres ou mais', s.length >= 8],
          ['pelo menos 1 letra maiúscula', /[A-ZÁÀÂÃÉÈÊÍÓÔÕÚÇ]/.test(s)],
          ['pelo menos 1 número', /\d/.test(s)],
          ['pelo menos 1 símbolo', /[^A-Za-z0-9]/.test(s)],
          ['as duas senhas iguais', s && s === c]
        ];
        document.getElementById('rules').innerHTML = rules.map(r => `<div class="rule ${r[1] ? 'ok' : ''}">• ${esc(r[0])}</div>`).join('');
        document.getElementById('createPass').disabled = !(senhaOk(s) && s === c);
      };
      const criar = async () => {
        try{
          const data = await apiPost('/api/titan/auth/first-access', {
            email,
            senha:document.getElementById('newPass').value,
            confirmar:document.getElementById('newPass2').value,
            remember:document.getElementById('rememberFirst').checked
          });
          AUTH = data.usuario;
          await load();
        }catch(e){ renderFirstAccessPassword(email, e.message); }
      };
      document.getElementById('newPass').oninput = update;
      document.getElementById('newPass2').oninput = update;
      document.getElementById('createPass').onclick = criar;
      document.getElementById('backFirstEmail').onclick = () => renderFirstAccessEmail();
      update();
    }

    async function load(){
      $app.innerHTML = '<section class="card pad gate"><h1>Carregando Command Center…</h1><div class="sub">Lendo project-state, checks, riscos, tarefas e workflow dos agentes.</div></section>';
      try{
        const res = await fetch(`${API}/api/mapper/state`, { credentials:'same-origin' });
        const data = await res.json();
        if(!res.ok) throw new Error(data.erro || 'Falha ao carregar Command Center.');
        STATE = data;
        AUTH = data.usuario || AUTH;
        render();
      }catch(e){ renderLogin(e.message || 'Falha ao carregar Command Center.'); }
    }

    async function boot(){
      $app.innerHTML = '<section class="card pad gate"><h1>Carregando Titan Tools…</h1><div class="sub">Verificando sessão deste dispositivo.</div></section>';
      try{
        const me = await authMe();
        if(!me.usuario) return renderLogin();
        AUTH = me.usuario;
        await load();
      }catch(e){ renderLogin(); }
    }

    function dataPack(){
      const data = STATE || {};
      return {
        modules: file(data, 'modules.json', []),
        tasks: file(data, 'tasks.json', []),
        risks: file(data, 'risks.json', []),
        roadmap: file(data, 'roadmap.json', []),
        weekly: file(data, 'weekly-focus.json', {}),
        health: file(data, 'health-checks.json', {}),
        rbac: file(data, 'rbac-audit.json', {}),
        deploys: file(data, 'deploys.json', []),
        decisions: file(data, 'decisions.json', []),
        map: file(data, 'module-route-table-map.json', {}),
        tests: file(data, 'test-matrix.json', []),
        contracts: file(data, 'api-contracts-critical.json', []),
        workflow: file(data, 'agent-workflow.json', {}),
        routes: file(data, 'routes.json', {}),
        services: file(data, 'services.json', []),
        people: file(data, 'people.json', []),
        stockStep2: file(data, 'stock-command-step2.json', {}),
        stockReadiness: file(data, 'stock-readiness.json', {}),
        audit: file(data, 'command-audit-log.json', []),
        dbActions: file(data, 'command-db-actions.json', [])
      };
    }

    function render(){
      const p = dataPack();
      const avg = Math.round(p.modules.reduce((s,m)=>s+Number(m.progresso||0),0) / Math.max(1, p.modules.length));
      const doneTasks = p.tasks.filter(t => norm(t.status) === 'concluido').length;
      const openTasks = p.tasks.filter(t => norm(t.status) !== 'concluido').length;
      const blocked = p.tasks.filter(t => t.bloqueada).length;
      const highRisks = p.risks.filter(r => ['alta','critica'].includes(norm(r.severidade)) && !['mitigado','fechado','resolvido'].includes(norm(r.status))).length;
      const healthOk = p.health.ok === true || (Number(p.health.failed || 0) === 0 && Number(p.health.executed || 0) > 0);
      const rbacOk = p.rbac.ok !== false && Number(p.rbac.users_audited || 0) > 0;
      const lastDeploy = p.deploys[p.deploys.length - 1];
      const commandModule = p.modules.find(m => m.id === 'command-center');

      $app.innerHTML = `
        <header class="top">
          <div class="topRow">
            <div class="brand">
              <div class="mark">T</div>
              <div>
                <h1>Titan Command Center</h1>
                <div class="sub">Fonte viva: <span class="mono">project-state/*.json</span>. Acesso: ${esc(AUTH?.nome || AUTH?.email || '—')} · atualizado ${fmt(STATE.generated_at)}</div>
              </div>
            </div>
            <div class="actions">
              <div class="userChip"><span>Conta</span><b>${esc(AUTH?.email || '—')}</b></div>
              <a class="btn ghost" href="/mapper">Mapper</a>
              <a class="btn ghost" href="/admin">Admin</a>
              <a class="btn ghost" href="/estoque">Estoque</a>
              <button class="btn primary" id="refresh">Atualizar</button>
              <button class="btn ghost" id="logout">Sair</button>
            </div>
          </div>
          <nav class="tabs">${tabs().map(t => `<button class="tab ${ACTIVE === t.id ? 'active' : ''}" data-tab="${esc(t.id)}">${esc(t.label)}</button>`).join('')}</nav>
        </header>

        <section class="grid kpis">
          ${kpi('Command Center', `${pct(commandModule?.progresso)}%`, commandModule?.ambiente || 'em evolução')}
          ${kpi('Titan geral', `${avg}%`, `${p.modules.length} módulos mapeados`)}
          ${kpi('Tarefas', `${doneTasks}/${p.tasks.length}`, `${openTasks} abertas · ${blocked} bloqueadas`)}
          ${kpi('Riscos altos', highRisks, highRisks ? 'exigem decisão' : 'sem alerta alto aberto')}

          <div class="card pad">
            <div class="sectionTitle"><h2>Serviços</h2><span class="pill">${p.services.length}</span></div>
            <div class="list">${p.services.map(s => `<div class="item"><span class="tag ${esc(norm(s.status))}">${esc(s.status || '—')}</span><b>${esc(s.nome || s.id)}</b><small>${esc(s.tipo || '')} · ${esc((s.modulos || []).join(', '))}</small></div>`).join('') || empty('Sem serviços.')}</div>
          </div>
        </div>
        <div class="cols">
          <div class="card pad"><div class="sectionTitle"><h2>Páginas públicas</h2><span class="pill">${publicPages.length}</span></div><div class="list">${publicPages.map(r => routeItem(r)).join('') || empty('Sem páginas.')}</div></div>
          <div class="card pad"><div class="sectionTitle"><h2>Grupos de API</h2><span class="pill">${apiGroups.length}</span></div><div class="list">${apiGroups.map(g => `<div class="item"><span class="tag ${esc(norm(g.status))}">${esc(g.status || '—')}</span><b>${esc(g.id)}</b><small>${esc(g.module)} · ${esc(g.base)} · ${(g.routes || []).length} rotas</small></div>`).join('') || empty('Sem APIs.')}</div></div>
        </div>`;
    }

    function renderAcessos(){
      const users = TOOL_USERS || [];
      const rows = users.map(u => `<tr>
        <td><b>${esc(u.nome || '—')}</b><br><small>${esc(u.email)}</small></td>
        <td>${(u.permissoes || []).map(p => `<span class="tag ${p === 'acesso_total' ? 'ok' : ''}">${esc(p)}</span>`).join('')}</td>
        <td><span class="pill ${u.ativo ? 'ok' : 'bad'}">${u.ativo ? 'ativo' : 'inativo'}</span></td>
        <td>${u.senha_definida ? '<span class="pill ok">senha criada</span>' : '<span class="pill warn">aguarda 1º acesso</span>'}</td>
        <td><small>${fmt(u.ultimo_login_em)}</small></td>
      </tr>`).join('');
      return `
        <div class="cols" style="margin-bottom:14px">
          <div class="card pad callout">
            <div class="sectionTitle"><h2>Autorizar novo e-mail</h2><span class="pill ok">Titan Tools</span></div>
            <div class="sub">Cadastre o e-mail autorizado e escolha o nível de acesso. Depois a pessoa usa “Primeiro acesso” para criar a própria senha.</div>
            <div class="formRow">
              <label><span class="fieldLabel">Nome</span><input class="field" id="accessName" placeholder="Nome da pessoa"></label>
              <label><span class="fieldLabel">E-mail</span><input class="field" id="accessEmail" type="email" placeholder="pessoa@empresa.com.br"></label>
              <label><span class="fieldLabel">Permissão</span><select class="field" id="accessProfile">
                <option value="total">Acesso total — gestor/criador</option>
                <option value="tecnico">Command Center + Mapper</option>
              </select></label>
              <button class="btn primary" id="authorizeAccess">Autorizar e-mail</button>
              ${ACCESS_MSG ? `<div class="sub">${esc(ACCESS_MSG)}</div>` : ''}
            </div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Regras deste login</h2><span class="pill">sem senha no chat</span></div>
            <div class="list">
              <div class="item"><b>Primeiro acesso</b><small>Só funciona para e-mail previamente autorizado nesta aba ou no bootstrap seguro do servidor.</small></div>
              <div class="item"><b>Senha forte</b><small>Mínimo de 8 caracteres, com maiúscula, número e símbolo.</small></div>
              <div class="item"><b>Manter conectado</b><small>Desmarcado por padrão. Se marcado, mantém sessão por até 30 dias neste dispositivo.</small></div>
            </div>
          </div>
        </div>
        <div class="card pad">
          <div class="sectionTitle">
            <h2>Usuários autorizados</h2>
            <div class="inlineActions"><span class="pill">${users.length} registros</span><button class="btn ghost" id="reloadAccess">Recarregar</button></div>
          </div>
          ${TOOL_USERS ? `<div class="table"><table><thead><tr><th>Usuário</th><th>Permissões</th><th>Status</th><th>Primeiro acesso</th><th>Último login</th></tr></thead><tbody>${rows || '<tr><td colspan="5">Nenhum usuário autorizado.</td></tr>'}</tbody></table></div>` : empty('Carregando usuários autorizados...')}
        </div>`;
    }

    function kpi(label, value, detail){ return `<div class="card pad kpi"><span>${esc(label)}</span><strong>${esc(value)}</strong><small>${esc(detail)}</small></div>`; }
    function empty(text){ return `<div class="empty">${esc(text)}</div>`; }
    function option(value, label, selected){ return `<option value="${esc(value)}" ${selected === value ? 'selected' : ''}>${esc(label)}</option>`; }

    function nextMove(p){
      const task = p.tasks.find(t => norm(t.status) !== 'concluido' && t.prioridade === 'alta') || p.tasks.find(t => norm(t.status) !== 'concluido');
      if(!task) return empty('Sem próxima tarefa aberta.');
      return `<div class="item"><span class="tag ${esc(norm(task.prioridade))}">${esc(task.prioridade)}</span><span class="tag ${esc(norm(task.ferramenta_atuante))}">${esc(task.ferramenta_atuante || '—')}</span><b>${esc(task.titulo)}</b><small>${esc(task.proximo_passo || '')}</small></div>`;
    }

    function moduleCard(m){
      const p = pct(m.progresso);
      return `<article class="module">
        <span class="tag ${esc(norm(m.status))}">${esc(statusLabel(m.status))}</span><span class="tag ${esc(norm(m.ferramenta_atuante))}">${esc(m.ferramenta_atuante || '—')}</span>
        <h3>${esc(m.nome || m.id)}</h3>
        <small class="mut">${esc(m.id)} · ${esc(m.ambiente || '—')}</small>
        <div class="bar"><i style="width:${p}%"></i></div>
        <small class="mut">${p}% · ${esc((m.proximos_passos || [])[0] || (m.pendencias || [])[0] || '')}</small>
      </article>`;
    }

    function taskItem(t){
      return `<div class="item">
        <span class="tag ${esc(norm(t.status))}">${esc(statusLabel(t.status))}</span><span class="tag ${esc(norm(t.prioridade))}">${esc(t.prioridade)}</span>${t.bloqueada ? '<span class="tag critica">bloqueada</span>' : ''}
        <b>${esc(t.titulo || t.id)}</b>
        <small>${esc(t.modulo || '—')} · ${esc(t.ferramenta_atuante || '—')} · ${esc(t.proximo_passo || '')}</small>
      </div>`;
    }

    function riskWeight(r){ return ({critica:5, alta:4, media:2, baixa:1}[norm(r.severidade)] || 0) + (norm(r.status).includes('aberto') ? 1 : 0); }
    function riskItem(r){
      return `<div class="item">
        <span class="tag ${esc(norm(r.severidade))}">${esc(r.severidade)}</span><span class="tag ${esc(norm(r.status))}">${esc(statusLabel(r.status))}</span>
        <b>${esc(r.titulo || r.id)}</b>
        <small>${esc((r.modulos_afetados || []).join(', '))}</small>
        <small>${esc(r.mitigacao || r.impacto || '')}</small>
      </div>`;
    }

    function laneCard(l){
      return `<div class="item"><b>${esc(l.name || l.id)}</b><small><b>Codex:</b> ${esc((l.codex_focus || []).join(' · '))}</small><small><b>Claude:</b> ${esc((l.claude_focus || []).join(' · '))}</small></div>`;
    }

    function calcItem(c){
      return `<div class="item"><span class="tag ok">cálculo</span><b>${esc(c.nome || 'Regra')}</b><small>${esc(c.formula || '')}</small><small>${esc(c.impacto || '')}</small></div>`;
    }

    function achadoItem(a){
      return `<div class="item"><span class="tag ${esc(norm(a.tipo || 'achado'))}">${esc(a.tipo || 'achado')}</span><b>${esc(a.titulo || 'Achado')}</b><small>${esc(a.detalhe || '')}</small><small>${esc(a.acao || '')}</small></div>`;
    }

    function gapItem(g){
      return `<div class="item"><b>${esc(g.produto || 'Pendente')}</b><small>${esc(g.motivo || '')}</small></div>`;
    }

    function roleCard(r){
      return `<div class="item"><span class="tag ${esc(norm(r.id))}">${esc(r.name || r.id)}</span><b>${esc(r.label || '')}</b><small>${esc((r.primary_duties || []).join(' · '))}</small><small><b>Não fazer:</b> ${esc((r.must_not || []).join(' · '))}</small></div>`;
    }

    function flowItem(f){
      return `<div class="phase"><div class="num">${esc(f.step)}</div><h3>${esc(f.name)}</h3><p class="mut">${esc(f.owner)}</p><p>${esc(f.output || '')}</p></div>`;
    }

    function testItem(t){
      return `<div class="item"><span class="tag ${esc(norm(t.priority))}">${esc(t.priority)}</span><span class="tag">${esc(t.type)}</span><b>${esc(t.id)}</b><small>${esc(t.expected || '')}</small><small class="mono">${esc(t.script || '')}</small></div>`;
    }

    function contractsTable(contracts){
      if(!contracts.length) return empty('Sem contratos.');
      return `<div class="table"><table><thead><tr><th>Contrato</th><th>Rota</th><th>Permissão</th><th>Escreve</th></tr></thead><tbody>${contracts.map(c => `<tr><td><b>${esc(c.id)}</b><br><small>${esc(c.screen || '')}</small></td><td><span class="mono">${esc(c.method)} ${esc(c.path)}</span></td><td>${esc(c.permission)}</td><td>${esc((c.writes || []).join(', '))}</td></tr>`).join('')}</tbody></table></div>`;
    }

    function deployItem(d){
      return `<div class="item"><span class="tag ${esc(norm(d.status))}">${esc(d.status || '—')}</span><span class="tag ${esc(norm(d.ambiente))}">${esc(d.ambiente || '—')}</span><b>${esc(d.id || 'Deploy')}</b><small>${esc(d.data || '')} · ${esc(d.origem || '')}</small><small>${esc((d.validacoes || []).join(' · '))}</small></div>`;
    }

    function decisionItem(d){
      return `<div class="item"><span class="tag ${esc(norm(d.status))}">${esc(d.status || '—')}</span><b>${esc(d.decisao || d.id)}</b><small>${esc(d.data || '')} · ${esc((d.modulos_afetados || []).join(', '))}</small></div>`;
    }

    function auditItem(a){
      return `<div class="item"><span class="tag ok">${esc(a.action || 'ação')}</span><b>${esc(a.target_id || a.target_file || 'registro')}</b><small>${esc(a.resumo || '')}</small><small>${fmt(a.criado_em)} · ${esc(a.usuario_nome || a.usuario_email || '')}</small></div>`;
    }

    function boundaryItem(b){
      return `<div class="item"><b>${esc(b.id)}</b><small>${esc(b.rule || '')}</small><div style="margin-top:8px">${Object.entries(b).filter(([k,v]) => v && typeof v === 'object' && k !== 'id').map(([k,v]) => `<span class="tag">${esc(k)}: ${esc((v.routes || v.tables || []).slice(0,4).join(', '))}</span>`).join('')}</div></div>`;
    }

    function routeItem(r){
      return `<div class="item"><span class="tag">${esc(r.method)}</span><b>${esc(r.path)}</b><small>${esc(r.module)} · ${esc(r.target || '')}</small></div>`;
    }

    function filteredModules(modules){
      return modules.filter(m => {
        const blob = norm([m.id,m.nome,m.status,m.ferramenta_atuante,m.ambiente,(m.pendencias||[]).join(' '),(m.proximos_passos||[]).join(' ')].join(' '));
        if(FILTER.q && !blob.includes(norm(FILTER.q))) return false;
        if(FILTER.module && m.id !== FILTER.module) return false;
        if(FILTER.status && norm(m.status) !== norm(FILTER.status)) return false;
        if(FILTER.tool && m.ferramenta_atuante !== FILTER.tool) return false;
        return true;
      });
    }

    function filteredTasks(tasks){
      return tasks.filter(t => {
        const blob = norm([t.id,t.titulo,t.status,t.prioridade,t.modulo,t.ferramenta_atuante,t.proximo_passo].join(' '));
        if(FILTER.q && !blob.includes(norm(FILTER.q))) return false;
        if(FILTER.module && t.modulo !== FILTER.module) return false;
        if(FILTER.status && norm(t.status) !== norm(FILTER.status)) return false;
        if(FILTER.tool && t.ferramenta_atuante !== FILTER.tool) return false;
        return true;
      });
    }

    function bindFilters(){
      const q = document.getElementById('qFilter');
      const module = document.getElementById('moduleFilter');
      const status = document.getElementById('statusFilter');
      const tool = document.getElementById('toolFilter');
      if(!q) return;
      q.oninput = e => { FILTER.q = e.target.value; render(); };
      module.onchange = e => { FILTER.module = e.target.value; render(); };
      status.onchange = e => { FILTER.status = e.target.value; render(); };
      tool.onchange = e => { FILTER.tool = e.target.value; render(); };
    }

    function bindCommandActions(p){
      if(ACTIVE !== 'execucao' || !temPerm('editar_project_state')) return;
      const create = document.getElementById('cmdCreateAction');
      if(create) create.onclick = async () => {
        const action = document.getElementById('cmdActionType').value;
        const modulo = document.getElementById('cmdModule').value;
        const titulo = document.getElementById('cmdTitle').value;
        const detalhe = document.getElementById('cmdDetail').value;
        const prioridade = document.getElementById('cmdPriority').value;
        const categoria = document.getElementById('cmdCategory').value;
        const bloqueada = document.getElementById('cmdBlocked').checked;
        const payload = { action, titulo, modulo, prioridade, categoria, detalhe, bloqueada };
        if(action === 'create_risk'){
          payload.severidade = prioridade === 'critica' ? 'critica' : prioridade;
          payload.impacto = detalhe;
          payload.mitigacao = categoria || 'Mitigação a definir pelo Command.';
        }
        if(action === 'create_decision'){
          payload.decisao = titulo;
          payload.motivo = detalhe;
          payload.status = 'proposta';
          payload.impacto = categoria || 'Impacto a detalhar.';
        }
        try{
          const out = await apiPost('/api/mapper/action', payload);
          COMMAND_MSG = `Registrado: ${out.target?.id || 'ação'} · ${out.audit?.id || 'auditado'} · ${out.persisted_db ? 'Postgres OK' : 'Postgres pendente'}`;
          await load();
          ACTIVE = 'execucao';
        }catch(e){
          COMMAND_MSG = e.message;
          render();
        }
      };
      const update = document.getElementById('cmdUpdateTask');
      if(update) update.onclick = async () => {
        try{
          const out = await apiPost('/api/mapper/action', {
            action:'update_task',
            id:document.getElementById('cmdTaskId').value,
            status:document.getElementById('cmdTaskStatus').value,
            proximo_passo:document.getElementById('cmdTaskStep').value,
            bloqueada:document.getElementById('cmdTaskBlocked').checked
          });
          COMMAND_MSG = `Atualizado: ${out.target?.id || 'tarefa'} · ${out.audit?.id || 'auditado'} · ${out.persisted_db ? 'Postgres OK' : 'Postgres pendente'}`;
          await load();
          ACTIVE = 'execucao';
        }catch(e){
          COMMAND_MSG = e.message;
          render();
        }
      };
    }

    function bindDeployActions(p){
      if(ACTIVE !== 'deploys' || !temPerm('editar_project_state')) return;
      const btn = document.getElementById('cmdCreateDeploy');
      if(!btn) return;
      btn.onclick = async () => {
        const payload = {
          action:'create_deploy_record',
          titulo:document.getElementById('deployTitle').value,
          status:document.getElementById('deployStatus').value,
          branch:document.getElementById('deployBranch').value,
          commit:document.getElementById('deployCommit').value,
          servico:document.getElementById('deployService').value,
          dominios:document.getElementById('deployDomains').value,
          validacoes:document.getElementById('deployValidations').value,
          observacoes:document.getElementById('deployNotes').value,
          origem:'Command Center'
        };
        if(!payload.titulo){
          DEPLOY_MSG = 'Informe um título para registrar o deploy.';
          return render();
        }
        try{
          const out = await apiPost('/api/mapper/action', payload);
          DEPLOY_MSG = `Deploy registrado: ${out.target?.id || 'registro'} · ${out.audit?.id || 'auditado'} · ${out.persisted_db ? 'Postgres OK' : 'Postgres pendente'}`;
          await load();
          ACTIVE = 'deploys';
        }catch(e){
          DEPLOY_MSG = e.message;
          render();
        }
      };
    }

    async function carregarAcessos(){
      const res = await fetch(`${API}/api/titan/auth/users`, { credentials:'same-origin' });
      const data = await res.json().catch(() => ({}));
      if(!res.ok) throw new Error(data.erro || 'Falha ao carregar acessos.');
      TOOL_USERS = data.usuarios || [];
    }

    function bindAcessos(){
      if(ACTIVE !== 'acessos' || !temPerm('gerenciar_usuarios')) return;
      if(!TOOL_USERS){
        carregarAcessos().then(() => render()).catch(e => { ACCESS_MSG = e.message; TOOL_USERS = []; render(); });
        return;
      }
      const reload = document.getElementById('reloadAccess');
      if(reload) reload.onclick = async () => {
        ACCESS_MSG = '';
        TOOL_USERS = null;
        render();
      };
      const btn = document.getElementById('authorizeAccess');
      if(!btn) return;
      btn.onclick = async () => {
        const perfil = document.getElementById('accessProfile').value;
        const permissoes = perfil === 'total'
          ? ['acesso_total','command_center','mapper','ver_project_state','editar_project_state','gerenciar_usuarios']
          : ['command_center','mapper','ver_project_state'];
        try{
          await apiPost('/api/titan/auth/authorize-email', {
            nome:document.getElementById('accessName').value,
            email:document.getElementById('accessEmail').value,
            permissoes
          });
          ACCESS_MSG = 'E-mail autorizado/atualizado. A pessoa já pode usar Primeiro acesso.';
          TOOL_USERS = null;
          render();
        }catch(e){
          ACCESS_MSG = e.message;
          render();
        }
      };
    }

    function buildClaudeBrief(p){
      const open = p.tasks.filter(t => norm(t.status) !== 'concluido').slice(0,8).map(t => `- ${t.id}: ${t.titulo} [${t.modulo}/${t.prioridade}] -> ${t.proximo_passo || ''}`).join('\n');
      const risks = p.risks.slice().sort((a,b)=>riskWeight(b)-riskWeight(a)).slice(0,6).map(r => `- ${r.id}: ${r.titulo} [${r.severidade}/${r.status}] -> ${r.mitigacao || r.impacto || ''}`).join('\n');
      const wf = p.workflow.handoff_to_claude || {};
      const step2 = p.stockStep2 || {};
      const readiness = p.stockReadiness || {};
      const calculos = (step2.calculos_oficiais || []).slice(0,5).map(c => `- ${c.nome}: ${c.formula}`).join('\n');
      const aceite = (step2.criterios_de_aceite_estoque || []).slice(0,10).map(x => `- ${x}`).join('\n');
      const gaps = (readiness.remaining_recipe_gaps || []).map(g => `- ${g.produto}: ${g.motivo}`).join('\n');
      return `${wf.prompt || 'Você atua como revisor/arquiteto do Titan.'}

Missão atual:
${p.workflow.current_mission?.title || 'Entregar Titan com estoque operacional e governança.'}

Fronteiras obrigatórias:
- Novas funções de estoque: /api/est/* e tabelas est_*.
- /api/estoque/* é legado.
- Setores são dinâmicos por cliente.
- Ficha de produção interna usa est_ficha_*; ficha do cardápio é outra camada.
- Codex implementa código/UI/deploy; Claude avalia, calcula, revisa e prioriza.

Tarefas abertas principais:
${open || '- Nenhuma tarefa aberta listada.'}

Riscos principais:
${risks || '- Nenhum risco listado.'}

Passo 2 do Command:
${step2.status ? `- Status: ${step2.status}` : '- Ainda sem artefato oficial.'}
${step2.motivo ? `- Observação: ${step2.motivo}` : ''}

Cálculos/regras já materializados:
${calculos || '- Sem cálculos registrados.'}

Critérios de aceite do estoque:
${aceite || '- Sem critérios registrados.'}

Validação atual do estoque Premium:
- Status: ${readiness.status || 'sem readiness'}
- Smokes: read-only ${readiness.smokes?.read_only?.status || '—'}; mutável controlado ${readiness.smokes?.mutating_controlled?.status || '—'}.
- Catálogo: setores/unidades batendo com ${readiness.catalog_source || 'fonte não registrada'}.
- Pendências que exigem receita real:
${gaps || '- Nenhuma pendência de receita registrada.'}

Entregue para Thiago e Codex:
1. Lacunas de regra/UX.
2. Cálculos ou impactos de estoque/produção/conversão.
3. Cenários de teste obrigatórios.
4. Ordem recomendada de implementação.
5. Pontos que não devem ir para deploy ainda.`;
    }

    function bindCopy(p){
      const btn = document.getElementById('copyClaude');
      if(!btn) return;
      btn.onclick = async () => {
        const text = document.getElementById('claudeBrief')?.value || buildClaudeBrief(p);
        try{
          await navigator.clipboard.writeText(text);
          document.getElementById('copyStatus').textContent = 'Briefing copiado para a área de transferência.';
        }catch(e){
          const ta = document.getElementById('claudeBrief');
          ta.focus(); ta.select();
          document.getElementById('copyStatus').textContent = 'Não consegui copiar automaticamente; o texto ficou selecionado.';
        }
      };
    }

    boot();
  </script>
</body>
</html>
