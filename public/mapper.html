<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Titan Command Center</title>
  <style>
    :root{
      --bg:#08080a; --panel:#111116; --panel2:#17171d; --panel3:#1d1d24; --line:#2b2b34;
      --txt:#f7f7f8; --mut:#aaaab5; --mut2:#747481;
      --orange:#ff6a00; --orange2:#ff922b; --green:#45d483; --red:#ff5a68;
      --yellow:#f8c84e; --blue:#61a8ff; --violet:#a78bfa; --cyan:#67e8f9;
      --shadow:0 22px 90px rgba(0,0,0,.42);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;color:var(--txt);font:14px/1.45 Inter,Segoe UI,system-ui,-apple-system,sans-serif;background:
      radial-gradient(circle at 12% -4%,rgba(255,106,0,.27),transparent 30%),
      radial-gradient(circle at 92% 4%,rgba(97,168,255,.14),transparent 28%),
      linear-gradient(180deg,#09090b,#070708 58%,#0c0c0f)}
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .wrap{max-width:1500px;margin:0 auto;padding:22px}
    .top{position:sticky;top:0;z-index:10;margin:-22px -22px 18px;padding:18px 22px;background:rgba(8,8,10,.78);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07)}
    .topRow{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}
    .brand{display:flex;align-items:center;gap:14px;min-width:0}
    .mark{width:50px;height:50px;border-radius:18px;background:linear-gradient(135deg,var(--orange),#ffc05b);display:grid;place-items:center;color:#140800;font-size:24px;font-weight:950;box-shadow:0 12px 34px rgba(255,106,0,.28)}
    h1{font-size:31px;line-height:1.04;letter-spacing:-.045em;margin:0}
    h2{font-size:18px;letter-spacing:-.02em;margin:0}
    h3{font-size:15px;margin:0}
    .sub{color:var(--mut);margin-top:5px;max-width:860px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{border:1px solid var(--line);background:#17171d;color:var(--txt);border-radius:14px;padding:10px 13px;font-weight:850;transition:.15s ease}
    .btn:hover{border-color:#444450;transform:translateY(-1px)}
    .btn.primary{background:linear-gradient(135deg,var(--orange),var(--orange2));border-color:transparent;color:#140800}
    .btn.ghost{background:transparent}
    .tabs{display:flex;gap:8px;overflow:auto;margin-top:14px;padding-bottom:2px}
    .tab{white-space:nowrap;border:1px solid var(--line);background:#111116;color:var(--mut);border-radius:999px;padding:9px 12px;font-weight:850}
    .tab.active{background:rgba(255,106,0,.13);border-color:rgba(255,106,0,.46);color:#ffd7bd}
    .grid{display:grid;gap:14px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.014)),var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}
    .pad{padding:18px}
    .kpis{grid-template-columns:repeat(6,minmax(0,1fr));margin-bottom:14px}
    .kpi strong{font-size:29px;line-height:1.05;display:block;letter-spacing:-.035em}
    .kpi span{display:block;color:var(--mut);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em}
    .kpi small{display:block;color:var(--mut2);margin-top:7px}
    .section{display:none}
    .section.active{display:block}
    .hero{display:grid;grid-template-columns:1.08fr .92fr;gap:14px;margin-bottom:14px}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .split3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .split4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .sectionTitle{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:13px}
    .pill{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border-radius:999px;background:#1b1b22;border:1px solid var(--line);color:var(--mut);font-size:12px;font-weight:900}
    .pill.ok{color:#c5ffd9;border-color:rgba(69,212,131,.38);background:rgba(69,212,131,.09)}
    .pill.warn{color:#ffeab3;border-color:rgba(248,200,78,.4);background:rgba(248,200,78,.09)}
    .pill.bad{color:#ffc1c7;border-color:rgba(255,90,104,.38);background:rgba(255,90,104,.09)}
    .progress{height:10px;background:#24242c;border-radius:99px;overflow:hidden;margin-top:11px}
    .progress i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--orange),var(--green))}
    .list{display:flex;flex-direction:column;gap:9px}
    .item{padding:12px;border-radius:16px;background:rgba(255,255,255,.026);border:1px solid #292932}
    .item b{display:block;margin-bottom:3px}
    .item small,.mut{color:var(--mut)}
    .tag{display:inline-flex;align-items:center;margin:0 5px 5px 0;padding:4px 8px;border-radius:99px;background:#202028;border:1px solid #34343e;color:var(--mut);font-size:11px;font-weight:900}
    .tag.alta,.tag.critica,.tag.critico{color:#ffced3;border-color:rgba(255,90,104,.42);background:rgba(255,90,104,.09)}
    .tag.concluido,.tag.aceita,.tag.ok,.tag.ativo{color:#caffdc;border-color:rgba(69,212,131,.42);background:rgba(69,212,131,.09)}
    .tag.em_andamento,.tag.producao,.tag.codex{color:#cfe5ff;border-color:rgba(97,168,255,.42);background:rgba(97,168,255,.09)}
    .tag.planejado,.tag.parcial,.tag.mitigado_parcial,.tag.claude{color:#ffeab3;border-color:rgba(248,200,78,.42);background:rgba(248,200,78,.09)}
    .tag.thiago{color:#eadcff;border-color:rgba(167,139,250,.42);background:rgba(167,139,250,.09)}
    .filters{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px}
    .field{width:100%;background:#111116;color:var(--txt);border:1px solid var(--line);border-radius:14px;padding:12px 13px;outline:0}
    .field:focus{border-color:rgba(255,106,0,.55);box-shadow:0 0 0 3px rgba(255,106,0,.1)}
    .cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .module{padding:14px;border:1px solid #292932;border-radius:18px;background:rgba(255,255,255,.025)}
    .module h3{margin-bottom:7px}
    .bar{height:7px;background:#26262f;border-radius:99px;margin:10px 0;overflow:hidden}
    .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--blue))}
    .timeline{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
    .phase{padding:13px;border-radius:17px;background:#131318;border:1px solid #292932}
    .phase .num{width:29px;height:29px;border-radius:10px;background:#24242c;display:grid;place-items:center;color:var(--orange);font-weight:950;margin-bottom:9px}
    textarea.brief{width:100%;min-height:260px;resize:vertical;background:#0f0f13;color:#e9e9ee;border:1px solid var(--line);border-radius:18px;padding:14px;outline:0;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;line-height:1.55}
    .gate{max-width:570px;margin:10vh auto 0}
    .empty{color:var(--mut2);padding:16px;border:1px dashed #34343c;border-radius:16px;text-align:center}
    .err{color:#ffbdc4;margin-top:10px}
    .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;color:#cfd0d8}
    .callout{border-color:rgba(255,106,0,.36);background:linear-gradient(180deg,rgba(255,106,0,.1),rgba(255,106,0,.035))}
    .table{overflow:auto;border:1px solid #292932;border-radius:18px}
    table{width:100%;border-collapse:collapse;min-width:780px}
    th,td{text-align:left;border-bottom:1px solid #292932;padding:11px;vertical-align:top}
    th{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:#15151b}
    tr:last-child td{border-bottom:0}
    @media(max-width:1180px){.kpis{grid-template-columns:repeat(3,1fr)}.hero,.cols,.split3,.split4{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}.timeline{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:720px){.wrap{padding:14px}.top{margin:-14px -14px 14px;padding:14px}.topRow{flex-direction:column}.actions{justify-content:flex-start}.kpis,.cards,.timeline,.filters{grid-template-columns:1fr}h1{font-size:25px}.mark{width:44px;height:44px;border-radius:15px}}
  </style>
</head>
<body>
  <main class="wrap" id="app"></main>

  <script>
    const $app = document.getElementById('app');
    const API = location.origin;
    const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const fmt = d => d ? new Date(d).toLocaleString('pt-BR') : '—';
    const norm = s => String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const statusLabel = s => String(s || '—').replace(/_/g,' ');
    const pct = n => Math.max(0, Math.min(100, Number(n || 0)));
    const file = (state, name, fallback) => state.files?.[name] ?? fallback;

    let STATE = null;
    let ACTIVE = 'visao';
    let FILTER = { q:'', module:'', status:'', tool:'' };

    function storedAdminId(){
      const q = new URLSearchParams(location.search).get('admin_id');
      if(q) return q;
      try{
        const u = JSON.parse(localStorage.getItem('est_u') || 'null');
        if(u && u.id) return u.id;
      }catch(e){}
      return localStorage.getItem('mapper_admin_id') || '';
    }

    function gate(msg=''){
      $app.innerHTML = `
        <section class="card pad gate">
          <div class="brand" style="margin-bottom:16px">
            <div class="mark">T</div>
            <div><h1>Titan Command Center</h1><div class="sub">Acesso restrito ao gestor. Informe seu ID para carregar a central operacional.</div></div>
          </div>
          <input class="field" id="adminId" placeholder="ID do gestor" value="${esc(storedAdminId())}">
          <button class="btn primary" id="enter">Carregar Command Center</button>
          ${msg ? `<div class="err">${esc(msg)}</div>` : ''}
          <div class="sub" style="margin-top:14px">Se você já entrou no estoque como gestor, a central tenta reaproveitar esse acesso automaticamente.</div>
        </section>`;
      document.getElementById('enter').onclick = () => {
        const id = document.getElementById('adminId').value.trim();
        if(!id) return gate('Informe o ID do gestor.');
        localStorage.setItem('mapper_admin_id', id);
        load(id);
      };
      document.getElementById('adminId').onkeydown = e => { if(e.key === 'Enter') document.getElementById('enter').click(); };
    }

    async function load(adminId = storedAdminId()){
      if(!adminId) return gate();
      $app.innerHTML = '<section class="card pad gate"><h1>Carregando Command Center…</h1><div class="sub">Lendo project-state, checks, riscos, tarefas e workflow dos agentes.</div></section>';
      try{
        const res = await fetch(`${API}/api/mapper/state?admin_id=${encodeURIComponent(adminId)}`);
        const data = await res.json();
        if(!res.ok) throw new Error(data.erro || 'Falha ao carregar Command Center.');
        localStorage.setItem('mapper_admin_id', adminId);
        STATE = data;
        render();
      }catch(e){ gate(e.message || 'Falha ao carregar Command Center.'); }
    }

    function dataPack(){
      const data = STATE || {};
      return {
        modules: file(data, 'modules.json', []),
        tasks: file(data, 'tasks.json', []),
        risks: file(data, 'risks.json', []),
        roadmap: file(data, 'roadmap.json', []),
        weekly: file(data, 'weekly-focus.json', {}),
        health: file(data, 'health-checks.json', {}),
        rbac: file(data, 'rbac-audit.json', {}),
        deploys: file(data, 'deploys.json', []),
        decisions: file(data, 'decisions.json', []),
        map: file(data, 'module-route-table-map.json', {}),
        tests: file(data, 'test-matrix.json', []),
        contracts: file(data, 'api-contracts-critical.json', []),
        workflow: file(data, 'agent-workflow.json', {}),
        routes: file(data, 'routes.json', {}),
        services: file(data, 'services.json', []),
        people: file(data, 'people.json', [])
      };
    }

    function render(){
      const p = dataPack();
      const avg = Math.round(p.modules.reduce((s,m)=>s+Number(m.progresso||0),0) / Math.max(1, p.modules.length));
      const doneTasks = p.tasks.filter(t => norm(t.status) === 'concluido').length;
      const openTasks = p.tasks.filter(t => norm(t.status) !== 'concluido').length;
      const blocked = p.tasks.filter(t => t.bloqueada).length;
      const highRisks = p.risks.filter(r => ['alta','critica'].includes(norm(r.severidade)) && !['mitigado','fechado','resolvido'].includes(norm(r.status))).length;
      const healthOk = p.health.ok === true || (Number(p.health.failed || 0) === 0 && Number(p.health.executed || 0) > 0);
      const rbacOk = p.rbac.ok !== false && Number(p.rbac.users_audited || 0) > 0;
      const lastDeploy = p.deploys[p.deploys.length - 1];
      const commandModule = p.modules.find(m => m.id === 'command-center');

      $app.innerHTML = `
        <header class="top">
          <div class="topRow">
            <div class="brand">
              <div class="mark">T</div>
              <div>
                <h1>Titan Command Center</h1>
                <div class="sub">Fonte viva: <span class="mono">project-state/*.json</span>. Gestor: ${esc(STATE.usuario?.nome || '—')} · atualizado ${fmt(STATE.generated_at)}</div>
              </div>
            </div>
            <div class="actions">
              <a class="btn ghost" href="/mapper">Mapper</a>
              <a class="btn ghost" href="/admin">Admin</a>
              <a class="btn ghost" href="/estoque">Estoque</a>
              <button class="btn primary" id="refresh">Atualizar</button>
            </div>
          </div>
          <nav class="tabs">${tabs().map(t => `<button class="tab ${ACTIVE === t.id ? 'active' : ''}" data-tab="${esc(t.id)}">${esc(t.label)}</button>`).join('')}</nav>
        </header>

        <section class="grid kpis">
          ${kpi('Command Center', `${pct(commandModule?.progresso)}%`, commandModule?.ambiente || 'em evolução')}
          ${kpi('Titan geral', `${avg}%`, `${p.modules.length} módulos mapeados`)}
          ${kpi('Tarefas', `${doneTasks}/${p.tasks.length}`, `${openTasks} abertas · ${blocked} bloqueadas`)}
          ${kpi('Riscos altos', highRisks, highRisks ? 'exigem decisão' : 'sem alerta alto aberto')}
          ${kpi('Smoke', healthOk ? 'OK' : 'Atenção', `${p.health.executed || 0}/${p.health.total || 0} checks`)}
          ${kpi('Último deploy', lastDeploy ? 'OK' : '—', lastDeploy?.id || 'sem deploy registrado')}
        </section>

        <section id="visao" class="section ${ACTIVE === 'visao' ? 'active' : ''}">${renderVisao(p, {avg, healthOk, rbacOk})}</section>
        <section id="estoque" class="section ${ACTIVE === 'estoque' ? 'active' : ''}">${renderEstoque(p)}</section>
        <section id="agentes" class="section ${ACTIVE === 'agentes' ? 'active' : ''}">${renderAgentes(p)}</section>
        <section id="execucao" class="section ${ACTIVE === 'execucao' ? 'active' : ''}">${renderExecucao(p)}</section>
        <section id="qualidade" class="section ${ACTIVE === 'qualidade' ? 'active' : ''}">${renderQualidade(p)}</section>
        <section id="deploys" class="section ${ACTIVE === 'deploys' ? 'active' : ''}">${renderDeploys(p)}</section>
        <section id="mapa" class="section ${ACTIVE === 'mapa' ? 'active' : ''}">${renderMapa(p)}</section>
      `;

      document.getElementById('refresh').onclick = () => load();
      document.querySelectorAll('[data-tab]').forEach(btn => btn.onclick = () => { ACTIVE = btn.dataset.tab; render(); });
      bindFilters();
      bindCopy(p);
    }

    function tabs(){
      return [
        {id:'visao', label:'Visão geral'},
        {id:'estoque', label:'Estoque'},
        {id:'agentes', label:'Agentes'},
        {id:'execucao', label:'Execução'},
        {id:'qualidade', label:'Qualidade'},
        {id:'deploys', label:'Deploys'},
        {id:'mapa', label:'Mapa técnico'}
      ];
    }

    function renderVisao(p, meta){
      return `
        <div class="hero">
          <div class="card pad callout">
            <div class="sectionTitle"><h2>Missão atual</h2><span class="pill ok">${esc(p.workflow.status || 'ativo')}</span></div>
            <h2 style="font-size:25px">${esc(p.workflow.current_mission?.title || p.weekly.objetivo || 'Sem missão definida')}</h2>
            <div class="sub" style="margin-top:9px">${esc(p.workflow.current_mission?.context || '')}</div>
            <div class="progress"><i style="width:${meta.avg}%"></i></div>
            <div style="margin-top:13px">${(p.workflow.definition_of_done || []).slice(0,6).map(x => `<span class="tag ok">${esc(x)}</span>`).join('')}</div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Próximo movimento</h2><span class="pill warn">coordenação</span></div>
            ${nextMove(p)}
            <div class="item" style="margin-top:10px">
              <b>Regra de ouro</b>
              <small>Claude avalia e calcula; Codex implementa, testa e publica; Thiago aprova o fluxo operacional.</small>
            </div>
          </div>
        </div>
        <div class="split3">
          <div class="card pad">
            <div class="sectionTitle"><h2>Prioridades da semana</h2><span class="pill">foco</span></div>
            <div class="list">${(p.weekly.prioridades || []).map(x => `<div class="item"><b>${esc(x)}</b></div>`).join('') || empty('Sem prioridades.')}</div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Não fazer agora</h2><span class="pill warn">anti-retrabalho</span></div>
            <div class="list">${(p.weekly.nao_fazer_agora || []).map(x => `<div class="item"><b>${esc(x)}</b></div>`).join('') || empty('Sem restrições.')}</div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Status dos guardrails</h2><span class="pill ${meta.healthOk ? 'ok' : 'warn'}">blindagem</span></div>
            <div class="item"><b>Smoke read-only</b><small>${meta.healthOk ? 'OK' : 'Atenção'} · ${p.health.executed || 0}/${p.health.total || 0} checks · ${p.health.failed || 0} falhas</small></div>
            <div class="item"><b>RBAC</b><small>${meta.rbacOk ? 'Auditado' : 'Pendente'} · ${p.rbac.users_audited || 0} usuários auditados</small></div>
            <div class="item"><b>Segurança</b><small>API do Command Center lê somente arquivos permitidos de project-state.</small></div>
          </div>
        </div>`;
    }

    function renderEstoque(p){
      const stockIds = ['estoque-v2','producao-fichas','contagem-auditoria','permissoes-staff','admin-gestor'];
      const stockModules = p.modules.filter(m => stockIds.includes(m.id));
      const stockTasks = p.tasks.filter(t => stockIds.includes(t.modulo));
      const stockRisks = p.risks.filter(r => (r.modulos_afetados || []).some(id => stockIds.includes(id)));
      const contracts = p.contracts.filter(c => String(c.module || '').includes('estoque') || String(c.module || '').includes('producao') || String(c.module || '').includes('contagem'));
      const tests = p.tests.filter(t => stockIds.includes(t.module));
      return `
        <div class="hero">
          <div class="card pad callout">
            <div class="sectionTitle"><h2>Estoque: cockpit da entrega</h2><span class="pill bad">módulo crítico</span></div>
            <div class="sub">Esta aba é o trilho para tirar o estoque do improviso: produto, ficha, produção, contagem, auditoria e permissão precisam passar por esta visão antes de deploy.</div>
            <div class="cards" style="margin-top:13px">${stockModules.map(moduleCard).join('')}</div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Divisão Claude/Codex no estoque</h2><span class="pill">lanes</span></div>
            <div class="list">${(p.workflow.lanes || []).filter(l => l.id !== 'command-center').map(laneCard).join('') || empty('Sem lanes registradas.')}</div>
          </div>
        </div>
        <div class="cols" style="margin-bottom:14px">
          <div class="card pad">
            <div class="sectionTitle"><h2>Tarefas do estoque</h2><span class="pill">${stockTasks.filter(t => norm(t.status) !== 'concluido').length} abertas</span></div>
            <div class="list">${stockTasks.map(taskItem).join('') || empty('Sem tarefas do estoque.')}</div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Riscos do estoque</h2><span class="pill warn">${stockRisks.length} riscos</span></div>
            <div class="list">${stockRisks.sort((a,b)=>riskWeight(b)-riskWeight(a)).map(riskItem).join('') || empty('Sem riscos do estoque.')}</div>
          </div>
        </div>
        <div class="cols">
          <div class="card pad">
            <div class="sectionTitle"><h2>Contratos críticos</h2><span class="pill">${contracts.length} rotas</span></div>
            ${contractsTable(contracts)}
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Testes exigidos</h2><span class="pill">${tests.length} testes</span></div>
            <div class="list">${tests.map(testItem).join('') || empty('Sem testes cadastrados.')}</div>
          </div>
        </div>`;
    }

    function renderAgentes(p){
      const brief = buildClaudeBrief(p);
      return `
        <div class="cols" style="margin-bottom:14px">
          <div class="card pad">
            <div class="sectionTitle"><h2>Quem faz o quê</h2><span class="pill ok">novo fluxo</span></div>
            <div class="list">${(p.workflow.roles || []).map(roleCard).join('') || empty('Sem papéis definidos.')}</div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Prompt para o Claude</h2><button class="btn primary" id="copyClaude">Copiar briefing</button></div>
            <textarea class="brief" id="claudeBrief" readonly>${esc(brief)}</textarea>
            <div class="sub" id="copyStatus" style="margin-top:8px">Use este texto para reposicionar o Claude como avaliador/arquiteto, não como executor concorrente.</div>
          </div>
        </div>
        <div class="card pad">
          <div class="sectionTitle"><h2>Fluxo operacional</h2><span class="pill">do briefing ao deploy</span></div>
          <div class="timeline">${(p.workflow.workflow || []).map(flowItem).join('') || empty('Sem workflow registrado.')}</div>
        </div>`;
    }

    function renderExecucao(p){
      const modules = filteredModules(p.modules);
      const tasks = filteredTasks(p.tasks);
      const moduleOptions = p.modules.map(m => `<option value="${esc(m.id)}" ${FILTER.module === m.id ? 'selected' : ''}>${esc(m.nome || m.id)}</option>`).join('');
      return `
        <div class="card pad" style="margin-bottom:14px">
          <div class="sectionTitle"><h2>Filtros de execução</h2><span class="pill">${modules.length} módulos · ${tasks.length} tarefas</span></div>
          <div class="filters">
            <input class="field" id="qFilter" placeholder="Buscar módulo, tarefa, rota, risco..." value="${esc(FILTER.q)}">
            <select class="field" id="moduleFilter"><option value="">Todos módulos</option>${moduleOptions}</select>
            <select class="field" id="statusFilter">
              ${option('', 'Todos status', FILTER.status)}
              ${option('em_andamento', 'Em andamento', FILTER.status)}
              ${option('planejado', 'Planejado', FILTER.status)}
              ${option('concluido', 'Concluído', FILTER.status)}
              ${option('detectado', 'Detectado', FILTER.status)}
              ${option('parcial', 'Parcial', FILTER.status)}
            </select>
            <select class="field" id="toolFilter">
              ${option('', 'Todas ferramentas', FILTER.tool)}
              ${option('Codex', 'Codex', FILTER.tool)}
              ${option('Claude', 'Claude', FILTER.tool)}
              ${option('Claude Opus ou Codex', 'Claude ou Codex', FILTER.tool)}
            </select>
          </div>
        </div>
        <div class="card pad" style="margin-bottom:14px">
          <div class="sectionTitle"><h2>Módulos</h2><span class="pill">${modules.length}</span></div>
          <div class="cards">${modules.map(moduleCard).join('') || empty('Nenhum módulo com esse filtro.')}</div>
        </div>
        <div class="card pad">
          <div class="sectionTitle"><h2>Tarefas</h2><span class="pill">${tasks.length}</span></div>
          <div class="list">${tasks.map(taskItem).join('') || empty('Nenhuma tarefa com esse filtro.')}</div>
        </div>`;
    }

    function renderQualidade(p){
      const highRisks = p.risks.slice().sort((a,b)=>riskWeight(b)-riskWeight(a));
      return `
        <div class="split3" style="margin-bottom:14px">
          <div class="card pad"><div class="sectionTitle"><h2>Smoke read-only</h2><span class="pill ${Number(p.health.failed||0) ? 'bad' : 'ok'}">${p.health.failed || 0} falhas</span></div><div class="item"><b>${p.health.mode || 'smoke'}</b><small>${p.health.executed || 0}/${p.health.total || 0} executados · mutates_data=${esc(p.health.mutates_data)}</small></div></div>
          <div class="card pad"><div class="sectionTitle"><h2>RBAC</h2><span class="pill ${p.rbac.ok === false ? 'bad' : 'ok'}">${p.rbac.users_audited || 0} auditados</span></div><div class="item"><b>${p.rbac.mode || 'audit'}</b><small>${p.rbac.users_found || 0} usuários encontrados · mutates_data=${esc(p.rbac.mutates_data)}</small></div></div>
          <div class="card pad"><div class="sectionTitle"><h2>Matriz de testes</h2><span class="pill">${p.tests.length} itens</span></div><div class="list">${p.tests.slice(0,4).map(testItem).join('')}</div></div>
        </div>
        <div class="cols">
          <div class="card pad">
            <div class="sectionTitle"><h2>Riscos priorizados</h2><span class="pill warn">${p.risks.length}</span></div>
            <div class="list">${highRisks.map(riskItem).join('') || empty('Sem riscos.')}</div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Critérios de pronto</h2><span class="pill ok">DoD</span></div>
            <div class="list">${(p.workflow.definition_of_done || []).map(x => `<div class="item"><b>${esc(x)}</b></div>`).join('') || empty('Sem critérios.')}</div>
          </div>
        </div>`;
    }

    function renderDeploys(p){
      return `
        <div class="cols">
          <div class="card pad">
            <div class="sectionTitle"><h2>Deploys registrados</h2><span class="pill">${p.deploys.length}</span></div>
            <div class="list">${p.deploys.slice().reverse().map(deployItem).join('') || empty('Sem deploys.')}</div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Decisões recentes</h2><span class="pill">governança</span></div>
            <div class="list">${p.decisions.slice().reverse().map(decisionItem).join('') || empty('Sem decisões.')}</div>
          </div>
        </div>`;
    }

    function renderMapa(p){
      const publicPages = p.routes.public_pages || [];
      const apiGroups = p.routes.api_groups || [];
      const boundaries = p.map.classification_boundaries || [];
      return `
        <div class="cols" style="margin-bottom:14px">
          <div class="card pad">
            <div class="sectionTitle"><h2>Fronteiras críticas</h2><span class="pill bad">não cruzar sem decisão</span></div>
            <div class="list">${boundaries.map(boundaryItem).join('') || empty('Sem fronteiras.')}</div>
          </div>
          <div class="card pad">
            <div class="sectionTitle"><h2>Serviços</h2><span class="pill">${p.services.length}</span></div>
            <div class="list">${p.services.map(s => `<div class="item"><span class="tag ${esc(norm(s.status))}">${esc(s.status || '—')}</span><b>${esc(s.nome || s.id)}</b><small>${esc(s.tipo || '')} · ${esc((s.modulos || []).join(', '))}</small></div>`).join('') || empty('Sem serviços.')}</div>
          </div>
        </div>
        <div class="cols">
          <div class="card pad"><div class="sectionTitle"><h2>Páginas públicas</h2><span class="pill">${publicPages.length}</span></div><div class="list">${publicPages.map(r => routeItem(r)).join('') || empty('Sem páginas.')}</div></div>
          <div class="card pad"><div class="sectionTitle"><h2>Grupos de API</h2><span class="pill">${apiGroups.length}</span></div><div class="list">${apiGroups.map(g => `<div class="item"><span class="tag ${esc(norm(g.status))}">${esc(g.status || '—')}</span><b>${esc(g.id)}</b><small>${esc(g.module)} · ${esc(g.base)} · ${(g.routes || []).length} rotas</small></div>`).join('') || empty('Sem APIs.')}</div></div>
        </div>`;
    }

    function kpi(label, value, detail){ return `<div class="card pad kpi"><span>${esc(label)}</span><strong>${esc(value)}</strong><small>${esc(detail)}</small></div>`; }
    function empty(text){ return `<div class="empty">${esc(text)}</div>`; }
    function option(value, label, selected){ return `<option value="${esc(value)}" ${selected === value ? 'selected' : ''}>${esc(label)}</option>`; }

    function nextMove(p){
      const task = p.tasks.find(t => norm(t.status) !== 'concluido' && t.prioridade === 'alta') || p.tasks.find(t => norm(t.status) !== 'concluido');
      if(!task) return empty('Sem próxima tarefa aberta.');
      return `<div class="item"><span class="tag ${esc(norm(task.prioridade))}">${esc(task.prioridade)}</span><span class="tag ${esc(norm(task.ferramenta_atuante))}">${esc(task.ferramenta_atuante || '—')}</span><b>${esc(task.titulo)}</b><small>${esc(task.proximo_passo || '')}</small></div>`;
    }

    function moduleCard(m){
      const p = pct(m.progresso);
      return `<article class="module">
        <span class="tag ${esc(norm(m.status))}">${esc(statusLabel(m.status))}</span><span class="tag ${esc(norm(m.ferramenta_atuante))}">${esc(m.ferramenta_atuante || '—')}</span>
        <h3>${esc(m.nome || m.id)}</h3>
        <small class="mut">${esc(m.id)} · ${esc(m.ambiente || '—')}</small>
        <div class="bar"><i style="width:${p}%"></i></div>
        <small class="mut">${p}% · ${esc((m.proximos_passos || [])[0] || (m.pendencias || [])[0] || '')}</small>
      </article>`;
    }

    function taskItem(t){
      return `<div class="item">
        <span class="tag ${esc(norm(t.status))}">${esc(statusLabel(t.status))}</span><span class="tag ${esc(norm(t.prioridade))}">${esc(t.prioridade)}</span>${t.bloqueada ? '<span class="tag critica">bloqueada</span>' : ''}
        <b>${esc(t.titulo || t.id)}</b>
        <small>${esc(t.modulo || '—')} · ${esc(t.ferramenta_atuante || '—')} · ${esc(t.proximo_passo || '')}</small>
      </div>`;
    }

    function riskWeight(r){ return ({critica:5, alta:4, media:2, baixa:1}[norm(r.severidade)] || 0) + (norm(r.status).includes('aberto') ? 1 : 0); }
    function riskItem(r){
      return `<div class="item">
        <span class="tag ${esc(norm(r.severidade))}">${esc(r.severidade)}</span><span class="tag ${esc(norm(r.status))}">${esc(statusLabel(r.status))}</span>
        <b>${esc(r.titulo || r.id)}</b>
        <small>${esc((r.modulos_afetados || []).join(', '))}</small>
        <small>${esc(r.mitigacao || r.impacto || '')}</small>
      </div>`;
    }

    function laneCard(l){
      return `<div class="item"><b>${esc(l.name || l.id)}</b><small><b>Codex:</b> ${esc((l.codex_focus || []).join(' · '))}</small><small><b>Claude:</b> ${esc((l.claude_focus || []).join(' · '))}</small></div>`;
    }

    function roleCard(r){
      return `<div class="item"><span class="tag ${esc(norm(r.id))}">${esc(r.name || r.id)}</span><b>${esc(r.label || '')}</b><small>${esc((r.primary_duties || []).join(' · '))}</small><small><b>Não fazer:</b> ${esc((r.must_not || []).join(' · '))}</small></div>`;
    }

    function flowItem(f){
      return `<div class="phase"><div class="num">${esc(f.step)}</div><h3>${esc(f.name)}</h3><p class="mut">${esc(f.owner)}</p><p>${esc(f.output || '')}</p></div>`;
    }

    function testItem(t){
      return `<div class="item"><span class="tag ${esc(norm(t.priority))}">${esc(t.priority)}</span><span class="tag">${esc(t.type)}</span><b>${esc(t.id)}</b><small>${esc(t.expected || '')}</small><small class="mono">${esc(t.script || '')}</small></div>`;
    }

    function contractsTable(contracts){
      if(!contracts.length) return empty('Sem contratos.');
      return `<div class="table"><table><thead><tr><th>Contrato</th><th>Rota</th><th>Permissão</th><th>Escreve</th></tr></thead><tbody>${contracts.map(c => `<tr><td><b>${esc(c.id)}</b><br><small>${esc(c.screen || '')}</small></td><td><span class="mono">${esc(c.method)} ${esc(c.path)}</span></td><td>${esc(c.permission)}</td><td>${esc((c.writes || []).join(', '))}</td></tr>`).join('')}</tbody></table></div>`;
    }

    function deployItem(d){
      return `<div class="item"><span class="tag ${esc(norm(d.status))}">${esc(d.status || '—')}</span><span class="tag ${esc(norm(d.ambiente))}">${esc(d.ambiente || '—')}</span><b>${esc(d.id || 'Deploy')}</b><small>${esc(d.data || '')} · ${esc(d.origem || '')}</small><small>${esc((d.validacoes || []).join(' · '))}</small></div>`;
    }

    function decisionItem(d){
      return `<div class="item"><span class="tag ${esc(norm(d.status))}">${esc(d.status || '—')}</span><b>${esc(d.decisao || d.id)}</b><small>${esc(d.data || '')} · ${esc((d.modulos_afetados || []).join(', '))}</small></div>`;
    }

    function boundaryItem(b){
      return `<div class="item"><b>${esc(b.id)}</b><small>${esc(b.rule || '')}</small><div style="margin-top:8px">${Object.entries(b).filter(([k,v]) => v && typeof v === 'object' && k !== 'id').map(([k,v]) => `<span class="tag">${esc(k)}: ${esc((v.routes || v.tables || []).slice(0,4).join(', '))}</span>`).join('')}</div></div>`;
    }

    function routeItem(r){
      return `<div class="item"><span class="tag">${esc(r.method)}</span><b>${esc(r.path)}</b><small>${esc(r.module)} · ${esc(r.target || '')}</small></div>`;
    }

    function filteredModules(modules){
      return modules.filter(m => {
        const blob = norm([m.id,m.nome,m.status,m.ferramenta_atuante,m.ambiente,(m.pendencias||[]).join(' '),(m.proximos_passos||[]).join(' ')].join(' '));
        if(FILTER.q && !blob.includes(norm(FILTER.q))) return false;
        if(FILTER.module && m.id !== FILTER.module) return false;
        if(FILTER.status && norm(m.status) !== norm(FILTER.status)) return false;
        if(FILTER.tool && m.ferramenta_atuante !== FILTER.tool) return false;
        return true;
      });
    }

    function filteredTasks(tasks){
      return tasks.filter(t => {
        const blob = norm([t.id,t.titulo,t.status,t.prioridade,t.modulo,t.ferramenta_atuante,t.proximo_passo].join(' '));
        if(FILTER.q && !blob.includes(norm(FILTER.q))) return false;
        if(FILTER.module && t.modulo !== FILTER.module) return false;
        if(FILTER.status && norm(t.status) !== norm(FILTER.status)) return false;
        if(FILTER.tool && t.ferramenta_atuante !== FILTER.tool) return false;
        return true;
      });
    }

    function bindFilters(){
      const q = document.getElementById('qFilter');
      const module = document.getElementById('moduleFilter');
      const status = document.getElementById('statusFilter');
      const tool = document.getElementById('toolFilter');
      if(!q) return;
      q.oninput = e => { FILTER.q = e.target.value; render(); };
      module.onchange = e => { FILTER.module = e.target.value; render(); };
      status.onchange = e => { FILTER.status = e.target.value; render(); };
      tool.onchange = e => { FILTER.tool = e.target.value; render(); };
    }

    function buildClaudeBrief(p){
      const open = p.tasks.filter(t => norm(t.status) !== 'concluido').slice(0,8).map(t => `- ${t.id}: ${t.titulo} [${t.modulo}/${t.prioridade}] -> ${t.proximo_passo || ''}`).join('\n');
      const risks = p.risks.slice().sort((a,b)=>riskWeight(b)-riskWeight(a)).slice(0,6).map(r => `- ${r.id}: ${r.titulo} [${r.severidade}/${r.status}] -> ${r.mitigacao || r.impacto || ''}`).join('\n');
      const wf = p.workflow.handoff_to_claude || {};
      return `${wf.prompt || 'Você atua como revisor/arquiteto do Titan.'}

Missão atual:
${p.workflow.current_mission?.title || 'Entregar Titan com estoque operacional e governança.'}

Fronteiras obrigatórias:
- Novas funções de estoque: /api/est/* e tabelas est_*.
- /api/estoque/* é legado.
- Setores são dinâmicos por cliente.
- Ficha de produção interna usa est_ficha_*; ficha do cardápio é outra camada.
- Codex implementa código/UI/deploy; Claude avalia, calcula, revisa e prioriza.

Tarefas abertas principais:
${open || '- Nenhuma tarefa aberta listada.'}

Riscos principais:
${risks || '- Nenhum risco listado.'}

Entregue para Thiago e Codex:
1. Lacunas de regra/UX.
2. Cálculos ou impactos de estoque/produção/conversão.
3. Cenários de teste obrigatórios.
4. Ordem recomendada de implementação.
5. Pontos que não devem ir para deploy ainda.`;
    }

    function bindCopy(p){
      const btn = document.getElementById('copyClaude');
      if(!btn) return;
      btn.onclick = async () => {
        const text = document.getElementById('claudeBrief')?.value || buildClaudeBrief(p);
        try{
          await navigator.clipboard.writeText(text);
          document.getElementById('copyStatus').textContent = 'Briefing copiado para a área de transferência.';
        }catch(e){
          const ta = document.getElementById('claudeBrief');
          ta.focus(); ta.select();
          document.getElementById('copyStatus').textContent = 'Não consegui copiar automaticamente; o texto ficou selecionado.';
        }
      };
    }

    load();
  </script>
</body>
</html>
