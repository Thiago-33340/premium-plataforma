<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Estoque</title>
<style>
:root{ --bg:#0b0b0c; --bg2:#121214; --bg3:#1a1a1e; --bd:#26262c; --tx:#f2f2f3; --mut:#8a8a93; --vvh:100vh; --nav-h:64px;
  --lar:#ff7a18; --verd:#22c55e; --amar:#f5b50a; --verm:#ef4444; --azul:#3b82f6; }
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html,body{ margin:0; padding:0; background:var(--bg); color:var(--tx); overflow-x:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
body{ min-height:100vh; }
input,select,button,textarea{ font-family:inherit; font-size:16px; }
.hide{ display:none !important; }
.mut{ color:var(--mut); } .sm{ font-size:13px; } .xs{ font-size:11px; }

#login{ position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px; background:radial-gradient(900px 500px at 50% -10%, #2a1606 0%, #0b0b0c 55%); }
#login img{ width:180px; max-width:70%; margin-bottom:8px; }
#login h1{ font-size:18px; margin:6px 0 2px; } #login p{ margin:0 0 18px; }
.card{ width:100%; max-width:380px; background:var(--bg2); border:1px solid var(--bd); border-radius:16px; padding:18px; }
.remember-row{ display:flex; align-items:flex-start; gap:10px; margin:8px 0 10px; color:var(--mut); font-size:13px; line-height:1.35; cursor:pointer; }
.remember-row input{ flex:0 0 auto; width:19px; height:19px; margin:1px 0 0; accent-color:var(--lar); }
.remember-row b{ display:block; color:var(--tx); font-size:13px; }
.remember-row small{ display:block; color:var(--mut); font-size:11px; }
.field{ width:100%; background:var(--bg3); border:1px solid var(--bd); color:var(--tx); border-radius:12px;
  padding:14px; margin:6px 0; outline:none; }
.field:focus{ border-color:var(--lar); }
.btn{ width:100%; border:none; border-radius:12px; padding:14px; font-weight:700; cursor:pointer; }
.btn.primary{ background:var(--lar); color:#1a0c00; }
.btn.ghost{ background:var(--bg3); color:var(--tx); border:1px solid var(--bd); }
.btn.danger{ background:var(--verm); color:#fff; }
.btn.sm{ width:auto; padding:9px 14px; font-size:14px; }
.err{ color:var(--verm); min-height:18px; font-size:13px; margin:6px 0 0; }
.poweredby{ margin-top:18px; color:var(--mut); font-size:12px; }

#app{ display:flex; flex-direction:column; min-height:100vh; }
header{ position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
  gap:10px; padding:12px 16px; background:rgba(11,11,12,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--bd); }
header .logo{ height:26px; }
header .who{ font-size:12px; color:var(--mut); text-align:right; line-height:1.2; }
main{ flex:1; padding:14px 14px calc(var(--nav-h) + 28px + env(safe-area-inset-bottom)); }
.vhead{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:4px 2px 12px; }
h2.tit{ font-size:18px; margin:0; }

.kpis{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.kpi{ background:var(--bg2); border:1px solid var(--bd); border-radius:14px; padding:14px; }
.kpi .v{ font-size:26px; font-weight:800; line-height:1; }
.kpi .l{ font-size:12px; color:var(--mut); margin-top:6px; }
.kpi.alert .v{ color:var(--amar); } .kpi.bad .v{ color:var(--verm); } .kpi.ok .v{ color:var(--verd); }
.sec{ font-size:13px; color:var(--mut); text-transform:uppercase; letter-spacing:.4px; margin:20px 2px 8px; }
.panel{ background:var(--bg2); border:1px solid var(--bd); border-radius:14px; overflow:hidden; }
.empty{ padding:18px; color:var(--mut); text-align:center; font-size:14px; }

.searchbar{ position:sticky; top:0; z-index:10; background:var(--bg); padding:4px 0 10px; }
.chips{ display:flex; gap:8px; overflow-x:auto; padding:2px 0 4px; -webkit-overflow-scrolling:touch; }
.chips::-webkit-scrollbar{ display:none }
.chip{ flex:0 0 auto; background:var(--bg3); border:1px solid var(--bd); color:var(--tx); border-radius:999px;
  padding:8px 13px; font-size:13px; cursor:pointer; white-space:nowrap; }
.chip.on{ background:var(--lar); color:#1a0c00; border-color:var(--lar); font-weight:700; }

.plist{ display:flex; flex-direction:column; gap:8px; }
.prow{ background:var(--bg2); border:1px solid var(--bd); border-radius:12px; padding:12px; display:flex; gap:10px; align-items:center; cursor:pointer; }
.prow:active{ background:var(--bg3); }
.prow .nm{ flex:1; min-width:0; }
.prow .nm b{ display:block; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.prow .nm small{ color:var(--mut); font-size:12px; }
.prow .qt{ text-align:right; flex:0 0 auto; }
.prow .qt .big{ font-weight:800; font-size:15px; }
.tag{ font-size:10px; padding:2px 7px; border-radius:999px; font-weight:700; }
.tag.zero{ background:#3a1414; color:#ff8d8d; } .tag.low{ background:#3a2e10; color:#ffd479; } .tag.ok{ background:#13301a; color:#86e0a0; }
.tag.off{ background:#222; color:#999; }

nav{ position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex; justify-content:space-around;
  background:rgba(15,15,17,.96); backdrop-filter:blur(10px); border-top:1px solid var(--bd);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom)); }
nav button{ background:none; border:none; color:var(--mut); display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:11px; padding:4px 8px; cursor:pointer; flex:1; }
nav button .ic{ font-size:20px; line-height:1; }
nav button.on{ color:var(--lar); }

#toast{ position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); transform:translateX(-50%);
  background:#000; border:1px solid var(--bd); color:#fff; padding:10px 16px; border-radius:999px; font-size:14px;
  opacity:0; transition:.2s; z-index:60; pointer-events:none; max-width:90%; text-align:center; }
#toast.on{ opacity:1; }
.update-banner{ position:fixed; left:14px; right:14px; bottom:calc(92px + env(safe-area-inset-bottom)); z-index:95;
  display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px; border:1px solid rgba(255,122,24,.55);
  border-radius:15px; background:linear-gradient(145deg,#1b130b,#111113); box-shadow:0 18px 70px rgba(0,0,0,.5); }
.update-banner b{ display:block; font-size:13px; }
.update-banner small{ display:block; margin-top:3px; color:#d7b18d; font-size:11px; line-height:1.35; }
.update-banner .btn{ width:auto; flex:0 0 auto; padding:10px 13px; }
@media(min-width:760px){ .update-banner{ left:auto; right:24px; width:min(460px,calc(100vw - 48px)); bottom:24px; } }
@media(max-width:520px){ .update-banner{ flex-direction:column; align-items:stretch; }.update-banner .btn{ width:100%; } }

.modal{ position:fixed; inset:0; z-index:55; display:none; align-items:flex-end; justify-content:center; background:rgba(0,0,0,.6); }
.modal.on{ display:flex; }
.modal .box{ width:100%; max-width:480px; max-height:92vh; overflow:auto; background:var(--bg2); border:1px solid var(--bd); border-radius:18px 18px 0 0; padding:18px; }
@media(min-width:600px){ .modal{ align-items:center } .modal .box{ border-radius:18px } }
.fgrid{ display:flex; flex-direction:column; gap:4px; }
.flabel{ display:flex; flex-direction:column; gap:2px; font-size:13px; color:var(--mut); margin-top:8px; }
.fcheck{ display:flex; align-items:center; gap:10px; font-size:15px; color:var(--tx); margin-top:12px; }
.fcheck input{ width:20px; height:20px; }
.mfoot{ display:flex; gap:8px; margin-top:16px; }
.mfoot .btn{ flex:1; }

.setor-btn{ width:100%; text-align:left; background:var(--bg2); border:1px solid var(--bd); color:var(--tx); border-radius:12px; padding:16px; margin-bottom:10px; font-size:16px; font-weight:600; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px; }
.setor-btn small{ color:var(--mut); font-weight:400; font-size:12px; }
.audit-banner{ background:#2a2410; border:1px solid #5a4a16; color:#ffd479; border-radius:12px; padding:12px 14px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer; font-weight:600; }
.cnt-session{ display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:14px 16px; margin-bottom:14px; border:1px solid rgba(255,122,24,.32); border-radius:14px; background:linear-gradient(120deg,rgba(255,122,24,.14),rgba(255,122,24,.025)); }
.cnt-session .live{ display:flex; align-items:center; gap:7px; color:#ffad70; font-size:11px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; }.cnt-session .live:before{ content:''; width:8px; height:8px; border-radius:50%; background:var(--verd); box-shadow:0 0 0 4px rgba(34,197,94,.12); }
.cnt-session b{ display:block; margin-top:6px; font-size:14px; }.cnt-session small{ color:var(--mut); font-size:11px; }.cnt-save{ min-width:72px; text-align:right; color:var(--mut); font-size:11px; }
.cnt-add{ background:linear-gradient(145deg,#171719,#101012); border:1px solid rgba(255,122,24,.35); border-radius:14px; padding:12px; margin:0 0 14px; }
.cnt-add-title{ display:flex; justify-content:space-between; gap:8px; align-items:center; margin-bottom:8px; font-size:13px; font-weight:800; color:var(--tx); }
.cnt-add-grid{ display:grid; grid-template-columns:minmax(160px,1fr) 160px auto; gap:8px; align-items:center; }
.cnt-item{ background:var(--bg2); border:1px solid var(--bd); border-radius:12px; padding:10px 12px; margin-bottom:8px; }
.cnt-div{ margin:18px 0 10px; padding:9px 12px; border-radius:10px; background:linear-gradient(90deg,rgba(249,115,22,.18),rgba(249,115,22,.04)); border:1px solid rgba(249,115,22,.4); color:var(--fg); font-weight:700; font-size:13px; display:flex; align-items:center; gap:8px; }
.cnt-div small{ color:var(--mut); font-weight:600; font-size:11px; }
.cnt-item.done{ border-color:#1d4a2a; background:linear-gradient(120deg,rgba(34,197,94,.055),var(--bg2) 45%); }
.cnt-item .top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.cnt-item .pn{ font-weight:600; font-size:15px; }
.cnt-item .ob{ font-size:10px; padding:2px 7px; border-radius:999px; background:#3a2e10; color:#ffd479; font-weight:700; flex:0 0 auto; }
.cnt-actions{ display:flex; align-items:center; gap:6px; flex:0 0 auto; }
.cnt-mini{ background:var(--bg3); border:1px solid var(--bd); color:var(--mut); border-radius:9px; padding:6px 8px; font-size:12px; cursor:pointer; }
.cnt-mini:hover{ color:var(--tx); border-color:#555; }
.cnt-mini.danger{ color:#ff9d9d; border-color:rgba(239,68,68,.34); }
.cnt-row{ display:flex; gap:8px; align-items:center; margin-top:8px; }
.cnt-row input.qt{ flex:1; text-align:center; font-size:18px; font-weight:700; }
.cnt-row .un{ color:var(--mut); font-size:13px; min-width:56px; }
.cnt-row .ig{ background:var(--bg3); border:1px solid var(--bd); color:var(--mut); border-radius:10px; padding:10px 12px; font-size:13px; cursor:pointer; }
.cnt-row .ig.on{ background:#2a2410; color:#ffd479; border-color:#5a4a16; }
.cnt-foot{ position:fixed; left:0; right:0; bottom:var(--nav-h); padding:10px 14px calc(10px + env(safe-area-inset-bottom)); background:rgba(11,11,12,.97); border-top:1px solid var(--bd); display:flex; align-items:center; gap:10px; z-index:25; box-shadow:0 -16px 40px rgba(0,0,0,.28); }
.cnt-foot .prog{ flex:1; font-size:13px; color:var(--mut); line-height:1.3; }
.cnt-bar{ height:4px; background:#29292f; border-radius:99px; overflow:hidden; margin-top:6px; }.cnt-bar i{ display:block; height:100%; background:var(--lar); border-radius:inherit; transition:width .2s; }
@media(max-width:520px){ .cnt-item{ padding:13px }.cnt-row{ align-items:stretch }.cnt-row .un{ min-width:64px; display:flex; align-items:center }.cnt-row input.qt{ min-width:0; padding:13px 8px }.cnt-row .ig{ padding:10px 9px }.cnt-session{ grid-template-columns:1fr }.cnt-save{ text-align:left }.cnt-add-grid{ grid-template-columns:1fr }.cnt-actions{ margin-left:auto }.cnt-item .top{ align-items:flex-start } }

/* Titan Inventory — layout operacional */
:root{ --surface:#141416; --surface2:#1b1b1f; --line:#2b2b31; --accent-soft:rgba(255,122,24,.12); }
header{ height:64px; padding:0 24px; }
header::after{ content:'TITAN INVENTORY'; font-size:10px; letter-spacing:1.8px; color:var(--mut); margin-right:auto; }
main{ width:100%; max-width:1480px; margin:0 auto; padding:28px 32px 104px; }
.vhead{ margin-bottom:18px; }
h2.tit{ font-size:28px; letter-spacing:-.7px; }
.searchbar{ top:64px; padding:0 0 14px; }
.product-toolbar{ display:flex; align-items:center; gap:10px; flex-wrap:nowrap; }
.product-toolbar .btn{ white-space:nowrap; }
.split-control{ position:relative; flex:0 0 auto; }
.split-control.open{ z-index:70; }
.split-button{ display:flex; align-items:stretch; border-radius:16px; background:var(--lar); color:#1a0c00; box-shadow:0 10px 22px rgba(255,122,24,.18); overflow:hidden; }
.split-button.ghost{ background:var(--bg3); color:var(--tx); border:1px solid var(--bd); box-shadow:none; }
.split-main,.split-caret{ border:0; background:transparent; color:inherit; font-weight:800; cursor:pointer; min-height:46px; }
.split-main{ padding:0 14px 0 17px; white-space:nowrap; text-align:left; }
.split-caret{ width:44px; display:grid; place-items:center; position:relative; line-height:1; }
.split-caret:hover{ background:rgba(0,0,0,.07); }
.split-caret:before{ content:''; position:absolute; left:0; top:10px; bottom:10px; width:2px; border-radius:99px; background:rgba(0,0,0,.36); }
.split-button.ghost .split-caret:before{ background:rgba(255,255,255,.18); }
.split-caret span{ position:relative; display:block; width:18px; height:18px; font-size:0; transform:translateY(-1px); transition:transform .16s ease; }
.split-caret span:before{ content:''; position:absolute; left:5px; top:4px; width:7px; height:7px; border-right:2px solid currentColor; border-bottom:2px solid currentColor; border-radius:1px; transform:rotate(45deg); }
.split-caret span:after{ display:none; content:none; }
.split-control.open .split-caret span{ transform:rotate(180deg) translateY(1px); }
.split-menu{ position:absolute; right:0; top:calc(100% + 7px); display:none; min-width:100%; width:max-content; max-width:min(360px,calc(100vw - 28px)); padding:7px; border:1px solid rgba(255,122,24,.34); border-radius:15px; background:#101012; box-shadow:0 24px 70px rgba(0,0,0,.58); z-index:90; }
.split-control.open .split-menu{ display:block; }
.split-option{ width:100%; border:0; border-top:1px solid rgba(255,255,255,.06); background:transparent; color:#e8e8ec; border-radius:10px; padding:12px 12px; text-align:left; font:500 13px/1.15 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; cursor:pointer; white-space:nowrap; display:flex; align-items:center; justify-content:space-between; gap:16px; }
.split-option:first-child{ border-top:0; }
.split-option:hover{ background:rgba(255,122,24,.1); color:#fff; }
.split-option.on{ background:rgba(255,122,24,.15); color:#fff; box-shadow:inset 3px 0 0 var(--lar); }
.split-option.on:after{ content:'✓'; color:var(--lar); font-weight:800; }
.product-filter-wrap{ margin-top:10px; overflow-x:auto; overflow-y:visible; -webkit-overflow-scrolling:touch; padding:1px 0 8px; }
.product-filter-wrap::-webkit-scrollbar{ display:none; }
.product-filter-row{ display:flex; align-items:stretch; gap:8px; width:max-content; min-width:100%; }
.filter-slot{ flex:0 0 auto; min-width:0; width:var(--filter-w,auto); }
#chipsProdStatus,#chipsCat,#chipsSetor{ flex:0 0 auto; }
.filter-slot .split-button{ width:100%; min-width:0; display:grid; grid-template-columns:minmax(0,1fr) 34px; background:#17171b; border:1px solid var(--bd); color:var(--tx); box-shadow:none; }
.filter-slot .split-main{ width:100%; min-width:0; overflow:visible; padding:0 12px 0 13px; font:500 14px/1.1 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; display:flex; flex-direction:column; justify-content:center; }
.filter-slot .split-caret{ width:34px; color:var(--lar); }
.filter-slot .split-menu{ left:0; right:auto; min-width:100%; }
.product-filter .split-menu{ position:fixed; left:var(--split-left,14px); top:var(--split-top,160px); right:auto; min-width:var(--split-width,150px); max-height:min(320px,calc(var(--vvh) - var(--split-top,160px) - 18px)); overflow:auto; }
.product-filter.filter-prodStatus .split-button{ background:rgba(255,122,24,.13); border-color:rgba(255,122,24,.52); color:var(--lar); box-shadow:none; }
.product-filter.filter-prodStatus .split-caret:before{ background:rgba(255,122,24,.30); }
.product-filter.filter-prodStatus .split-caret{ color:var(--lar); }
.filter-title{ display:block; color:#85858e; font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.48px; margin-bottom:3px; }
.filter-value{ display:block; max-width:none; overflow:visible; text-overflow:clip; white-space:nowrap; font-weight:500; }
.product-summary{ color:var(--mut); font-size:13px; margin:-9px 2px 14px; }
.plist{ display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; }
.prow.product-row{ display:block; min-height:0; padding:14px; border-radius:16px; background:rgba(20,20,22,.72); border-color:rgba(255,255,255,.09); transition:border-color .16s,transform .16s,background .16s; }
.prow.product-row:hover{ border-color:rgba(255,255,255,.16); transform:translateY(-1px); background:#18181b; }
.product-card-top{ display:flex; align-items:flex-start; gap:12px; min-width:0; }
.product-icon{ width:40px; height:40px; flex:0 0 40px; display:grid; place-items:center; border-radius:10px; background:#242428; color:#aaa; font-size:16px; font-weight:800; }
.product-card-main{ flex:1; min-width:0; }
.product-title-row{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; min-width:0; }
.product-title-row b{ color:var(--tx); font-size:14px; font-weight:600; line-height:1.25; overflow-wrap:anywhere; }
.status-pill{ flex:0 0 auto; display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:3px 8px; border:1px solid transparent; font-size:11px; font-weight:700; line-height:1; }
.status-dot{ width:6px; height:6px; border-radius:999px; background:currentColor; }
.status-pill.ok{ color:#72d98b; background:rgba(34,197,94,.1); border-color:rgba(34,197,94,.28); }
.status-pill.zero{ color:#ff8d8d; background:rgba(239,68,68,.11); border-color:rgba(239,68,68,.28); }
.status-pill.low{ color:#ffd479; background:rgba(245,181,10,.12); border-color:rgba(245,181,10,.3); }
.status-pill.off{ color:#aaa; background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.1); }
.product-path{ margin-top:6px; display:flex; flex-wrap:wrap; align-items:center; gap:4px; color:var(--mut); font-size:12px; line-height:1.35; }
.path-sep{ color:#777; opacity:.7; }
.product-meta{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.meta-pill{ display:inline-flex; align-items:center; gap:4px; font-size:11px; line-height:1; color:#b9b9c1; background:#202025; border:1px solid #2c2c33; padding:4px 7px; border-radius:7px; }
.meta-pill.sector{ color:#ffd1aa; background:rgba(255,122,24,.10); border-color:rgba(255,122,24,.30); }
.product-card-foot{ margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,.07); display:flex; align-items:flex-end; justify-content:space-between; gap:12px; }
.qty-label{ display:block; color:var(--mut); font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:.45px; }
.qty-value{ display:block; margin-top:4px; color:var(--tx); font-size:16px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }
.qty-value .unit{ color:var(--mut); font-size:13px; font-weight:400; }
.qty-block.right{ text-align:right; }
.category-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px; }
.category-card{ position:relative; padding:14px; border:1px solid rgba(255,255,255,.09); border-radius:16px; background:rgba(20,20,22,.72); transition:border-color .16s,transform .16s,background .16s; }
.category-card:hover{ border-color:rgba(255,255,255,.16); transform:translateY(-1px); background:#18181b; }
.category-card.sub{ margin-left:18px; border-color:rgba(255,122,24,.18); background:rgba(255,122,24,.045); }
.category-title{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; min-height:25px; }
.category-title b{ font-size:15px; line-height:1.25; overflow-wrap:anywhere; }
.category-sub{ margin-top:4px; color:var(--mut); font-size:12px; line-height:1.25; overflow-wrap:anywhere; }
.category-quick{ display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; }

<script>
const API = location.origin;
const $ = id => document.getElementById(id);
let user = null, _pinCtx = null, _cats = [], _forns = [], _conversoes = [], _locais = [], _catSel = '', _setorSel = '', _prodMap = {}, _fornMap = {}, _convMgrStatus = 'ativas';
let _estoqueCfg = { titulo:'Estoque', departamentos:[], tipos_item:[], unidades_medida:[] }, _estoqueCfgLoaded = false;
let _sessionKeep = false, _versionWatchStarted = false, _appVersion = null, _updateAvailable = false, _userRefreshStarted = false;

function toast(t){ const e=$('toast'); e.textContent=t; e.classList.add('on'); clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove('on'),2600); }
function applyEstoqueConfig(){
  const titulo=(_estoqueCfg&&_estoqueCfg.titulo)||'Estoque';
  document.title=titulo;
  if($('loginTitulo'))$('loginTitulo').textContent=titulo;
}
async function ensureEstoqueConfig(force){
  if(_estoqueCfgLoaded&&!force)return _estoqueCfg;
  try{
    const qs=user&&user.id?('?usuario_id='+encodeURIComponent(user.id)):'';
    const r=await fetch(API+'/api/est/configuracoes'+qs,{cache:'no-store'});
    const d=await r.json();
    if(r.ok&&d.config)_estoqueCfg=d.config;
  }catch(e){}
  _estoqueCfgLoaded=true; applyEstoqueConfig(); return _estoqueCfg;
}
function cfgOptions(list, vazio){
  const base=vazio?[{v:'',t:vazio}]:[];
  const seen=new Set(base.map(x=>String(x.v).toLowerCase()));
  for(const raw of Array.isArray(list)?list:[]){
    const v=String(raw.valor??raw.value??raw.v??raw.nome??'').trim();
    if(!v||seen.has(v.toLowerCase()))continue;
    seen.add(v.toLowerCase()); base.push({v,t:String(raw.rotulo??raw.label??raw.t??raw.nome??v)});
  }
  return base;
}
function unidadeValor(v){ return String(v==null?'':v).trim().toUpperCase(); }
function unidadeOptions(vazio){
  return cfgOptions((_estoqueCfg&&_estoqueCfg.unidades_medida)||[], vazio||'— selecione —')
    .map(o=>{
      const v=unidadeValor(o.v);
      return {v,t:v?unidadeValor(o.t||o.v):(o.t||'— selecione —')};
    });
}
function unidadeSelectOptions(value,vazio){
  const cur=unidadeValor(value);
  return unidadeOptions(vazio||'— selecione —').map(o=>`<option value="${esc(o.v)}" ${cur===String(o.v)?'selected':''}>${esc(o.t)}</option>`).join('');
}
function storedUserPayload(){
  try{ const s=localStorage.getItem('est_u'); if(s){ const u=JSON.parse(s); if(u&&u.id) return { user:u, keep:true }; } }catch(e){}
  try{ const s=sessionStorage.getItem('est_u'); if(s){ const u=JSON.parse(s); if(u&&u.id) return { user:u, keep:false }; } }catch(e){}
  return null;
}
function saveStoredUser(u, keep){
  const payload=JSON.stringify(u||{});
  try{
    if(keep){ localStorage.setItem('est_u',payload); sessionStorage.removeItem('est_u'); }
    else { sessionStorage.setItem('est_u',payload); localStorage.removeItem('est_u'); }
  }catch(e){}
}
function clearStoredUser(){ try{ localStorage.removeItem('est_u'); }catch(e){} try{ sessionStorage.removeItem('est_u'); }catch(e){} }
function updateHeaderUser(){ if(!user)return; $('hNome').textContent=user.nome||user.login||'—'; $('hPerfil').textContent=(user.perfil||'').toString().toLowerCase(); }
async function revalidarUsuario(u){
  if(!u||!u.id) return null;
  try{
    const r=await fetch(API+'/api/staff/session?usuario_id='+encodeURIComponent(u.id)+'&ts='+Date.now(),{cache:'no-store',headers:{'Cache-Control':'no-cache'}});
    const d=await r.json();
    if(r.status===401||r.status===404) return null;
    if(d&&d.usuario&&d.usuario.id) return Object.assign({},u,d.usuario);
  }catch(e){}
  return u;
}
async function refreshCurrentUser(silent){
  if(!user||!user.id) return;
  const fresh=await revalidarUsuario(user);
  if(!fresh){ clearStoredUser(); user=null; if(!silent)toast('Sessão expirada. Entre novamente.'); location.reload(); return; }
  user=fresh; saveStoredUser(user,_sessionKeep); updateHeaderUser(); carregarPerms();
}
function startUserRefresh(){ if(_userRefreshStarted)return; _userRefreshStarted=true; setInterval(()=>refreshCurrentUser(true),180000); }
async function fetchAppVersion(){
  try{
    const r=await fetch(API+'/api/app-version?scope=estoque&ts='+Date.now(),{cache:'no-store',headers:{'Cache-Control':'no-cache'}});
    const d=await r.json();
    return d&&d.estoque&&(d.estoque.version||d.estoque.mtime);
  }catch(e){ return null; }
}
function startAppVersionWatch(){
  if(_versionWatchStarted)return; _versionWatchStarted=true;
  checkAppVersion(true);
  setInterval(()=>checkAppVersion(false),60000);
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden)checkAppVersion(false); });
}
async function checkAppVersion(first){
  if(_updateAvailable)return;
  const v=await fetchAppVersion();
  if(!v)return;
  if(!_appVersion){ _appVersion=v; return; }
  if(v!==_appVersion){ _updateAvailable=true; showUpdateBanner(); }
}
function showUpdateBanner(){
  if($('login')&&!$('login').classList.contains('hide')){ setTimeout(()=>location.reload(),250); return; }
  if($('updateBanner'))return;
  const b=document.createElement('div'); b.id='updateBanner'; b.className='update-banner';
  b.innerHTML='<div><b>Nova versão do estoque disponível</b><small>Atualize a tela para receber o deploy sem sair da sua conta.</small></div><button class="btn primary sm" onclick="atualizarAppAgora()">Atualizar agora</button>';
  document.body.appendChild(b);
}
function atualizarAppAgora(){ location.reload(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function fmt(n){ n=Number(n); return Number.isInteger(n)? n : Number(n.toFixed(2)); }
function brl(n,dec){ if(n==null||n===''||!isFinite(Number(n))) return '—'; return 'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:dec||2}); }
function syncNavHeight(){ const n=$('nav'); const h=n?Math.ceil(n.getBoundingClientRect().height):64; document.documentElement.style.setProperty('--nav-h',Math.max(52,h)+'px'); }
function syncVisualViewport(){ const vv=window.visualViewport; const h=Math.round((vv&&vv.height)||window.innerHeight||document.documentElement.clientHeight||700); document.documentElement.style.setProperty('--vvh',h+'px'); document.body.classList.toggle('keyboard-open',!!(vv&&vv.height<window.innerHeight-110)); syncNavHeight(); }
if(window.visualViewport){ window.visualViewport.addEventListener('resize',syncVisualViewport); window.visualViewport.addEventListener('scroll',syncVisualViewport); syncVisualViewport(); }
window.addEventListener('resize',syncVisualViewport);
setTimeout(syncVisualViewport,0);
document.addEventListener('focusin', e=>{ if(e.target.matches('input,select,textarea')){ document.body.classList.add('keyboard-focus'); syncVisualViewport(); setTimeout(()=>{ try{ e.target.scrollIntoView({block:'center',behavior:'smooth'});}catch(_){} },220); } });
document.addEventListener('focusout',()=>setTimeout(()=>{ if(!document.activeElement||!document.activeElement.matches('input,select,textarea'))document.body.classList.remove('keyboard-focus'); syncVisualViewport(); },160));
function csCloseAll(){ document.querySelectorAll('.custom-select.open').forEach(x=>x.classList.remove('open')); }
function csToggle(id,ev){ if(ev)ev.stopPropagation(); const w=$(id+'Wrap'); if(!w)return; const open=w.classList.contains('open'); csCloseAll(); if(!open)w.classList.add('open'); }
function csPick(id,btn,ev){ if(ev)ev.stopPropagation(); const v=btn.dataset.v||'',t=btn.dataset.t||'— selecione —'; const input=$(id),txt=$(id+'Text'); if(input){ input.value=v; input.dispatchEvent(new Event('change',{bubbles:true})); } if(txt)txt.textContent=t; const w=$(id+'Wrap'); if(w){ w.querySelectorAll('.cs-option').forEach(o=>o.classList.toggle('on',o===btn)); w.classList.remove('open'); } if(id==='peCategoria'){ peRenderSugestoes(); peUpdateCategoriaResumo(); } }
function csSetValue(id,value,label){ const v=value==null?'':String(value), input=$(id), txt=$(id+'Text'), w=$(id+'Wrap'); if(input)input.value=v; if(txt)txt.textContent=label||v||'— selecione —'; if(w)w.querySelectorAll('.cs-option').forEach(o=>o.classList.toggle('on',String(o.dataset.v||'')===v)); }
function splitCloseAll(except){
  document.querySelectorAll('.split-control.open').forEach(x=>{ if(!except||x.id!==except) x.classList.remove('open'); });
}
function splitPosition(w){
  if(!w||!w.classList.contains('product-filter'))return;
  const b=w.querySelector('.split-button'), m=w.querySelector('.split-menu'); if(!b||!m)return;
  const r=b.getBoundingClientRect(), margin=14, vw=window.innerWidth||document.documentElement.clientWidth||390;
  const width=Math.max(r.width, Math.min(320, vw - margin*2));
  let left=Math.max(margin, Math.min(r.left, vw - width - margin));
  w.style.setProperty('--split-left',Math.round(left)+'px');
  w.style.setProperty('--split-top',Math.round(r.bottom+7)+'px');
  w.style.setProperty('--split-width',Math.round(width)+'px');
}
function splitPositionOpen(){ document.querySelectorAll('.split-control.open').forEach(splitPosition); }
function splitToggle(id,ev){
  if(ev)ev.stopPropagation();
  const w=$(id+'Wrap'); if(!w)return;
  const open=w.classList.contains('open');
  if(open){ w.classList.remove('open'); return; }
  splitCloseAll(); csCloseAll();
  w.classList.add('open'); splitPosition(w);
}
function splitAction(action,ev){
  if(ev)ev.stopPropagation();
  splitCloseAll();
  if(action==='categorias')return gerenciarCategorias();
  if(action==='conversoes')return gerenciarConversoes();
  if(action==='locais')return gerenciarLocais();
}
function splitTextWidth(text, font){
  try{
    const c=splitTextWidth._c||(splitTextWidth._c=document.createElement('canvas'));
    const ctx=c.getContext('2d'); ctx.font=font;
    return Math.ceil(ctx.measureText(String(text||'')).width);
  }catch(e){
    return String(text||'').length*8;
  }
}
function splitFilterWidth(items,title,valueLabel){
  const mobile=(window.innerWidth||0)<=700;
  const labels=(items||[]).map(o=>o&&o.t).concat([valueLabel,title]).filter(Boolean);
  const font=mobile?'400 13px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif':'500 14px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif';
  const maxText=labels.reduce((m,t)=>Math.max(m,splitTextWidth(t,font)),0);
  const pad=mobile?66:68;
  const min=mobile?116:128;
  return Math.max(min,Math.ceil(maxText+pad));
}
function splitSafeClass(v){
  return String(v||'vazio').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_-]+/g,'-').replace(/^-+|-+$/g,'').toLowerCase()||'vazio';
}
function splitFilter(slotId,title,valueLabel,items,onPick){
  const safe=String(slotId).replace(/[^a-zA-Z0-9_-]/g,'');
  const sel=(items||[]).find(o=>o&&o.on)||{};
  const state=splitSafeClass(sel.v||valueLabel);
  const width=splitFilterWidth(items,title,valueLabel);
  return `<div class="split-control product-filter filter-${safe} state-${state}" id="${safe}Wrap" style="--filter-w:${width}px">
    <div class="split-button ghost">
      <button type="button" class="split-main" onclick="splitToggle('${safe}',event)"><span class="filter-title">${esc(title)}</span><span class="filter-value">${esc(valueLabel)}</span></button>
      <button type="button" class="split-caret" onclick="splitToggle('${safe}',event)" aria-label="Abrir filtro ${esc(title)}"><span>⌄</span></button>
    </div>
    <div class="split-menu">${items.map(o=>`<button type="button" class="split-option opt-${splitSafeClass(o.v||o.t)} ${o.on?'on':''}" onclick="${onPick}('${String(o.v||'').replace(/'/g,"\\'")}',event)">${esc(o.t)}</button>`).join('')}</div>
  </div>`;
}
document.addEventListener('click',e=>{ if(!e.target.closest('.custom-select'))csCloseAll(); if(!e.target.closest('.split-control'))splitCloseAll(); });
window.addEventListener('resize',splitPositionOpen);
window.addEventListener('scroll',splitPositionOpen,true);

function irPin(){ const u=$('usuario').value.trim(); if(!u){ $('lgErr').textContent='Digite o usuário.'; return; }
  $('uEcho').textContent=u; $('lgErr').textContent=''; $('stepUser').classList.add('hide'); $('stepPin').classList.remove('hide'); setTimeout(()=>$('pin').focus(),80); }
function voltarUser(){ $('stepPin').classList.add('hide'); $('stepUser').classList.remove('hide'); $('pin').value=''; $('lgErr').textContent=''; }
async function entrar(){ const login=$('usuario').value.trim(), pin=$('pin').value.trim(), keep=!!($('keepLogin')&&$('keepLogin').checked); $('lgErr').textContent='';
  if(!pin){ $('lgErr').textContent='Digite o PIN.'; return; }
  let d; try{ d=await (await fetch(API+'/api/staff/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,pin,remember:keep})})).json(); }
  catch(e){ $('lgErr').textContent='Falha de conexão.'; return; }
  if(d.erro){ $('lgErr').textContent=d.erro; return; }
  if(d.must_change){ _pinCtx={login:(d.usuario&&d.usuario.login)||login, pinAtual:pin, keep}; $('mPin').classList.add('on'); setTimeout(()=>$('np1').focus(),80); return; }
  abrirApp(d.usuario,keep); }
async function confirmaPin(){ const a=$('np1').value.replace(/\D/g,''), b=$('np2').value.replace(/\D/g,''); $('mPinErr').textContent='';
  if(a.length<4){ $('mPinErr').textContent='O PIN precisa ter 4 a 6 dígitos.'; return; }
  if(a!==b){ $('mPinErr').textContent='Os PINs não conferem.'; return; }
  let d; try{ d=await (await fetch(API+'/api/staff/trocar-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:_pinCtx.login,pin_atual:_pinCtx.pinAtual,pin_novo:a})})).json(); }
  catch(e){ $('mPinErr').textContent='Falha de conexão.'; return; }
  if(d.erro){ $('mPinErr').textContent=d.erro; return; }
  $('mPin').classList.remove('on');
  const r=await (await fetch(API+'/api/staff/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:_pinCtx.login,pin:a,remember:!!(_pinCtx&&_pinCtx.keep)})})).json();
  if(r.usuario) abrirApp(r.usuario,!!(_pinCtx&&_pinCtx.keep)); else toast('PIN trocado. Entre de novo.'); }

async function abrirApp(u, keep){ user=u; _sessionKeep=!!keep; saveStoredUser(u,_sessionKeep);
  $('login').classList.add('hide'); $('app').classList.remove('hide');
  await ensureEstoqueConfig(true);
  updateHeaderUser();
  carregarPerms(); startUserRefresh(); startAppVersionWatch(); nav('inicio'); }
async function sair(){ clearStoredUser(); user=null; try{ await fetch(API+'/api/staff/logout',{method:'POST'}); }catch(e){} location.reload(); }
function temPerm(p){ if(!user) return false; if(ehGestor()) return true; return (user.perms||[]).includes(p); }
async function carregarPerms(){ if(ehGestor()){ aplicaNavPerms(); return; }
  try{ const d=await (await fetch(API+'/api/est/permissoes?usuario_id='+encodeURIComponent(user.id))).json(); user.perms=d.perms||[]; }catch(e){ user.perms=[]; }
  aplicaNavPerms(); }
const NAV_PERM={ produtos:'acessar_produtos', contagem:'acessar_contagem', fornecedores:'acessar_fornecedores' };
function maisVisivel(){ return ehGestor() || temPerm('acessar_lancamentos')||temPerm('registrar_perda_consumo')||temPerm('acessar_lista_compras_inteligente')||temPerm('acessar_visitas')||temPerm('acessar_mapa_comparativo_fornecedores')||temPerm('acessar_producao_interna')||temPerm('acessar_configuracoes')||temPerm('editar_permissoes'); }
function aplicaNavPerms(){ document.querySelectorAll('#nav button').forEach(b=>{ const v=b.dataset.v; let show=true; if(NAV_PERM[v]) show=temPerm(NAV_PERM[v]); if(v==='mais') show=maisVisivel(); b.style.display=show?'':'none'; }); }

function nav(v){ const need=NAV_PERM[v]; if(need&&!temPerm(need)) v='inicio'; if(v==='mais'&&!maisVisivel()) v='inicio';
  ['inicio','produtos','contagem','fornecedores','mais'].forEach(x=> $('v-'+x).classList.toggle('hide', x!==v));
  document.querySelectorAll('#nav button').forEach(b=> b.classList.toggle('on', b.dataset.v===v));
  window.scrollTo(0,0);
  if(v==='inicio') loadInicio(); if(v==='produtos') loadProdutos(); if(v==='fornecedores') loadFornecedores(); if(v==='contagem') loadContagem(); if(v==='mais') loadMais(); }

async function loadInicio(){ if(!ehGestor()) return loadInicioColab();
  let d; try{ d=await (await fetch(API+'/api/est/dashboard')).json(); }catch(e){ return; }
  const k=(v,l,cls='')=>`<div class="kpi ${cls}"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  $('kpis').innerHTML = k(d.produtos_ativos,'Produtos ativos')
    + k(d.zerados,'Zerados', d.zerados>0?'bad':'ok')
    + k(d.abaixo_ideal,'Abaixo do ideal', d.abaixo_ideal>0?'alert':'ok')
    + k(d.sem_fornecedor,'Sem fornecedor', d.sem_fornecedor>0?'alert':'')
    + k(d.contagens_aguardando,'Contagens p/ auditar', d.contagens_aguardando>0?'alert':'')
    + k(d.fornecedores,'Fornecedores');
  const uc=d.ultimas_contagens||[]; $('ultContagens').innerHTML = uc.length? uc.map(c=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(c.setor_nome||'—')}</b><small>${esc(c.usuario_nome||'')} · ${esc(c.status_auditoria||'')}</small></div></div>`).join('') : '<div class="empty">Nenhuma contagem ainda.</div>';
  const cp=d.ultimas_compras||[]; $('ultCompras').innerHTML = cp.length? cp.map(c=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(c.fornecedor||'—')}</b><small>${esc(c.usuario_nome||'')}</small></div><div class="qt"><span class="big">R$ ${Number(c.total||0).toFixed(2)}</span></div></div>`).join('') : '<div class="empty">Nenhuma compra ainda.</div>';
}
async function loadInicioColab(){
  const sec=$('v-inicio');
  let d; try{ d=await (await fetch(API+'/api/est/meus-itens?usuario_id='+encodeURIComponent(user.id))).json(); }catch(e){ d={itens:[]}; }
  const itens=d.itens||[]; const byS={}; itens.forEach(i=>{ (byS[i.setor||'—']=byS[i.setor||'—']||[]).push(i); });
  let h=`<div class="vhead"><h2 class="tit">Olá, ${esc((user.nome||user.login||'').split(' ')[0])}</h2></div>`;

function pedirForm(titulo,campos,okLabel='Criar',comExcluir=false){ return new Promise(resolve=>{
  const ov=document.createElement('div'); ov.className='modal on';
  const fields=campos.map((c,i)=>{
    if(c.type==='unit'){
      const cid='pf_'+String(c.key||'unidade').replace(/[^a-zA-Z0-9_-]/g,'_')+'_'+i;
      return peCustomSelect(cid,c.label,unidadeValor(c.value||'UNIDADE'),unidadeOptions('— selecione —'),c.help||'Escolha uma unidade cadastrada.',`data-k="${esc(c.key)}"`);
    }
    if(c.type==='select') return `<label class="flabel">${c.label}<select data-k="${c.key}" class="field">${c.opts.map(o=>`<option value="${o.v}" ${String(c.value)===String(o.v)?'selected':''}>${esc(o.t)}</option>`).join('')}</select></label>`;
    if(c.type==='check') return `<label class="fcheck"><input type="checkbox" data-k="${c.key}" ${c.value?'checked':''}> ${c.label}</label>`;
    if(c.type==='textarea') return `<label class="flabel">${c.label}<textarea data-k="${c.key}" class="field" rows="2">${esc(c.value)}</textarea></label>`;
    return `<label class="flabel">${c.label}<input data-k="${c.key}" class="field" type="${c.type||'text'}" inputmode="${c.type==='number'?'decimal':'text'}" value="${c.value!=null?esc(c.value):''}"></label>`;
  }).join('');
  const delBtn = comExcluir? '<button class="btn danger" data-act="del">Excluir</button>' : '';
  ov.innerHTML=`<div class="box"><h3 style="margin:0 0 6px">${titulo}</h3><div class="fgrid">${fields}</div>
    <div class="mfoot"><button class="btn ghost" data-act="cancel">Cancelar</button>${delBtn}<button class="btn primary" data-act="ok">${okLabel}</button></div></div>`;
  ov.querySelector('[data-act="cancel"]').onclick=()=>{ document.body.removeChild(ov); resolve(null); };
  if(comExcluir) ov.querySelector('[data-act="del"]').onclick=()=>{ document.body.removeChild(ov); resolve('__del__'); };
  ov.querySelector('[data-act="ok"]').onclick=()=>{ const out={}; ov.querySelectorAll('[data-k]').forEach(el=>{ let v= el.type==='checkbox'?el.checked:el.value; if((el.tagName==='SELECT'||el.type==='hidden')&&v==='')v=null; out[el.dataset.k]=v; }); if(!String(out.nome||'').trim()){ toast('Informe o nome'); return; } document.body.removeChild(ov); resolve(out); };
  document.body.appendChild(ov); const f=ov.querySelector('input:not([type="hidden"]),select,textarea,.cs-button'); if(f) setTimeout(()=>f.focus(),60);
}); }
function pedirConfirm(titulo,msg,confirmLabel='Excluir'){ return new Promise(resolve=>{
  const ov=document.createElement('div'); ov.className='modal on'; ov.style.zIndex='120';
  ov.innerHTML=`<div class="box"><h3 style="margin:0 0 6px">${titulo}</h3><p class="mut sm" style="margin:0 0 12px">${msg}</p>
    <div class="mfoot"><button class="btn ghost" data-act="c">Cancelar</button><button class="btn danger" data-act="d">${esc(confirmLabel)}</button></div></div>`;
  ov.querySelector('[data-act="c"]').onclick=()=>{ document.body.removeChild(ov); resolve(false); };
  ov.querySelector('[data-act="d"]').onclick=()=>{ document.body.removeChild(ov); resolve(true); };
  document.body.appendChild(ov);
}); }

let _allProds=[], _conf=null;
async function ensureAllProds(force){ if(force)_allProds=[]; if(!_allProds.length){ try{ _allProds=(await (await fetch(API+'/api/est/produtos')).json()).produtos||[]; }catch(e){} } }
function matchProduto(txt){ if(!txt) return ''; const t=String(txt).toLowerCase(); let best=''; for(const p of _allProds){ const n=p.nome.toLowerCase(); if(n===t) return p.id; if(n.includes(t)||t.includes(n)){ best=best||p.id; } } return best; }
function normBuscaLocal(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim(); }
function matchFornecedor(nome){
  if(!nome) return '';
  const t=normBuscaLocal(nome); if(!t)return '';
  const toks=t.split(' ').filter(x=>x.length>2&&!['ltda','s/a','sa','industria','brasileira','bebidas','comercio'].includes(x));
  let best=null;
  for(const f of _forns){
    const n=normBuscaLocal(f.nome);
    if(n.includes(t)||t.includes(n)) return f.id;
    const hit=toks.filter(x=>n.includes(x)).length;
    const score=hit/(toks.length||1);
    if(score>.55&&(!best||score>best.score))best={id:f.id,score};
  }
  return best?best.id:'';
}
function csInline(id,value,items,hiddenAttrs=''){

}

function downscaleImg(file){ return new Promise((resolve,reject)=>{ const fr=new FileReader(); fr.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=1800; let w=img.width,h=img.height; if(w>h&&w>max){ h=Math.round(h*max/w); w=max; } else if(h>=w&&h>max){ w=Math.round(w*max/h); h=max; } const cv=document.createElement('canvas'); cv.width=w; cv.height=h; const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high'; ctx.drawImage(img,0,0,w,h); resolve(cv.toDataURL('image/jpeg',0.86)); }; img.onerror=reject; img.src=fr.result; }; fr.onerror=reject; fr.readAsDataURL(file); }); }

   <select class="field" onchange="confSet(${i},'produto_id',this.value)">${opts.map(p=>`<option value="${p.id}" ${String(l.produto_id)===String(p.id)?'selected':''}>${esc(p.nome)}</option>`).join('')}</select>

function compraProdutoNome(id){ const p=_allProds.find(x=>String(x.id)===String(id)); return p?p.nome:''; }
function compraPct(v){ const n=Number(v||0); return Math.round(n*100)+'%'; }
function compraLinha(it){
  it=it||{}; const txt=it.produto||it.nome||it.texto||'';
  const qtd=compraPrimeiro(it.quantidade_estoque,it.qtd_estoque,it.quantidade_operacional,it.quantidade);
  const unidade=unidadeValor(compraPrimeiro(it.unidade_estoque,it.unidade_operacional,it.unidade));
  const vt=compraPrimeiro(it.valor_total_com_impostos,it.custo_total_com_impostos,it.custo_total,it.valor_total);
  let vu=compraPrimeiro(it.valor_unitario_com_impostos,it.custo_unitario_com_impostos,it.custo_unitario,it.valor_unitario);
  const qn=compraNum(qtd), vtn=compraNum(vt);
  if((vu===''||vu==null)&&qn>0&&vtn!=null)vu=Number((vtn/qn).toFixed(4));
  return {_txt:txt,produto_id:matchProduto(txt),marca:it.marca||'',quantidade:qtd,unidade,valor_unitario:vu,valor_total:vt,quantidade_nf:it.quantidade_nf||'',unidade_nf:it.unidade_nf||'',embalagem_qtd:it.embalagem_qtd||it.quantidade_por_embalagem||'',_obs:it.observacao||it.alerta||'',match_score:null,match_status:txt?'pendente':'manual',match_sugestoes:[]};
}
function matchProduto(txt){
  if(!txt)return '';
  const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
  const t=norm(txt); if(!t)return '';
  for(const p of _allProds){ if(norm(p.nome)===t) return p.id; }
  return '';
}
async function compraResolverMatches(force){
  if(!_conf)return;
  const textos=_conf.linhas.map((l,i)=>({idx:i,texto:l._txt||'',marca:l.marca||'',unidade:l.unidade||''})).filter(x=>x.texto||x.marca);
  if(!textos.length){ toast('Sem nomes para resolver.'); return; }
  try{
    const d=await estFetch('/api/est/match-produtos','POST',{textos});
    (d.resultados||[]).forEach(r=>{
      const l=_conf.linhas[Number(r.idx)]; if(!l)return;
      l.match_sugestoes=r.sugestoes||[];
      const best=r.melhor;
      if(best&&best.status==='auto'&&(force||!l.produto_id)){
        l.produto_id=best.id; l.match_score=best.score; l.match_status='auto';
      }else if(best&&!l.produto_id){
        l.match_score=best.score; l.match_status=best.status||'sugestao';
      }else if(!best&&!l.produto_id){
        l.match_score=null; l.match_status='sem_match_seguro';
      }
    });
    renderConf();
  }catch(e){}
}

function listaAddProd(){ const el=$('listaAuto'); const nome=(el.value||'').trim(); if(!nome) return;

  if(!p){ toast('Produto não encontrado'); return; }
  if(_lista.itens.some(i=>i.produto_id===p.id)){ toast('Já está na lista'); el.value=''; return; }
  const sug=(p.estoque_ideal!=null)?Math.max(Number(p.estoque_ideal)-Number(p.estoque_atual||0),0):'';
  _lista.itens.push({produto_id:p.id,produto:p.nome,quantidade:sug!==''?fmt(sug):'',unidade:p.unidade||'',confianca:100}); el.value=''; listaRender(); }
async function listaColar(){ const t=($('listaTxt')&&$('listaTxt').value)||''; if(!t.trim()){ toast('Cole a lista primeiro'); return; }
  let d; try{ d=await estFetch('/api/est/lista/interpretar','POST',{texto:t}); }catch(e){ return; }
  let add=0,nf=0; for(const it of (d.itens||[])){
    if(it.produto_id){ if(!_lista.itens.some(x=>x.produto_id===it.produto_id)){ _lista.itens.push({produto_id:it.produto_id,produto:it.produto,quantidade:it.quantidade!=null?it.quantidade:'',unidade:it.unidade||'',confianca:it.confianca,_txt:it.texto_original}); add++; } }
    else { _lista.itens.push({produto_id:null,produto:null,quantidade:'',unidade:'',confianca:0,_txt:it.texto_original}); nf++; } }
  toast(add+' reconhecidos'+(nf?', '+nf+' p/ ajustar':'')); if($('listaTxt'))$('listaTxt').value=''; listaRender(); }
function listaRender(){ const el=$('listaItens'); if(!el) return; if($('listaN'))$('listaN').textContent=_lista.itens.length;
  el.innerHTML=_lista.itens.length? _lista.itens.map((it,i)=>listaRowHTML(it,i)).join('') : '<div class="empty">Nenhum item ainda.</div>'; listaProg(); }
function listaRowHTML(it,i){ const opts=[{id:'',nome:'— escolher produto —'}].concat(_allProds);
  const conf=it.produto_id?(it.confianca>=80?'<span class="tag ok">'+it.confianca+'%</span>':'<span class="tag low">'+it.confianca+'%</span>'):'<span class="tag zero">ajustar</span>';
  const head=it._txt?`<div class="xs mut" style="margin-bottom:4px">“${esc(it._txt)}” ${conf}</div>`:`<div class="pn">${esc(it.produto||'')} ${conf}</div>`;
  const sel=(!it.produto_id||it._txt)?`<select class="field" onchange="listaSet(${i},'produto_id',this.value)">${opts.map(p=>`<option value="${p.id}" ${String(it.produto_id)===String(p.id)?'selected':''}>${esc(p.nome)}</option>`).join('')}</select>`:'';
  return `<div class="cnt-item" style="margin-bottom:8px">${head}${sel}
   <div class="cnt-row"><input class="field" style="flex:1" inputmode="decimal" placeholder="qtd" value="${esc(it.quantidade)}" onchange="listaSet(${i},'quantidade',this.value)"><select class="field" style="flex:1" onchange="listaSet(${i},'unidade',this.value)">${unidadeSelectOptions(it.unidade,'— unid —')}</select><button class="ig" onclick="listaDel(${i})">remover</button></div></div>`; }
function listaSet(i,k,v){ if(k==='produto_id'){ const p=_allProds.find(x=>String(x.id)===String(v)); _lista.itens[i].produto_id=p?p.id:null; _lista.itens[i].produto=p?p.nome:null; if(p){ _lista.itens[i].confianca=100; if(!_lista.itens[i].unidade)_lista.itens[i].unidade=unidadeValor(p.unidade||''); } listaRender(); return; } _lista.itens[i][k]=k==='unidade'?unidadeValor(v):v; }
function listaDel(i){ _lista.itens.splice(i,1); listaRender(); }
function listaProg(){ const n=_lista.itens.filter(x=>x.produto_id).length; const el=$('listaProg'); if(el) el.textContent=n+' prontos'; }
async function gerarRota(){ const itens=_lista.itens.filter(x=>x.produto_id).map(x=>({produto_id:x.produto_id,quantidade:String(x.quantidade).replace(',','.')||null,unidade:x.unidade}));
  if(!itens.length){ toast('Adicione ao menos um produto'); return; }
  let d; try{ d=await estFetch('/api/est/lista/gerar','POST',{itens}); }catch(e){ return; } renderRota(d); }
function renderRota(d){ const money=v=>v!=null?'R$ '+Number(v).toFixed(2):'—';
  let h=`<div class="vhead"><h2 class="tit">Rota de compras</h2><button class="btn ghost sm" onclick="listaTela()">‹ Editar</button></div>`;
  if(d.alerta) h+=`<div style="background:#2a1a05;border:1px solid var(--lar);color:#ffcf99;border-radius:12px;padding:12px;margin-bottom:10px;font-weight:600;font-size:14px">⚠️ ${esc(d.alerta)}</div>`;
  if(d.ir_primeiro_em) h+=`<div class="sec">Ir primeiro em</div><div class="cnt-item"><div class="pn" style="color:var(--lar)">📍 ${esc(d.ir_primeiro_em)}</div></div>`;
  h+=`<div class="sec">Comprar por fornecedor</div>`+((d.comprar_por_fornecedor||[]).map(g=>`<div class="cnt-item" style="margin-bottom:8px"><div class="cnt-row" style="justify-content:space-between"><b>${esc(g.fornecedor||'—')}</b><span class="big">${g.total?money(g.total):''}</span></div>
     ${g.itens.map(it=>`<div class="cnt-row" style="justify-content:space-between;gap:8px;align-items:flex-start"><span style="flex:1">${esc(it.produto)} ${it.essencial?'<span class="tag low">essencial</span>':''}<br><small class="mut">${it.quantidade!=null?fmt(it.quantidade):'?'} ${esc(it.unidade||'')}${it.marca?' · '+esc(it.marca):''}</small></span><span>${money(it.estimativa)}</span></div>`).join('')}</div>`).join('')||'<div class="empty">—</div>');
  if(d.confirmar_antes&&d.confirmar_antes.length) h+=`<div class="sec">Confirmar antes de sair</div>`+d.confirmar_antes.map(it=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(it.produto)}</b><small>${esc(it.fornecedor||'')} · ${esc(it.status_fornecedor||'verificar marca')}</small></div></div>`).join('');
  if(d.substitutos&&d.substitutos.length) h+=`<div class="sec">Substitutos possíveis</div>`+d.substitutos.map(s=>`<div class="cnt-item" style="margin-bottom:8px"><div class="pn">${esc(s.produto)}</div>${s.opcoes.map(o=>`<div class="cnt-row" style="justify-content:space-between"><span>${esc(o.fornecedor)} ${o.marca_parecida?'<small class="mut">~'+esc(o.marca_parecida)+'</small>':''}</span><span>${money(o.preco)}</span></div>`).join('')}</div>`).join('');
  if(d.nao_encontrados&&d.nao_encontrados.length) h+=`<div class="sec">Sem histórico de fornecedor</div>`+d.nao_encontrados.map(it=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(it.produto)}</b><small>${it.quantidade!=null?fmt(it.quantidade):'?'} ${esc(it.unidade||'')} · defina onde comprar</small></div></div>`).join('');
  h+=`<div class="cnt-foot"><div class="prog">Estimativa: <b>${money(d.estimativa_total)}</b></div><button class="btn primary sm" onclick="loadMais()">Concluir</button></div>`;
  $('maisWrap').innerHTML=h; }

/* ===== RECEITAS (configuração das fichas de produção) ===== */
let _rec={status:'ativas',q:'',items:[],kpis:null}, _recBt=null;
function recNorm(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim(); }
async function receitasTela(status){
  if(status)_rec.status=status;
  const w=$('maisWrap');
  w.innerHTML=`<div class="vhead"><h2 class="tit">Receitas</h2><button class="btn ghost sm" onclick="loadMais()">Voltar</button></div>
    <p class="mut sm" style="margin:0 0 10px">Crie e edite receitas que geram itens de estoque. A produção usa essas fichas para dar baixa nos insumos e entrada no item produzido.</p>
    <div id="receitasList"><div class="empty">Carregando receitas...</div></div>`;
  try{
    const qs=new URLSearchParams({usuario_id:user.id,status:_rec.status,q:_rec.q||''});
    const r=await fetch(API+'/api/est/receitas?'+qs.toString()),d=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(d.erro||'Erro ao carregar receitas');
    _rec.items=d.receitas||[]; _rec.kpis=d.kpis||{};
  }catch(e){ _rec.items=[]; _rec.kpis={}; toast(e.message||'Erro ao carregar receitas'); }
  recRender();
}
function recStatusChip(st,label,count){ return `<button class="chip ${_rec.status===st?'on':''}" onclick="recSetStatus('${st}')">${label}${count!=null?' · '+count:''}</button>`; }
function recRender(){
  const k=_rec.kpis||{}, items=_rec.items||[];
  const filtros=`<div class="panel" style="margin-bottom:10px">
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px">
      <div class="cnt-item" style="margin:0"><div class="mut xs">Ativas</div><b>${k.ativas||0}</b></div>
      <div class="cnt-item" style="margin:0"><div class="mut xs">Incompletas</div><b>${k.incompletas||0}</b></div>
      <div class="cnt-item" style="margin:0"><div class="mut xs">Inativas</div><b>${k.inativas||0}</b></div>
      <div class="cnt-item" style="margin:0"><div class="mut xs">Total</div><b>${k.total||0}</b></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      ${recStatusChip('ativas','Ativas',(k.ativas||0)+(k.incompletas||0))}
      ${recStatusChip('inativas','Inativas',k.inativas)}
      ${recStatusChip('todas','Todas',k.total)}
      <button class="btn primary sm" style="margin-left:auto" onclick="recNovaReceita()">+ Nova receita</button>
    </div>
    <input id="recBusca" class="field" placeholder="Buscar receita, setor, categoria..." value="${esc(_rec.q||'')}" oninput="recBuscaDebounce()">
  </div>`;
  const list=items.length?items.map(recCard).join(''):'<div class="empty">Nenhuma receita neste filtro. Use “Nova receita” para transformar um produto cadastrado em item produzido.</div>';
  $('receitasList').innerHTML=filtros+`<div class="plist">${list}</div>`;
}
function recCard(r){
  const situacao=r.situacao==='ativa'?'Ativa':r.situacao==='incompleta'?'Incompleta':'Inativa';
  const cor=r.situacao==='ativa'?'ok':r.situacao==='incompleta'?'low':'off';
  const tipo=r.tipo==='INGREDIENTE_BENEFICIADO'?'Ingrediente beneficiado':'Produto produzido';
  const info=[r.departamento,r.categoria,r.subcategoria].filter(Boolean).join(' › ')||'Sem classificação';
  const desc=(r.descricao&&r.descricao!==r.nome)?`<div class="help" style="margin-top:8px">${esc(r.descricao)}</div>`:'';
  const prep=r.instrucoes?`<div class="help" style="margin-top:8px"><b>Preparo:</b> ${esc(String(r.instrucoes).slice(0,180))}${String(r.instrucoes).length>180?'...':''}</div>`:'';
  const acoes=[];
  if(r.situacao==='inativa') acoes.push(`<button class="btn primary sm" onclick="recRestaurar(${r.produto_id})">Restaurar</button>`);
  else {
    acoes.push(`<button class="btn ghost sm" onclick="abrirFichaProd(${r.produto_id})">${r.incompleta?'Completar ficha':'Editar ficha'}</button>`);
    if(r.ativa) acoes.push(`<button class="btn primary sm" onclick="recProduzir(${r.produto_id})">Lançar produção</button>`);
    acoes.push(`<button class="btn danger sm" onclick="recInativar(${r.produto_id})">Excluir da tela</button>`);
  }
  return `<div class="cnt-item" style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start">
      <div style="min-width:0"><div class="eyebrow">${esc(tipo)}</div><h3 style="margin:2px 0 4px">${esc(r.nome)}</h3><div class="mut sm">${esc(info)} · setor ${esc(r.setores||'Sem setor')}</div></div>
      <span class="tag ${cor}">${situacao}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px">
      <div class="panel" style="margin:0;padding:10px"><div class="mut xs">Porções</div><b>${r.porcoes||0}</b></div>
      <div class="panel" style="margin:0;padding:10px"><div class="mut xs">Ingredientes</div><b>${r.ingredientes||0}</b></div>
      <div class="panel" style="margin:0;padding:10px"><div class="mut xs">Rende em</div><b>${esc(r.unidade_consumo||r.unidade||'')}</b></div>
      <div class="panel" style="margin:0;padding:10px"><div class="mut xs">Estoque atual</div><b>${fmt(r.estoque_atual)} ${esc(r.unidade||'')}</b></div>
    </div>
    ${desc}${prep}
    ${r.incompleta?'<div class="help" style="margin-top:8px;color:#f59e0b">Receita marcada como produzida, mas a ficha ainda está sem estrutura completa. Complete antes de lançar produção.</div>':''}
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:12px">${acoes.join('')}</div>
  </div>`;
}
function recBuscaDebounce(){ clearTimeout(_recBt); _rec.q=($('recBusca')&&$('recBusca').value)||''; _recBt=setTimeout(()=>receitasTela(_rec.status),300); }
function recSetStatus(st){ _rec.status=st; receitasTela(st); }
async function recNovaReceita(){
  await ensureAllProds(true);
  const prods=(_allProds||[]).filter(p=>p.ativo!==false).sort((a,b)=>String(a.nome).localeCompare(String(b.nome)));
  const ov=document.createElement('div'); ov.className='modal on est-modal'; ov.id='recNovoModal';
  ov.innerHTML=`<div class="box" style="max-width:620px"><h3 style="margin:0 0 6px">Nova receita</h3>
    <p class="mut sm" style="margin:0 0 12px">Escolha um produto já cadastrado. A receita vai transformar esse produto em item produzido internamente, sem criar duplicidade.</p>
    <label class="flabel">Produto<input id="recNovoProduto" class="field" list="recProdutosOpts" placeholder="Digite o nome do item produzido"></label>
    <datalist id="recProdutosOpts">${prods.map(p=>`<option value="${esc(p.nome)} #${p.id}"></option>`).join('')}</datalist>
    <div class="help">Se o produto ainda não existe, crie primeiro em Produtos para manter estoque, compras e contagens na mesma fonte.</div>
    <div class="mfoot"><button class="btn ghost" onclick="document.getElementById('recNovoModal').remove()">Cancelar</button><button class="btn ghost" onclick="document.getElementById('recNovoModal').remove();novoProduto()">Criar produto</button><button class="btn primary" onclick="recAbrirNova()">Continuar</button></div></div>`;
  document.body.appendChild(ov); setTimeout(()=>{const i=$('recNovoProduto'); if(i)i.focus();},60);
}
function recAbrirNova(){
  const raw=($('recNovoProduto')&&$('recNovoProduto').value||'').trim();
  const m=raw.match(/#(\d+)\s*$/);
  let p=m?(_allProds||[]).find(x=>String(x.id)===String(m[1])):null;
  if(!p){ const n=recNorm(raw); p=(_allProds||[]).find(x=>recNorm(x.nome)===n); }
  if(!p){ toast('Escolha um produto cadastrado da lista'); return; }
  const modal=$('recNovoModal'); if(modal)modal.remove();
  abrirFichaProd(p.id);
}
async function recInativar(pid){ if(!await pedirConfirm('Excluir receita da tela','A ficha será inativada e sairá da tela de receitas ativas. Produto e histórico permanecem preservados no banco.','Excluir da tela'))return;
  try{ await estFetch('/api/est/producao/ficha/'+pid,'DELETE',{}); toast('Receita inativada; histórico preservado'); await receitasTela(_rec.status); }catch(e){} }
async function recRestaurar(pid){ if(!await pedirConfirm('Restaurar receita','A ficha volta para receitas ativas e poderá ser usada na produção interna.','Restaurar'))return;
  try{ await estFetch('/api/est/producao/ficha/'+pid+'/restaurar','POST',{}); toast('Receita restaurada'); await receitasTela('ativas'); }catch(e){} }
async function recProduzir(pid){ await producaoTela(); const p=(_prod.produzidos||[]).find(x=>Number(x.id)===Number(pid)); if(!p){ toast('Complete a ficha antes de lançar produção'); return; } await abreProducao(pid); }

/* ===== PRODUÇÃO INTERNA ===== */
let _prod={ produzidos:[], insumos:[], sel:null, ficha:[] };
async function producaoTela(){ const w=$('maisWrap');
  w.innerHTML=`<div class="vhead"><h2 class="tit">Produção interna</h2><button class="btn ghost sm" onclick="loadMais()">Voltar</button></div>
   <p class="mut sm" style="margin:0 0 10px">Escolha o produto produzido. Ao lançar, o app dá baixa nos insumos e entrada no produzido, com histórico.</p>

   <div class="sec">Últimas produções</div><div class="plist" id="prodRuns"><div class="empty">—</div></div>`;
  let d; try{ d=await (await fetch(API+'/api/est/producao/produzidos')).json(); }catch(e){ d={}; }
  _prod.produzidos=d.produzidos||[]; _prod.insumos=d.insumos||[];
  $('prodList').innerHTML=_prod.produzidos.length? _prod.produzidos.map(p=>`<button class="setor-btn" onclick="abreProducao(${p.id})"><span>${esc(p.nome)} <small class="mut">${fmt(p.estoque_atual)} ${esc(p.unidade||'')}</small></span><span>Produzir ›</span></button>`).join('') : '<div class="empty">Nenhum produto marcado como “Produzido internamente”. Marque a opção no cadastro do produto.</div>';
  let rs=[]; try{ rs=((await (await fetch(API+'/api/est/producoes')).json()).producoes)||[]; }catch(e){}
  $('prodRuns').innerHTML=rs.length? rs.map(r=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(r.produto)}</b><small>${esc(r.usuario_nome||'')}</small></div><div class="qt"><span class="big">${fmt(r.quantidade)} <span class="mut xs">${esc(r.unidade||'')}</span></span></div></div>`).join('') : '<div class="empty">Nenhuma produção ainda.</div>'; }
async function abreProducao(pid){ _prod.sel=_prod.produzidos.find(p=>p.id===pid); if(!_prod.sel) return;
  let d; try{ const r=await fetch(API+'/api/est/producao/ficha?produto_id='+pid);d=await r.json();if(!r.ok)throw new Error(d.erro||'Erro ao abrir ficha'); }catch(e){ d={porcoes:[]};toast(e.message||'Erro ao abrir ficha'); }
  _prod.ficha=d.porcoes||[]; _prod.porcao=_prod.ficha[0]||null; renderProducao(); }
function renderProducao(){ const p=_prod.sel; const isG=ehGestor();
  const po=_prod.porcao; const rows=po&&po.itens&&po.itens.length?po.itens.map(it=>`<div class="cnt-row" style="justify-content:space-between;gap:8px;align-items:flex-start"><span style="flex:1">${esc(it.insumo)}<br><small class="mut">${fmt(it.quantidade)} ${esc(it.unidade||'')} por porção</small></span><span class="mut sm">${it.custo_item!=null?'R$ '+Number(it.custo_item).toFixed(2):''}</span></div>`).join(''):'<div class="empty">Esta porção ainda não tem ingredientes.</div>';
  $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">${esc(p.nome)}</h2><button class="btn ghost sm" onclick="producaoTela()">Voltar</button></div>
   <div class="sec">Porção da ficha</div>${_prod.ficha.length?`<select id="prodPorcao" class="field" onchange="prodSelPorcao(this.value)">${_prod.ficha.map(x=>`<option value="${x.id}" ${po&&String(po.id)===String(x.id)?'selected':''}>${esc(x.nome)} · rende ${fmt(x.rendimento)} ${esc(x.unidade||p.unidade||'')}</option>`).join('')}</select>`:'<div class="empty">Sem ficha técnica. Cadastre a ficha no painel do gestor.</div>'}
   ${po?`<div class="cnt-item">${rows}<div class="cnt-row" style="justify-content:space-between;border-top:1px solid var(--bd);padding-top:9px"><b>Custo estimado</b><b style="color:var(--verd)">${po.custo_total!=null?'R$ '+Number(po.custo_total).toFixed(2):'—'}</b></div></div>`:''}
   <div class="sec">Lançar produção</div>
   <label class="flabel">Quantas porções/lotes foram preparados?<input id="prodQtd" class="field" inputmode="decimal" placeholder="ex: 3" oninput="prodPreview()"></label>
   <div id="prodPreview" class="cnt-item mut sm">${po?'Cada porção rende '+fmt(po.rendimento)+' '+esc(po.unidade||p.unidade||''):''}</div>
   <label class="flabel">Total realmente rendido (${esc(p.unidade||'un')}) <small class="mut">— opcional; diferença abaixo do esperado vira perda</small><input id="prodRend" class="field" inputmode="decimal" placeholder="resultado real"></label>
   <label class="flabel">Observação<input id="prodObs" class="field" placeholder="opcional"></label>
   <div style="padding-bottom:90px"></div>
   <div class="cnt-foot"><div class="prog"></div><button class="btn primary sm" onclick="lancarProducao()" ${po?'':'disabled'}>Confirmar produção</button></div>`; }
function prodSelPorcao(id){_prod.porcao=_prod.ficha.find(x=>String(x.id)===String(id))||null;renderProducao();}
function prodPreview(){const q=parseFloat((($('prodQtd')&&$('prodQtd').value)||'').replace(',','.'))||0,po=_prod.porcao,el=$('prodPreview');if(el&&po)el.innerHTML=q>0?`Esperado: <b>${fmt(q*Number(po.rendimento))} ${esc(po.unidade||_prod.sel.unidade||'')}</b> · os ingredientes serão baixados ${fmt(q)} vez(es).`:`Cada porção rende ${fmt(po.rendimento)} ${esc(po.unidade||_prod.sel.unidade||'')}`;}
function fichaModal(insOpts){ return new Promise(resolve=>{
  const ov=document.createElement('div'); ov.className='modal on';
  ov.innerHTML=`<div class="box"><h3 style="margin:0 0 6px">Adicionar insumo</h3><div class="fgrid">
    <label class="flabel">Insumo<select data-k="insumo_produto_id" class="field"><option value="">—</option>${insOpts.map(i=>`<option value="${i.id}">${esc(i.nome)}</option>`).join('')}</select></label>
    <label class="flabel">Consumo por unidade produzida<input data-k="quantidade_por_unidade" class="field" type="number" inputmode="decimal"></label>

  try{ const d=await estFetch('/api/est/movimento/foto','POST',{image:dataUrl,tipo:_mov.tipo}); _mov.foto=d; if(d.produto&&$('movProd'))$('movProd').value=d.produto; if(d.quantidade!=null&&$('movQtd'))$('movQtd').value=String(d.quantidade).replace('.',','); if(d.unidade&&$('movUn'))$('movUn').value=String(d.unidade).toUpperCase(); if(d.observacao&&$('movMot')&&!$('movMot').value)$('movMot').value=d.observacao; const r=d.match||{},best=r.melhor; _mov.sugestoes=r.sugestoes||[]; if(best&&best.status==='auto'){ _mov.produto_id=best.id; _mov.match_score=best.score; _mov.match_status='auto'; if($('movProd'))$('movProd').value=best.nome; } else { _mov.produto_id=''; _mov.match_score=best&&best.score; _mov.match_status=best?best.status:'sem_match_seguro'; } movRenderMatch(); toast('Foto interpretada. Revise antes de lançar.'); }catch(e){}
}
async function lancarMov(){ const nome=($('movProd')&&$('movProd').value||'').trim(); const q=($('movQtd')&&$('movQtd').value||'').replace(',','.'); const un=($('movUn')&&$('movUn').value)||''; const mot=($('movMot')&&$('movMot').value)||'';
  if(!nome){ toast('Informe o produto'); return; } if(!(parseFloat(q)>0)){ toast('Informe a medida'); return; }
  if(!_mov.produto_id) await movResolverMatch(true);
  if(!_mov.produto_id){ toast('Confirme o produto cadastrado antes de lançar.'); return; }
  const obs=[un?('unidade informada: '+un):'',_mov.foto&&_mov.foto.leitura_balanca?('balanca: '+_mov.foto.leitura_balanca):''].filter(Boolean).join(' | ');
  try{ const d=await estFetch('/api/est/movimento','POST',{tipo:_mov.tipo,produto_id:_mov.produto_id,quantidade:q,unidade:un,motivo:mot,observacao:obs});
    const conv=(d.quantidade_lancada!=null&&Math.abs(Number(d.quantidade_lancada)-Number(q))>0.0001)?`<div class="mut sm">Convertido para baixa: ${fmt(d.quantidade_lancada)} ${esc(d.unidade||'')}</div>`:'';
    $('movResp').innerHTML=`<div class="cnt-item"><div class="pn" style="color:var(--lar)">${esc(d.produto)}</div><div class="mut sm">Estoque: ${fmt(d.antes)} → ${fmt(d.depois)} ${esc(d.unidade||'')}</div>${conv}</div>`;
    toast('Lançado'); ['movProd','movQtd','movMot'].forEach(id=>{ if($(id))$(id).value=''; }); _mov.produto_id=''; _mov.sugestoes=[]; _mov.match_status='manual'; movRenderMatch(); movLoadDash(); }catch(e){}
}

// Mostra a normalização: base, fator e preço derivado — usando o fator DESTE produto. Sem fator

function peNormaliza(){ const out=$('peNormReadout'); if(!out)return;

  if(base==='un'){ linhas.push('Base: <b>unidade</b> — item discreto, sem conversão de peso.'); }
  else if(!base){ linhas.push('<span class="mut">Defina a base canônica (g, ml ou un) para ver a normalização.</span>'); }
  else if(fator>0){ linhas.push(`Fator: <b>1 ${esc(unidade)} = ${fmt(fator)} ${base}</b>`); }
  else { linhas.push(`Base: <b>${base}</b> — informe o peso/volume por 1 ${esc(unidade)} para normalizar.`); }
  const podeDerivar = !revisao && fator>0 && base && base!=='un';
  if(preco==null){ linhas.push('<span class="mut">Precificação por medida: <b>—</b> · aguardando 1ª compra (preenchida por Compras/Visitas).</span>'); }
  else if(base==='un' && !revisao){ linhas.push(`Precificação: <b>${brl(preco)}</b> / unidade.`); }
  else if(podeDerivar){ const pb=preco/fator; linhas.push(`Precificação por medida: ${esc(unidade)} <b>${brl(preco)}</b> · /${grande} <b>${brl(pb*1000,2)}</b> · /${base} <b>${brl(pb,4)}</b>`); }
  else { linhas.push('<span class="mut">Precificação por medida: <b>—</b> (sem fator confirmado).</span>'); }
  const meta=[]; if(conv.origem) meta.push('origem: '+esc(conv.origem)); if(conv.confianca) meta.push('confiança: '+esc(conv.confianca));

  out.innerHTML=linhas.map(l=>`<div>${l}</div>`).join(''); }

od()">Excluir ficha</button><button class="btn ghost sm" onclick="document.getElementById('fpModal').remove()">Cancelar</button><button class="btn primary" id="fpSave" onclick="salvarFichaProd(this)">Salvar ficha</button></div></div></div>`; document.body.appendChild(m);
}
function fpSync(){ const m=$('fpModal'); if(!m)return; _fp.descricao=$('fpDesc').value; _fp.unidade_consumo=unidadeValor($('fpConsumo').value); _fp.tipo=$('fpTipo').value; _fp.instrucoes=$('fpInstrucoes').value; const setorEls=[...document.querySelectorAll('#fpSetores [data-setor].on')]; if(setorEls.length)_fp.setores=setorEls.map(x=>Number(x.dataset.setor)); document.querySelectorAll('.fp-portion').forEach(sec=>{ const pi=+sec.dataset.pi,po=_fp.porcoes[pi]; if(!po)return; po.nome=sec.querySelector('[data-k="pnome"]').value; po.rendimento=sec.querySelector('[data-k="prend"]').value; po.unidade=unidadeValor(sec.querySelector('[data-k="pun"]').value); sec.querySelectorAll('tbody tr').forEach(tr=>{ const ii=+tr.dataset.ii,it=po.itens[ii]; if(!it)return; it.insumo_produto_id=tr.querySelector('[data-k="insumo"]').value; it.quantidade=tr.querySelector('[data-k="qtd"]').value; it.unidade=unidadeValor(tr.querySelector('[data-k="un"]').value); it.observacao=tr.querySelector('[data-k="obs"]').value; }); }); }

async function gerenciarCategorias(status){ _catMgrStatus=status||_catMgrStatus||'ativas'; let cats=[], erroLoad=''; try{ const rr=await fetch(API+`/api/est/categorias?status=${encodeURIComponent(_catMgrStatus)}&uso=todos`), dd=await rr.json().catch(()=>({})); if(!rr.ok)throw new Error(dd.erro||dd.detalhe||'Falha ao carregar categorias'); cats=dd.categorias||[]; }catch(e){ erroLoad=e.message||'Falha ao carregar categorias'; cats=_cats||[]; } _catMgrCats=cats; const old=$('catEditor'); if(old)old.remove(); const m=document.createElement('div'); m.className='modal on product-modal est-modal'; m.id='catEditor';
