}
async function gerenciarConversoes(status){ _convMgrStatus=status||_convMgrStatus||'ativas'; await ensureConversoes(true); const old=$('convEditor'); if(old)old.remove(); const m=document.createElement('div'); m.className='modal on product-modal est-modal'; m.id='convEditor';
  const rows=(_conversoes||[]).filter(c=>_convMgrStatus==='todos'?true:(_convMgrStatus==='inativas'?c.ativo===false:c.ativo!==false));
  const body=rows.length?`<div class="category-grid">${rows.map(convCard).join('')}</div>`:'<div class="empty">Nenhuma conversão neste filtro.</div>';
  m.innerHTML=`<div class="box" style="max-width:1040px"><div class="editor-head"><div><h3>Conversões do estoque</h3><p>Sugestões por categoria para transformar unidade de compra em unidade de controle. O produto continua mantendo seu próprio fator quando necessário.</p></div><button class="icon-btn" onclick="this.closest('.modal').remove()">×</button></div>
  <div class="editor-body"><div class="category-create-bar"><div class="category-filter-bar">${convStatusButtons()}</div><button class="btn primary" onclick="novaConversaoModal()">+ Nova conversão</button></div><div id="convRows">${body}</div><div class="help" style="margin-top:14px">Use conversões como modelo de apoio para compras recorrentes. Ex.: categoria Hortifruti, rótulo Rúcula hidropônica, 1 MAÇO = 200 g. Se o fator variar, marque como revisão.</div></div></div>`;
  document.body.appendChild(m); }
function novaConversaoModal(){ conversaoFormModal({}); }
function editarConversaoModal(id){ const c=(_conversoes||[]).find(x=>String(x.id)===String(id)); if(!c)return toast('Conversão não encontrada'); conversaoFormModal({conversao:c}); }
function convUpdateResumo(){ const el=$('convRuleResumo'); if(!el)return; el.textContent=convRuleText({unidade_compra:$('convUCForm')&&$('convUCForm').value,unidade_base:$('convBaseForm')&&$('convBaseForm').value,fator:$('convFatorForm')&&$('convFatorForm').value,precisa_revisao:!!($('convRevForm')&&$('convRevForm').checked)}); }
function conversaoFormModal(ctx){ const c=ctx.conversao||{}, isEdit=!!c.id, ativo=c.ativo!==false, rev=!!c.precisa_revisao; const old=$('convFormModal'); if(old)old.remove(); const m=document.createElement('div'); m.className='modal on product-modal est-modal'; m.id='convFormModal';
  const statusToggle=catSlide('convAtivoForm','Status da conversão','Ativa','Inativa',ativo,'Inativas não aparecem como sugestão operacional.','convStatusToggleText','convStatusAtual');
  const reviewToggle=catSlide('convRevForm','Precisa revisão','Sim','Não',rev,'Use quando o fator não é confiável e o gestor precisa confirmar.','convReviewAtual');
  m.innerHTML=`<div class="box" style="max-width:760px"><div class="editor-head"><div><h3>${isEdit?'Editar':'Nova'} conversão</h3><p>Configure a regra de apoio: o que entra na compra e quanto isso representa na unidade de controle.</p></div><button class="icon-btn" onclick="this.closest('.modal').remove()">×</button></div><div class="editor-body"><div class="form-grid">
    <label class="label">Categoria<input class="field" id="convCatForm" value="${esc(c.categoria_ref||'')}" placeholder="Ex.: Hortifruti"></label>
    <label class="label">Rótulo<input class="field" id="convRotForm" value="${esc(c.rotulo||'')}" placeholder="Ex.: Rúcula hidropônica"></label>
    <label class="label">Unidade de compra${csInline('convUCForm',unidadeValor(c.unidade_compra||'UNIDADE'),unidadeOptions('— selecione —'),'onchange="convUpdateResumo()"')}</label>
    <label class="label">Unidade base${csInline('convBaseForm',c.unidade_base||'g',convBaseOptions(),'onchange="convUpdateResumo()"')}</label>
    <label class="label">Fator na unidade base<input class="field" id="convFatorForm" inputmode="decimal" value="${c.fator!=null?esc(c.fator):''}" placeholder="Ex.: 200" oninput="convUpdateResumo()"></label>
    <label class="label">Confiança${csInline('convConfForm',c.confianca||'',convConfOptions())}</label>
    <label class="label">Status atual<div class="readonly-pill" id="convStatusAtual">${ativo?'Ativa':'Inativa'}</div></label>
    <label class="label">Resumo da regra<div class="readonly-pill" id="convRuleResumo">${esc(convRuleText(c))}</div></label>
  </div><div class="switch-grid" style="margin-top:12px">${statusToggle}${reviewToggle}</div><div class="row" style="justify-content:flex-end;gap:8px;margin-top:16px"><button class="btn ghost sm" onclick="this.closest('.modal').remove()">Cancelar</button><button class="btn primary" onclick="salvarConversaoForm(${isEdit?c.id:'null'})">${isEdit?'Salvar':'Criar'}</button></div></div></div>`;
  document.body.appendChild(m); const revEl=$('convRevForm'); if(revEl)revEl.addEventListener('change',convUpdateResumo); }
async function salvarConversaoForm(id){ const categoria_ref=$('convCatForm').value.trim(), rotulo=$('convRotForm').value.trim();
  const fatorRaw=$('convFatorForm').value.trim(), rev=$('convRevForm').checked;
  if(!categoria_ref)return toast('Informe a categoria'); if(!rotulo)return toast('Informe o rótulo');
  if(!rev&&!(Number(fatorRaw.replace(',','.'))>0))return toast('Fator deve ser maior que zero (ou marque revisão)');
  const payload={categoria_ref,rotulo,unidade_compra:unidadeValor($('convUCForm').value),unidade_base:$('convBaseForm').value,fator:rev?'':fatorRaw,confianca:$('convConfForm').value,precisa_revisao:rev,ativo:$('convAtivoForm').checked};
  try{ if(id)await estFetch('/api/est/conversao/'+id,'PATCH',payload); else await estFetch('/api/est/conversao','POST',payload); await ensureConversoes(true); const fm=$('convFormModal'); if(fm)fm.remove(); await gerenciarConversoes(_convMgrStatus); toast(id?'Conversão atualizada':'Conversão criada'); }catch(e){} }
async function excluirConversao(id){ if(!await pedirConfirm('Excluir sugestão','Some das sugestões da categoria. Os produtos mantêm o fator já salvo.'))return; try{ await estFetch('/api/est/conversao/'+id,'DELETE'); await ensureConversoes(true); const m=$('convEditor'); if(m)m.remove(); gerenciarConversoes(); toast('Sugestão excluída'); }catch(e){} }

/* ===== LOCAIS FÍSICOS (onde o item fica guardado) ===== */
function locTipoOpts(cur){ return '<option value="">—</option>'+['seco','refrigerado','congelado','produção','outro'].map(t=>`<option value="${t}" ${cur===t?'selected':''}>${t}</option>`).join(''); }
function locRow(l){ return `<div class="row" style="gap:8px;margin-bottom:8px;align-items:flex-end">
  <label class="label" style="flex:1;margin:0">Nome<input class="field" id="loc-nome-${l.id}" value="${esc(l.nome)}"></label>
  <label class="label" style="width:130px;margin:0">Tipo<select class="field" id="loc-tipo-${l.id}">${locTipoOpts(l.tipo_local)}</select></label>
  <label class="label" style="width:96px;margin:0" title="Aceita itens perecíveis?">Perecíveis<input type="checkbox" id="loc-per-${l.id}" ${l.aceita_pereciveis!==false?'checked':''}></label>
  <button class="btn ghost sm" onclick="salvarLocal(${l.id})">Salvar</button>
  <button class="icon-btn" onclick="excluirLocal(${l.id})" title="Excluir">×</button></div>`; }
async function gerenciarLocais(){ await ensureLocais(true); const m=document.createElement('div'); m.className='modal on product-modal est-modal'; m.id='locEditor';
  m.innerHTML=`<div class="box" style="max-width:720px"><div class="editor-head"><div><h3>Locais físicos</h3><p>Onde o item fica guardado. Aceita a realidade atual — não precisa de organização perfeita.</p></div><button class="icon-btn" onclick="this.closest('.modal').remove()">×</button></div>
  <div class="editor-body"><div id="locRows">${_locais.map(locRow).join('')||'<div class="empty">Nenhum local cadastrado.</div>'}</div>
  <div class="sec">Novo local</div>
  <div class="form-grid"><label class="label">Nome<input class="field" id="locNovoNome" placeholder="Ex.: Geladeira da cozinha"></label>
    <label class="label">Tipo<select class="field" id="locNovoTipo">${locTipoOpts('')}</select></label>
    <label class="switch-card" style="margin:0"><input type="checkbox" id="locNovoPer" checked><span><b>Aceita perecíveis</b><small>Refrigerado/congelado costuma aceitar.</small></span></label></div>
  <button class="btn primary sm" style="margin-top:10px" onclick="novoLocal()">+ Adicionar local</button></div></div>`;
  document.body.appendChild(m); }
async function salvarLocal(id){ const nome=$('loc-nome-'+id).value.trim(); if(!nome)return toast('Informe o nome');
  try{ await estFetch('/api/est/local/'+id,'PATCH',{nome,tipo_local:$('loc-tipo-'+id).value,aceita_pereciveis:$('loc-per-'+id).checked}); await ensureLocais(true); toast('Local atualizado'); }catch(e){} }
async function novoLocal(){ const nome=$('locNovoNome').value.trim(); if(!nome)return toast('Informe o nome');
  try{ await estFetch('/api/est/local','POST',{nome,tipo_local:$('locNovoTipo').value,aceita_pereciveis:$('locNovoPer').checked}); await ensureLocais(true); const m=$('locEditor'); if(m)m.remove(); gerenciarLocais(); toast('Local criado'); }catch(e){} }
async function excluirLocal(id){ if(!await pedirConfirm('Excluir local','Se houver produtos neste local, ele é apenas inativado (histórico preservado).'))return; try{ await estFetch('/api/est/local/'+id,'DELETE'); await ensureLocais(true); const m=$('locEditor'); if(m)m.remove(); gerenciarLocais(); toast('Local removido'); }catch(e){} }

/* restaura sessão: localStorage só quando "manter conectado"; sessionStorage cai ao fechar navegador */
(async function(){
  await ensureEstoqueConfig();
  startAppVersionWatch();
  const stored=storedUserPayload();
  if(!stored)return;
  const fresh=await revalidarUsuario(stored.user);
  if(!fresh){ clearStoredUser(); return; }
  abrirApp(fresh,stored.keep);
})();
</script>
</body>
</html>
