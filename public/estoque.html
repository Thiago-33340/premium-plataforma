<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Estoque Premium RP</title>
<style>
:root{ --bg:#0b0b0c; --bg2:#121214; --bg3:#1a1a1e; --bd:#26262c; --tx:#f2f2f3; --mut:#8a8a93;
  --lar:#ff7a18; --verd:#22c55e; --amar:#f5b50a; --verm:#ef4444; --azul:#3b82f6; }
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html,body{ margin:0; padding:0; background:var(--bg); color:var(--tx); overflow-x:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
body{ min-height:100vh; }
input,select,button,textarea{ font-family:inherit; font-size:16px; }
.hide{ display:none !important; }
.mut{ color:var(--mut); } .sm{ font-size:13px; } .xs{ font-size:11px; }

#login{ position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px; background:radial-gradient(900px 500px at 50% -10%, #2a1606 0%, #0b0b0c 55%); }
#login img{ width:180px; max-width:70%; margin-bottom:8px; }
#login h1{ font-size:18px; margin:6px 0 2px; } #login p{ margin:0 0 18px; }
.card{ width:100%; max-width:380px; background:var(--bg2); border:1px solid var(--bd); border-radius:16px; padding:18px; }
.field{ width:100%; background:var(--bg3); border:1px solid var(--bd); color:var(--tx); border-radius:12px;
  padding:14px; margin:6px 0; outline:none; }
.field:focus{ border-color:var(--lar); }
.btn{ width:100%; border:none; border-radius:12px; padding:14px; font-weight:700; cursor:pointer; }
.btn.primary{ background:var(--lar); color:#1a0c00; }
.btn.ghost{ background:var(--bg3); color:var(--tx); border:1px solid var(--bd); }
.btn.danger{ background:var(--verm); color:#fff; }
.btn.sm{ width:auto; padding:9px 14px; font-size:14px; }
.err{ color:var(--verm); min-height:18px; font-size:13px; margin:6px 0 0; }
.poweredby{ margin-top:18px; color:var(--mut); font-size:12px; }

#app{ display:flex; flex-direction:column; min-height:100vh; }
header{ position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
  gap:10px; padding:12px 16px; background:rgba(11,11,12,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--bd); }
header .logo{ height:26px; }
header .who{ font-size:12px; color:var(--mut); text-align:right; line-height:1.2; }
main{ flex:1; padding:14px 14px calc(86px + env(safe-area-inset-bottom)); }
.vhead{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:4px 2px 12px; }
h2.tit{ font-size:18px; margin:0; }

.kpis{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.kpi{ background:var(--bg2); border:1px solid var(--bd); border-radius:14px; padding:14px; }
.kpi .v{ font-size:26px; font-weight:800; line-height:1; }
.kpi .l{ font-size:12px; color:var(--mut); margin-top:6px; }
.kpi.alert .v{ color:var(--amar); } .kpi.bad .v{ color:var(--verm); } .kpi.ok .v{ color:var(--verd); }
.sec{ font-size:13px; color:var(--mut); text-transform:uppercase; letter-spacing:.4px; margin:20px 2px 8px; }
.panel{ background:var(--bg2); border:1px solid var(--bd); border-radius:14px; overflow:hidden; }
.empty{ padding:18px; color:var(--mut); text-align:center; font-size:14px; }

.searchbar{ position:sticky; top:0; z-index:10; background:var(--bg); padding:4px 0 10px; }
.chips{ display:flex; gap:8px; overflow-x:auto; padding:2px 0 4px; -webkit-overflow-scrolling:touch; }
.chips::-webkit-scrollbar{ display:none }
.chip{ flex:0 0 auto; background:var(--bg3); border:1px solid var(--bd); color:var(--tx); border-radius:999px;
  padding:8px 13px; font-size:13px; cursor:pointer; white-space:nowrap; }
.chip.on{ background:var(--lar); color:#1a0c00; border-color:var(--lar); font-weight:700; }

.plist{ display:flex; flex-direction:column; gap:8px; }
.prow{ background:var(--bg2); border:1px solid var(--bd); border-radius:12px; padding:12px; display:flex; gap:10px; align-items:center; cursor:pointer; }
.prow:active{ background:var(--bg3); }
.prow .nm{ flex:1; min-width:0; }
.prow .nm b{ display:block; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.prow .nm small{ color:var(--mut); font-size:12px; }
.prow .qt{ text-align:right; flex:0 0 auto; }
.prow .qt .big{ font-weight:800; font-size:15px; }
.tag{ font-size:10px; padding:2px 7px; border-radius:999px; font-weight:700; }
.tag.zero{ background:#3a1414; color:#ff8d8d; } .tag.low{ background:#3a2e10; color:#ffd479; } .tag.ok{ background:#13301a; color:#86e0a0; }
.tag.off{ background:#222; color:#999; }

nav{ position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex; justify-content:space-around;
  background:rgba(15,15,17,.96); backdrop-filter:blur(10px); border-top:1px solid var(--bd);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom)); }
nav button{ background:none; border:none; color:var(--mut); display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:11px; padding:4px 8px; cursor:pointer; flex:1; }
nav button .ic{ font-size:20px; line-height:1; }
nav button.on{ color:var(--lar); }

#toast{ position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); transform:translateX(-50%);
  background:#000; border:1px solid var(--bd); color:#fff; padding:10px 16px; border-radius:999px; font-size:14px;
  opacity:0; transition:.2s; z-index:60; pointer-events:none; max-width:90%; text-align:center; }
#toast.on{ opacity:1; }

.modal{ position:fixed; inset:0; z-index:55; display:none; align-items:flex-end; justify-content:center; background:rgba(0,0,0,.6); }
.modal.on{ display:flex; }
.modal .box{ width:100%; max-width:480px; max-height:92vh; overflow:auto; background:var(--bg2); border:1px solid var(--bd); border-radius:18px 18px 0 0; padding:18px; }
@media(min-width:600px){ .modal{ align-items:center } .modal .box{ border-radius:18px } }
.fgrid{ display:flex; flex-direction:column; gap:4px; }
.flabel{ display:flex; flex-direction:column; gap:2px; font-size:13px; color:var(--mut); margin-top:8px; }
.fcheck{ display:flex; align-items:center; gap:10px; font-size:15px; color:var(--tx); margin-top:12px; }
.fcheck input{ width:20px; height:20px; }
.mfoot{ display:flex; gap:8px; margin-top:16px; }
.mfoot .btn{ flex:1; }

.setor-btn{ width:100%; text-align:left; background:var(--bg2); border:1px solid var(--bd); color:var(--tx); border-radius:12px; padding:16px; margin-bottom:10px; font-size:16px; font-weight:600; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px; }
.setor-btn small{ color:var(--mut); font-weight:400; font-size:12px; }
.audit-banner{ background:#2a2410; border:1px solid #5a4a16; color:#ffd479; border-radius:12px; padding:12px 14px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer; font-weight:600; }
.cnt-item{ background:var(--bg2); border:1px solid var(--bd); border-radius:12px; padding:10px 12px; margin-bottom:8px; }
.cnt-div{ margin:18px 0 10px; padding:9px 12px; border-radius:10px; background:linear-gradient(90deg,rgba(249,115,22,.18),rgba(249,115,22,.04)); border:1px solid rgba(249,115,22,.4); color:var(--fg); font-weight:700; font-size:13px; display:flex; align-items:center; gap:8px; }
.cnt-div small{ color:var(--mut); font-weight:600; font-size:11px; }
.cnt-item.done{ border-color:#1d4a2a; }
.cnt-item .top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.cnt-item .pn{ font-weight:600; font-size:15px; }
.cnt-item .ob{ font-size:10px; padding:2px 7px; border-radius:999px; background:#3a2e10; color:#ffd479; font-weight:700; flex:0 0 auto; }
.cnt-row{ display:flex; gap:8px; align-items:center; margin-top:8px; }
.cnt-row input.qt{ flex:1; text-align:center; font-size:18px; font-weight:700; }
.cnt-row .un{ color:var(--mut); font-size:13px; min-width:56px; }
.cnt-row .ig{ background:var(--bg3); border:1px solid var(--bd); color:var(--mut); border-radius:10px; padding:10px 12px; font-size:13px; cursor:pointer; }
.cnt-row .ig.on{ background:#2a2410; color:#ffd479; border-color:#5a4a16; }
.cnt-foot{ position:fixed; left:0; right:0; bottom:calc(62px + env(safe-area-inset-bottom)); padding:10px 14px; background:rgba(11,11,12,.97); border-top:1px solid var(--bd); display:flex; align-items:center; gap:10px; z-index:25; }
.cnt-foot .prog{ flex:1; font-size:13px; color:var(--mut); line-height:1.3; }
</style>
</head>
<body>

<div id="login">
  <img src="/logo.png" alt="Premium Pizzas" onerror="this.style.display='none'">
  <h1>Estoque Premium RP</h1>
  <p class="mut sm">Acesso da equipe</p>
  <div class="card">
    <div id="stepUser">
      <input id="usuario" class="field" placeholder="Usuário (ex: thiago)" autocapitalize="off" autocomplete="username">
      <button class="btn primary" onclick="irPin()">Continuar</button>
    </div>
    <div id="stepPin" class="hide">
      <div class="sm mut" style="margin-bottom:4px">Usuário: <b id="uEcho"></b></div>
      <input id="pin" class="field" placeholder="PIN" inputmode="numeric" type="password" autocomplete="current-password">
      <button class="btn primary" onclick="entrar()">Entrar</button>
      <button class="btn ghost" style="margin-top:8px" onclick="voltarUser()">Voltar</button>
    </div>
    <p id="lgErr" class="err"></p>
  </div>
  <div class="poweredby">🔒 Powered by Titan Atende</div>
</div>

<div id="app" class="hide">
  <header>
    <img src="/logo.png" class="logo" alt="Premium" onerror="this.style.display='none'">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="who"><b id="hNome"></b><br><span id="hPerfil"></span></div>
      <button class="btn ghost sm" onclick="sair()">Sair</button>
    </div>
  </header>
  <main>
    <section id="v-inicio">
      <div class="vhead"><h2 class="tit">Visão do dia</h2></div>
      <div class="kpis" id="kpis"></div>
      <div class="sec">Últimas contagens</div>
      <div class="panel" id="ultContagens"><div class="empty">—</div></div>
      <div class="sec">Últimas compras</div>
      <div class="panel" id="ultCompras"><div class="empty">—</div></div>
    </section>

    <section id="v-produtos" class="hide">
      <div class="vhead"><h2 class="tit">Produtos</h2><button class="btn primary sm" onclick="novoProduto()">+ Novo</button></div>
      <div class="searchbar">
        <input id="busca" class="field" placeholder="Buscar produto…" oninput="buscaDebounce()">
        <div class="chips" id="chipsCat"></div>
      </div>
      <div class="plist" id="plist"><div class="empty">Carregando…</div></div>
    </section>

    <section id="v-fornecedores" class="hide">
      <div class="vhead"><h2 class="tit">Fornecedores</h2><button class="btn primary sm" onclick="novoFornecedor()">+ Novo</button></div>
      <div class="plist" id="flist"><div class="empty">Carregando…</div></div>
    </section>

    <section id="v-contagem" class="hide">
      <div id="contWrap"></div>
    </section>

    <section id="v-mais" class="hide">
      <div id="maisWrap"></div>
    </section>
  </main>

  <nav id="nav">
    <button data-v="inicio" class="on" onclick="nav('inicio')"><span class="ic">🏠</span>Início</button>
    <button data-v="produtos" onclick="nav('produtos')"><span class="ic">📦</span>Produtos</button>
    <button data-v="contagem" onclick="nav('contagem')"><span class="ic">📝</span>Contagem</button>
    <button data-v="fornecedores" onclick="nav('fornecedores')"><span class="ic">🏪</span>Fornec.</button>
    <button data-v="mais" onclick="nav('mais')"><span class="ic">⋯</span>Mais</button>
  </nav>
</div>

<div id="toast"></div>

<div class="modal" id="mPin"><div class="box">
  <h3 style="margin:0 0 4px">Defina seu PIN</h3>
  <p class="mut sm" style="margin:0 0 10px">Primeiro acesso: crie um PIN de 4 a 6 dígitos só seu.</p>
  <input id="np1" class="field" placeholder="Novo PIN" inputmode="numeric" type="password">
  <input id="np2" class="field" placeholder="Repita o PIN" inputmode="numeric" type="password">
  <p id="mPinErr" class="err"></p>
  <button class="btn primary" onclick="confirmaPin()">Salvar e entrar</button>
</div></div>

<script>
const API = location.origin;
const $ = id => document.getElementById(id);
let user = null, _pinCtx = null, _cats = [], _forns = [], _catSel = '', _prodMap = {}, _fornMap = {};

function toast(t){ const e=$('toast'); e.textContent=t; e.classList.add('on'); clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove('on'),2600); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function fmt(n){ n=Number(n); return Number.isInteger(n)? n : Number(n.toFixed(2)); }
document.addEventListener('focusin', e=>{ if(e.target.matches('input,select,textarea')){ setTimeout(()=>{ try{ e.target.scrollIntoView({block:'center',behavior:'smooth'});}catch(_){} },250); } });

function irPin(){ const u=$('usuario').value.trim(); if(!u){ $('lgErr').textContent='Digite o usuário.'; return; }
  $('uEcho').textContent=u; $('lgErr').textContent=''; $('stepUser').classList.add('hide'); $('stepPin').classList.remove('hide'); setTimeout(()=>$('pin').focus(),80); }
function voltarUser(){ $('stepPin').classList.add('hide'); $('stepUser').classList.remove('hide'); $('pin').value=''; $('lgErr').textContent=''; }
async function entrar(){ const login=$('usuario').value.trim(), pin=$('pin').value.trim(); $('lgErr').textContent='';
  if(!pin){ $('lgErr').textContent='Digite o PIN.'; return; }
  let d; try{ d=await (await fetch(API+'/api/staff/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,pin})})).json(); }
  catch(e){ $('lgErr').textContent='Falha de conexão.'; return; }
  if(d.erro){ $('lgErr').textContent=d.erro; return; }
  if(d.must_change){ _pinCtx={login:(d.usuario&&d.usuario.login)||login, pinAtual:pin}; $('mPin').classList.add('on'); setTimeout(()=>$('np1').focus(),80); return; }
  abrirApp(d.usuario); }
async function confirmaPin(){ const a=$('np1').value.replace(/\D/g,''), b=$('np2').value.replace(/\D/g,''); $('mPinErr').textContent='';
  if(a.length<4){ $('mPinErr').textContent='O PIN precisa ter 4 a 6 dígitos.'; return; }
  if(a!==b){ $('mPinErr').textContent='Os PINs não conferem.'; return; }
  let d; try{ d=await (await fetch(API+'/api/staff/trocar-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:_pinCtx.login,pin_atual:_pinCtx.pinAtual,pin_novo:a})})).json(); }
  catch(e){ $('mPinErr').textContent='Falha de conexão.'; return; }
  if(d.erro){ $('mPinErr').textContent=d.erro; return; }
  $('mPin').classList.remove('on');
  const r=await (await fetch(API+'/api/staff/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:_pinCtx.login,pin:a})})).json();
  if(r.usuario) abrirApp(r.usuario); else toast('PIN trocado. Entre de novo.'); }

function abrirApp(u){ user=u; try{ localStorage.setItem('est_u', JSON.stringify(u)); }catch(e){}
  $('login').classList.add('hide'); $('app').classList.remove('hide');
  $('hNome').textContent=u.nome||u.login||'—'; $('hPerfil').textContent=(u.perfil||'').toString().toLowerCase();
  carregarPerms(); nav('inicio'); }
function sair(){ try{ localStorage.removeItem('est_u'); }catch(e){} user=null; location.reload(); }
function temPerm(p){ if(!user) return false; if(ehGestor()) return true; return (user.perms||[]).includes(p); }
async function carregarPerms(){ if(ehGestor()){ aplicaNavPerms(); return; }
  try{ const d=await (await fetch(API+'/api/est/permissoes?usuario_id='+encodeURIComponent(user.id))).json(); user.perms=d.perms||[]; }catch(e){ user.perms=[]; }
  aplicaNavPerms(); }
const NAV_PERM={ produtos:'acessar_produtos', contagem:'acessar_contagem', fornecedores:'acessar_fornecedores' };
function maisVisivel(){ return ehGestor() || temPerm('acessar_lancamentos')||temPerm('acessar_lista_compras_inteligente')||temPerm('acessar_visitas')||temPerm('acessar_mapa_comparativo_fornecedores')||temPerm('acessar_producao_interna')||temPerm('acessar_configuracoes')||temPerm('editar_permissoes'); }
function aplicaNavPerms(){ document.querySelectorAll('#nav button').forEach(b=>{ const v=b.dataset.v; let show=true; if(NAV_PERM[v]) show=temPerm(NAV_PERM[v]); if(v==='mais') show=maisVisivel(); b.style.display=show?'':'none'; }); }

function nav(v){ const need=NAV_PERM[v]; if(need&&!temPerm(need)) v='inicio'; if(v==='mais'&&!maisVisivel()) v='inicio';
  ['inicio','produtos','contagem','fornecedores','mais'].forEach(x=> $('v-'+x).classList.toggle('hide', x!==v));
  document.querySelectorAll('#nav button').forEach(b=> b.classList.toggle('on', b.dataset.v===v));
  window.scrollTo(0,0);
  if(v==='inicio') loadInicio(); if(v==='produtos') loadProdutos(); if(v==='fornecedores') loadFornecedores(); if(v==='contagem') loadContagem(); if(v==='mais') loadMais(); }

async function loadInicio(){ if(!ehGestor()) return loadInicioColab();
  let d; try{ d=await (await fetch(API+'/api/est/dashboard')).json(); }catch(e){ return; }
  const k=(v,l,cls='')=>`<div class="kpi ${cls}"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  $('kpis').innerHTML = k(d.produtos_ativos,'Produtos ativos')
    + k(d.zerados,'Zerados', d.zerados>0?'bad':'ok')
    + k(d.abaixo_ideal,'Abaixo do ideal', d.abaixo_ideal>0?'alert':'ok')
    + k(d.sem_fornecedor,'Sem fornecedor', d.sem_fornecedor>0?'alert':'')
    + k(d.contagens_aguardando,'Contagens p/ auditar', d.contagens_aguardando>0?'alert':'')
    + k(d.fornecedores,'Fornecedores');
  const uc=d.ultimas_contagens||[]; $('ultContagens').innerHTML = uc.length? uc.map(c=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(c.setor_nome||'—')}</b><small>${esc(c.usuario_nome||'')} · ${esc(c.status_auditoria||'')}</small></div></div>`).join('') : '<div class="empty">Nenhuma contagem ainda.</div>';
  const cp=d.ultimas_compras||[]; $('ultCompras').innerHTML = cp.length? cp.map(c=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(c.fornecedor||'—')}</b><small>${esc(c.usuario_nome||'')}</small></div><div class="qt"><span class="big">R$ ${Number(c.total||0).toFixed(2)}</span></div></div>`).join('') : '<div class="empty">Nenhuma compra ainda.</div>';
}
async function loadInicioColab(){
  const sec=$('v-inicio');
  let d; try{ d=await (await fetch(API+'/api/est/meus-itens?usuario_id='+encodeURIComponent(user.id))).json(); }catch(e){ d={itens:[]}; }
  const itens=d.itens||[]; const byS={}; itens.forEach(i=>{ (byS[i.setor||'—']=byS[i.setor||'—']||[]).push(i); });
  let h=`<div class="vhead"><h2 class="tit">Olá, ${esc((user.nome||user.login||'').split(' ')[0])}</h2></div>`;
  h+=`<button class="btn primary" style="width:100%;margin:0 0 16px" onclick="nav('contagem')">📝 Fazer contagem</button>`;
  if(!itens.length){ h+='<div class="empty">Você ainda não tem itens de setor atribuídos. Peça ao gestor para definir seu setor.</div>'; }
  else { for(const s of Object.keys(byS).sort()){ h+=`<div class="sec">${esc(s)}</div><div class="panel">`+byS[s].map(i=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(i.nome)}</b><small>${esc(i.unidade||'')}</small></div><div class="qt"><span class="big">${fmt(i.estoque_atual)}</span></div></div>`).join('')+'</div>'; } }
  sec.innerHTML=h;
}

let _bt=null;
function buscaDebounce(){ clearTimeout(_bt); _bt=setTimeout(loadProdutos,300); }
async function ensureCats(){ if(!_cats.length){ try{ _cats=(await (await fetch(API+'/api/est/categorias')).json()).categorias||[]; }catch(e){} } }
async function ensureForns(){ if(!_forns.length){ try{ _forns=(await (await fetch(API+'/api/est/fornecedores')).json()).fornecedores||[]; }catch(e){} } }
async function loadProdutos(){
  await ensureCats(); renderChips();
  const busca=encodeURIComponent($('busca').value.trim()); const cat=encodeURIComponent(_catSel);
  let d; try{ d=await (await fetch(API+`/api/est/produtos?busca=${busca}&categoria=${cat}`)).json(); }catch(e){ return; }
  const ps=d.produtos||[]; _prodMap={}; ps.forEach(p=>_prodMap[p.id]=p);
  $('plist').innerHTML = ps.length? ps.map(p=>{
    const at=Number(p.estoque_atual||0), id=p.estoque_ideal!=null?Number(p.estoque_ideal):null;
    let tag=''; if(!p.ativo) tag='<span class="tag off">inativo</span>'; else if(at===0) tag='<span class="tag zero">zerado</span>'; else if(id!=null&&at<id) tag='<span class="tag low">abaixo</span>'; else tag='<span class="tag ok">ok</span>';
    return `<div class="prow" onclick="editarProduto(${p.id})"><div class="nm"><b>${esc(p.nome)}</b><small>${esc(p.categoria||'—')} · ${esc(p.fornecedor||'sem fornecedor')}</small></div>

/* ===== modais dinâmicos ===== */
function pedirForm(titulo,campos,okLabel='Criar',comExcluir=false){ return new Promise(resolve=>{
  const ov=document.createElement('div'); ov.className='modal on';
  const fields=campos.map(c=>{
    if(c.type==='select') return `<label class="flabel">${c.label}<select data-k="${c.key}" class="field">${c.opts.map(o=>`<option value="${o.v}" ${String(c.value)===String(o.v)?'selected':''}>${esc(o.t)}</option>`).join('')}</select></label>`;
    if(c.type==='check') return `<label class="fcheck"><input type="checkbox" data-k="${c.key}" ${c.value?'checked':''}> ${c.label}</label>`;
    if(c.type==='textarea') return `<label class="flabel">${c.label}<textarea data-k="${c.key}" class="field" rows="2">${esc(c.value)}</textarea></label>`;
    return `<label class="flabel">${c.label}<input data-k="${c.key}" class="field" type="${c.type||'text'}" inputmode="${c.type==='number'?'decimal':'text'}" value="${c.value!=null?esc(c.value):''}"></label>`;
  }).join('');
  const delBtn = comExcluir? '<button class="btn danger" data-act="del">Excluir</button>' : '';
  ov.innerHTML=`<div class="box"><h3 style="margin:0 0 6px">${titulo}</h3><div class="fgrid">${fields}</div>
    <div class="mfoot"><button class="btn ghost" data-act="cancel">Cancelar</button>${delBtn}<button class="btn primary" data-act="ok">${okLabel}</button></div></div>`;
  ov.querySelector('[data-act="cancel"]').onclick=()=>{ document.body.removeChild(ov); resolve(null); };
  if(comExcluir) ov.querySelector('[data-act="del"]').onclick=()=>{ document.body.removeChild(ov); resolve('__del__'); };
  ov.querySelector('[data-act="ok"]').onclick=()=>{ const out={}; ov.querySelectorAll('[data-k]').forEach(el=>{ let v= el.type==='checkbox'?el.checked:el.value; if(el.tagName==='SELECT'&&v==='')v=null; out[el.dataset.k]=v; }); if(!String(out.nome||'').trim()){ toast('Informe o nome'); return; } document.body.removeChild(ov); resolve(out); };
  document.body.appendChild(ov); const f=ov.querySelector('input,select,textarea'); if(f) setTimeout(()=>f.focus(),60);
}); }
function pedirConfirm(titulo,msg){ return new Promise(resolve=>{
  const ov=document.createElement('div'); ov.className='modal on';
  ov.innerHTML=`<div class="box"><h3 style="margin:0 0 6px">${titulo}</h3><p class="mut sm" style="margin:0 0 12px">${msg}</p>
    <div class="mfoot"><button class="btn ghost" data-act="c">Cancelar</button><button class="btn danger" data-act="d">Excluir</button></div></div>`;
  ov.querySelector('[data-act="c"]').onclick=()=>{ document.body.removeChild(ov); resolve(false); };
  ov.querySelector('[data-act="d"]').onclick=()=>{ document.body.removeChild(ov); resolve(true); };
  document.body.appendChild(ov);
}); }

function abrirCamera(){ const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment'; inp.onchange=()=>{ if(inp.files&&inp.files[0]) onFotoNota(inp.files[0]); }; inp.click(); }
function downscaleImg(file){ return new Promise((resolve,reject)=>{ const fr=new FileReader(); fr.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=1024; let w=img.width,h=img.height; if(w>h&&w>max){ h=Math.round(h*max/w); w=max; } else if(h>=w&&h>max){ w=Math.round(w*max/h); h=max; } const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); resolve(cv.toDataURL('image/jpeg',0.6)); }; img.onerror=reject; img.src=fr.result; }; fr.onerror=reject; fr.readAsDataURL(file); }); }
async function onFotoNota(file){ toast('Lendo a nota… aguarde'); let dataUrl; try{ dataUrl=await downscaleImg(file); }catch(e){ toast('Erro ao abrir a imagem'); return; }
  let d; try{ d=await estFetch('/api/est/compra/foto','POST',{image:dataUrl}); }catch(e){ return; }
  await ensureAllProds(); await ensureForns();
  if(!(d.itens&&d.itens.length)) toast('Nota lida, mas confira/adicione os itens');
  conferenciaCompra(d.itens||[], d.fornecedor||'', d.data||''); }
async function novaCompraManual(){ await ensureAllProds(); await ensureForns(); conferenciaCompra([],'',''); }
function conferenciaCompra(itens, fornNome, data){
  _conf={ fornecedor_id: matchFornecedor(fornNome)||'', data:data||'', linhas:(itens.length?itens:[{}]).map(it=>({ _txt:it.produto||'', produto_id:matchProduto(it.produto||''), marca:it.marca||'', quantidade:it.quantidade!=null?it.quantidade:'', unidade:it.unidade||'', valor_unitario:it.valor_unitario!=null?it.valor_unitario:'', valor_total:it.valor_total!=null?it.valor_total:'' })) };
  renderConf(); }
function renderConf(){ const rows=_conf.linhas.map((l,i)=>confRowHTML(l,i)).join('');
  $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">Conferir compra</h2><button class="btn ghost sm" onclick="comprasTela()">Voltar</button></div>
   <label class="flabel">Fornecedor<select class="field" onchange="_conf.fornecedor_id=this.value">${[{id:'',nome:'—'}].concat(_forns).map(f=>`<option value="${f.id}" ${String(_conf.fornecedor_id)===String(f.id)?'selected':''}>${esc(f.nome)}</option>`).join('')}</select></label>

function confRowHTML(l,i){ const opts=[{id:'',nome:'— escolher produto —'}].concat(_allProds);
  return `<div class="cnt-item" style="margin-bottom:8px">${l._txt?`<div class="xs mut" style="margin-bottom:4px">Nota: “${esc(l._txt)}”</div>`:''}
   <select class="field" onchange="confSet(${i},'produto_id',this.value)">${opts.map(p=>`<option value="${p.id}" ${String(l.produto_id)===String(p.id)?'selected':''}>${esc(p.nome)}</option>`).join('')}</select>
   <div class="cnt-row"><input class="field" style="flex:1" inputmode="decimal" placeholder="qtd" value="${esc(l.quantidade)}" onchange="confSet(${i},'quantidade',this.value)"><input class="field" style="flex:1" placeholder="unid" value="${esc(l.unidade)}" onchange="confSet(${i},'unidade',this.value)"></div>
   <div class="cnt-row"><input class="field" style="flex:1" inputmode="decimal" placeholder="R$ unit" value="${esc(l.valor_unitario)}" onchange="confSet(${i},'valor_unitario',this.value)"><input class="field" style="flex:1" inputmode="decimal" placeholder="R$ total" value="${esc(l.valor_total)}" onchange="confSet(${i},'valor_total',this.value)"></div>
   <div class="cnt-row"><input class="field" style="flex:1" placeholder="marca" value="${esc(l.marca)}" onchange="confSet(${i},'marca',this.value)"><button class="ig" onclick="confDel(${i})">remover</button></div></div>`; }
function confSet(i,k,v){ _conf.linhas[i][k]=v; if(k!=='produto_id'&&k!=='unidade'&&k!=='marca') confProg(); }
function confAddRow(){ _conf.linhas.push({}); renderConf(); }
function confDel(i){ _conf.linhas.splice(i,1); renderConf(); }
function confProg(){ const tot=_conf.linhas.reduce((s,l)=>{ const q=parseFloat(String(l.quantidade).replace(',','.'))||0; let vt=parseFloat(String(l.valor_total).replace(',','.')); if(isNaN(vt)){ const vu=parseFloat(String(l.valor_unitario).replace(',','.'))||0; vt=vu*q; } return s+(vt||0); },0);
  const el=$('confProg'); if(el) el.innerHTML='Total: <b>R$ '+tot.toFixed(2)+'</b>'; }
async function confirmarCompra(){ const linhas=_conf.linhas.filter(l=>l.produto_id).map(l=>({produto_id:Number(l.produto_id),marca:l.marca,quantidade:String(l.quantidade).replace(',','.'),unidade:l.unidade,valor_unitario:String(l.valor_unitario).replace(',','.'),valor_total:String(l.valor_total).replace(',','.')}));

function visSet(i,k,v){ _visita.itens[i][k]=v; if(k==='status') visProg(); }

function listaAddProd(){ const el=$('listaAuto'); const nome=(el.value||'').trim(); if(!nome) return;

  _lista.itens.push({produto_id:p.id,produto:p.nome,quantidade:sug!==''?fmt(sug):'',unidade:p.unidade||'',confianca:100}); el.value=''; listaRender(); }
async function listaColar(){ const t=($('listaTxt')&&$('listaTxt').value)||''; if(!t.trim()){ toast('Cole a lista primeiro'); return; }

    else { _lista.itens.push({produto_id:null,produto:null,quantidade:'',unidade:'',confianca:0,_txt:it.texto_original}); nf++; } }

function listaSet(i,k,v){ if(k==='produto_id'){ const p=_allProds.find(x=>String(x.id)===String(v)); _lista.itens[i].produto_id=p?p.id:null; _lista.itens[i].produto=p?p.nome:null; if(p){ _lista.itens[i].confianca=100; if(!_lista.itens[i].unidade)_lista.itens[i].unidade=p.unidade||''; } listaRender(); return; } _lista.itens[i][k]=v; }

  let d; try{ d=await (await fetch(API+'/api/est/producao/receita?produto_id='+pid)).json(); }catch(e){ d={}; }
  _prod.ficha=d.itens||[]; renderProducao(); }
function renderProducao(){ const p=_prod.sel; const isG=ehGestor();
  const rows=_prod.ficha.length? _prod.ficha.map(it=>`<div class="cnt-row" style="justify-content:space-between;gap:8px;align-items:flex-start"><span style="flex:1">${esc(it.insumo)}<br><small class="mut">${it.quantidade_por_unidade!=null?fmt(it.quantidade_por_unidade):'?'} ${esc(it.unidade||'')} por unidade · estoque ${fmt(it.insumo_estoque)}</small></span>${isG?`<button class="ig" onclick="delFicha(${it.id})">remover</button>`:''}</div>`).join('') : '<div class="empty">Sem ficha técnica. '+(isG?'Adicione os insumos abaixo.':'Peça ao gestor para cadastrar.')+'</div>';
  $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">${esc(p.nome)}</h2><button class="btn ghost sm" onclick="producaoTela()">Voltar</button></div>
   <div class="sec">Ficha técnica (consumo por unidade)</div><div class="cnt-item">${rows}</div>
   ${isG?`<button class="btn ghost sm" style="margin-top:8px" onclick="addFicha()">+ Adicionar insumo</button>`:''}
   <div class="sec">Lançar produção</div>
   <label class="flabel">Quantidade produzida (${esc(p.unidade||'un')})<input id="prodQtd" class="field" inputmode="decimal" placeholder="ex: 10"></label>
   <label class="flabel">Observação<input id="prodObs" class="field" placeholder="opcional"></label>
   <div style="padding-bottom:90px"></div>
   <div class="cnt-foot"><div class="prog"></div><button class="btn primary sm" onclick="lancarProducao()">Produzir e dar baixa</button></div>`; }
function fichaModal(insOpts){ return new Promise(resolve=>{
  const ov=document.createElement('div'); ov.className='modal on';
  ov.innerHTML=`<div class="box"><h3 style="margin:0 0 6px">Adicionar insumo</h3><div class="fgrid">
    <label class="flabel">Insumo<select data-k="insumo_produto_id" class="field"><option value="">—</option>${insOpts.map(i=>`<option value="${i.id}">${esc(i.nome)}</option>`).join('')}</select></label>
    <label class="flabel">Consumo por unidade produzida<input data-k="quantidade_por_unidade" class="field" type="number" inputmode="decimal"></label>
    <label class="flabel">Unidade (KG, G, UN…)<input data-k="unidade" class="field"></label>
    <label class="flabel">Observação<input data-k="observacao" class="field"></label></div>
    <div class="mfoot"><button class="btn ghost" data-act="cancel">Cancelar</button><button class="btn primary" data-act="ok">Adicionar</button></div></div>`;
  ov.querySelector('[data-act="cancel"]').onclick=()=>{ document.body.removeChild(ov); resolve(null); };
  ov.querySelector('[data-act="ok"]').onclick=()=>{ const o={}; ov.querySelectorAll('[data-k]').forEach(el=>o[el.dataset.k]=el.value); if(!o.insumo_produto_id){ toast('Escolha o insumo'); return; } document.body.removeChild(ov); resolve(o); };
  document.body.appendChild(ov); const f=ov.querySelector('select'); if(f) setTimeout(()=>f.focus(),60); }); }
async function addFicha(){ const insOpts=_prod.insumos.filter(i=>i.id!==_prod.sel.id); const v=await fichaModal(insOpts); if(!v) return;
  try{ await estFetch('/api/est/producao/receita','POST',Object.assign({produto_id:_prod.sel.id},v)); toast('Insumo adicionado'); abreProducao(_prod.sel.id); }catch(e){} }
async function delFicha(id){ if(!await pedirConfirm('Remover insumo','Tirar este insumo da ficha técnica?')) return; try{ await estFetch('/api/est/producao/receita/'+id,'DELETE'); toast('Removido'); abreProducao(_prod.sel.id); }catch(e){} }
async function lancarProducao(){ const q=(($('prodQtd')&&$('prodQtd').value)||'').replace(',','.'); const obs=($('prodObs')&&$('prodObs').value)||'';
  if(!(parseFloat(q)>0)){ toast('Informe a quantidade'); return; }
  try{ const d=await estFetch('/api/est/producao/run','POST',{produto_id:_prod.sel.id,quantidade:q,observacao:obs}); toast('Produção lançada — estoque atualizado'); if(d.avisos&&d.avisos.length) setTimeout(()=>toast('Atenção: '+d.avisos[0]),1700); producaoTela(); }catch(e){} }

/* ===== PERMISSÕES DA EQUIPE ===== */
const PERM_LABEL={ acessar_estoque_premium_rp:'Acessar o estoque', acessar_produtos:'Ver produtos', acessar_categorias:'Ver categorias', acessar_fornecedores:'Ver fornecedores', acessar_visitas:'Acessar visitas', acessar_mapa_comparativo_fornecedores:'Ver mapa de fornecedores', acessar_lista_compras_inteligente:'Lista de compras inteligente', acessar_contagem:'Acessar contagem', acessar_auditoria:'Acessar auditoria', acessar_producao_interna:'Acessar produção interna', acessar_lancamentos:'Acessar lançamentos', acessar_configuracoes:'Acessar configurações', ver_valores:'Ver valores/preços', ver_maior_valor_pago:'Ver maior valor já pago', editar_produtos:'Editar produtos', editar_categorias:'Editar categorias', registrar_compra:'Registrar compra', registrar_visita:'Registrar visita', fazer_contagem:'Lançar contagem', auditar_contagem:'Auditar contagem', aprovar_contagem:'Aprovar contagem', reprovar_contagem:'Reprovar contagem', exportar_dados:'Exportar dados', criar_usuarios:'Criar usuários', editar_permissoes:'Editar permissões' };
let _permCat=[], _permUsers=[];
async function permTela(){ const w=$('maisWrap'); w.innerHTML=`<div class="vhead"><h2 class="tit">Permissões da equipe</h2><button class="btn ghost sm" onclick="loadMais()">Voltar</button></div><p class="mut sm" style="margin:0 0 8px">Gestores e gerentes têm acesso total. Configure abaixo o que cada colaborador pode fazer.</p><div id="permUsers"><div class="empty">Carregando…</div></div>`;
  let d; try{ d=await (await fetch(API+'/api/est/usuarios?usuario_id='+encodeURIComponent(user.id))).json(); }catch(e){ d={}; }
  _permCat=d.catalogo||[]; _permUsers=d.usuarios||[];
  $('permUsers').innerHTML=_permUsers.length? _permUsers.map(u=>{ const g=/GESTOR|GERENTE/i.test(u.perfil_principal||''); return `<button class="setor-btn" ${g?'disabled style="opacity:.55"':`onclick="permEditar('${u.id}')"`}><span>${esc(u.nome||u.apelido_login)} <small class="mut">${esc((u.perfil_principal||'').toLowerCase())}</small></span><span>${g?'acesso total':'Configurar ›'}</span></button>`; }).join('') : '<div class="empty">Sem usuários.</div>'; }
async function permEditar(uid){ const u=_permUsers.find(x=>String(x.id)===String(uid)); if(!u) return;
  let d; try{ d=await (await fetch(API+'/api/est/permissoes?alvo_id='+encodeURIComponent(uid))).json(); }catch(e){ d={}; }
  const have=new Set(d.perms||[]);
  const rows=_permCat.map(p=>`<label class="fcheck"><input type="checkbox" data-p="${p}" ${have.has(p)?'checked':''}> ${esc(PERM_LABEL[p]||p)}</label>`).join('');
  $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">${esc(u.nome||u.apelido_login)}</h2><button class="btn ghost sm" onclick="permTela()">Voltar</button></div>
   <div style="padding-bottom:96px">${rows}</div>
   <div class="cnt-foot"><div class="prog"></div><button class="btn primary sm" onclick="permSalvar('${uid}')">Salvar permissões</button></div>`; }
async function permSalvar(uid){ const sel=[]; document.querySelectorAll('[data-p]').forEach(el=>{ if(el.checked) sel.push(el.dataset.p); });
  try{ await estFetch('/api/est/permissoes','POST',{alvo_id:uid,permissoes:sel}); toast('Permissões salvas'); permTela(); }catch(e){} }

/* ===== LISTA AUTOMÁTICA POR PERÍODO ===== */
let _la={ per:'semanal', base:'ideal', ativo:false, dia:1 };
async function listaAutoTela(){ const isG=ehGestor()||temPerm('acessar_configuracoes');
  $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">Lista automática</h2><button class="btn ghost sm" onclick="loadMais()">Voltar</button></div>
   <p class="mut sm" style="margin:0 0 8px">Monta sozinha a lista do que está abaixo do alvo, com fornecedor recomendado e estimativa. ${isG?'Configure a periodicidade abaixo.':''}</p>
   <div id="laCfg"></div><div class="sec">Prévia agora</div><div id="laPrev"><div class="empty">Carregando…</div></div>`;
  if(isG){ try{ const c=(await (await fetch(API+'/api/est/lista-auto/config')).json()).config; _la={ per:c.periodicidade||'semanal', base:(c.config&&c.config.base)||'ideal', ativo:!!c.ativo, dia:(c.config&&c.config.dia)||1 }; }catch(e){} laRenderCfg(); }
  loadLaPrev(); }
function laRenderCfg(){ const el=$('laCfg'); if(!el) return;
  el.innerHTML=`<div class="cnt-item" style="margin-bottom:8px">
   <div class="mut xs" style="margin-bottom:4px">Periodicidade</div><div class="cnt-row" style="flex-wrap:wrap;gap:6px">${['diaria','semanal','mensal','trimestral'].map(p=>`<button class="chip ${p===_la.per?'on':''}" onclick="_la.per='${p}';laRenderCfg()">${p}</button>`).join('')}</div>
   <div class="mut xs" style="margin:8px 0 4px">Repor até o</div><div class="cnt-row" style="gap:6px">${['ideal','minimo'].map(bs=>`<button class="chip ${bs===_la.base?'on':''}" onclick="_la.base='${bs}';laRenderCfg();loadLaPrev()">${bs}</button>`).join('')}</div>
   <label class="fcheck" style="margin-top:8px"><input type="checkbox" ${_la.ativo?'checked':''} onchange="_la.ativo=this.checked"> Enviar automaticamente no WhatsApp dos gestores</label>
   <button class="btn primary sm" style="margin-top:8px" onclick="salvarLaCfg()">Salvar configuração</button></div>`; }
async function salvarLaCfg(){ try{ await estFetch('/api/est/lista-auto/config','POST',{periodicidade:_la.per,base:_la.base,ativo:_la.ativo,dia:_la.dia||1}); toast('Configuração salva'); }catch(e){} }
async function loadLaPrev(){ const el=$('laPrev'); if(el) el.innerHTML='<div class="empty">Calculando…</div>';
  let d; try{ d=await (await fetch(API+'/api/est/lista-auto/preview?base='+(_la.base||'ideal'))).json(); }catch(e){ if(el)el.innerHTML='<div class="empty">Erro.</div>'; return; }
  const rota=d.rota||{}; const money=v=>v!=null?'R$ '+Number(v).toFixed(2):'—';
  if(!rota.itens_total){ if(el)el.innerHTML='<div class="empty">Nada abaixo do alvo agora. 👍</div>'; return; }
  let h=''; if(rota.ir_primeiro_em) h+=`<div class="cnt-item"><div class="pn" style="color:var(--lar)">📍 ${esc(rota.ir_primeiro_em)}</div></div>`;
  h+=(rota.comprar_por_fornecedor||[]).map(g=>`<div class="cnt-item" style="margin-bottom:8px"><div class="cnt-row" style="justify-content:space-between"><b>${esc(g.fornecedor||'—')}</b><span class="big">${g.total?money(g.total):''}</span></div>${g.itens.map(it=>`<div class="cnt-row" style="justify-content:space-between;gap:8px;align-items:flex-start"><span style="flex:1">${esc(it.produto)} ${it.essencial?'<span class="tag low">essencial</span>':''}<br><small class="mut">${it.quantidade!=null?fmt(it.quantidade):'?'} ${esc(it.unidade||'')}</small></span><span>${money(it.estimativa)}</span></div>`).join('')}</div>`).join('');
  if(rota.nao_encontrados&&rota.nao_encontrados.length) h+=`<div class="sec">Sem fornecedor</div>`+rota.nao_encontrados.map(it=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(it.produto)}</b><small>${fmt(it.quantidade)} ${esc(it.unidade||'')}</small></div></div>`).join('');
  h+=`<div class="cnt-item" style="margin-top:8px"><b>Estimativa total: ${money(rota.estimativa_total)}</b></div>`;
  if(el) el.innerHTML=h; }

/* ===== LANÇAR PERDA / CONSUMO / ENTRADA ===== */
let _mov={ tipo:'PERDA' };
async function movTela(){ await ensureAllProds(); _mov={ tipo:'PERDA' };
  $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">Perda / consumo</h2><button class="btn ghost sm" onclick="loadMais()">Voltar</button></div>
   <p class="mut sm" style="margin:0 0 8px">Lança a baixa (ou entrada) com histórico antes/depois. Também funciona pelo WhatsApp com a Jéssica.</p>
   <div style="display:flex;gap:6px;margin-bottom:10px" id="movTipos">
     ${['PERDA','CONSUMO','ENTRADA'].map(t=>`<button class="chip ${t==='PERDA'?'on':''}" onclick="movSetTipo('${t}')">${t==='PERDA'?'Perda':t==='CONSUMO'?'Consumo':'Entrada'}</button>`).join('')}</div>
   <label class="flabel">Produto<input id="movProd" class="field" list="movDL" placeholder="Digite o produto…"></label>
   <datalist id="movDL">${_allProds.map(p=>`<option value="${esc(p.nome)}">`).join('')}</datalist>
   <label class="flabel">Quantidade<input id="movQtd" class="field" inputmode="decimal" placeholder="ex: 2"></label>
   <label class="flabel">Motivo<input id="movMot" class="field" placeholder="ex: caiu no chão"></label>
   <button class="btn primary sm" style="margin-top:8px" onclick="lancarMov()">Lançar</button>
   <div id="movResp" style="margin-top:12px"></div>`; }
function movSetTipo(t){ _mov.tipo=t; document.querySelectorAll('#movTipos .chip').forEach((c,i)=>c.classList.toggle('on',['PERDA','CONSUMO','ENTRADA'][i]===t)); }
async function lancarMov(){ const nome=($('movProd')&&$('movProd').value||'').trim(); const q=($('movQtd')&&$('movQtd').value||'').replace(',','.'); const mot=($('movMot')&&$('movMot').value)||'';
  const lc=nome.toLowerCase(); const p=_allProds.find(x=>x.nome.toLowerCase()===lc)||_allProds.find(x=>x.nome.toLowerCase().includes(lc));
  if(!p){ toast('Produto não encontrado'); return; } if(!(parseFloat(q)>0)){ toast('Informe a quantidade'); return; }
  try{ const d=await estFetch('/api/est/movimento','POST',{tipo:_mov.tipo,produto_id:p.id,quantidade:q,motivo:mot});
    $('movResp').innerHTML=`<div class="cnt-item"><div class="pn" style="color:var(--lar)">${esc(d.produto)}</div><div class="mut sm">Estoque: ${fmt(d.antes)} → ${fmt(d.depois)} ${esc(d.unidade||'')}</div></div>`;
    toast('Lançado'); if($('movProd'))$('movProd').value=''; if($('movQtd'))$('movQtd').value=''; if($('movMot'))$('movMot').value=''; }catch(e){} }

/* ===== JÉSSICA (consulta ao banco do estoque) ===== */
function jessicaTela(){ $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">Jéssica · estoque</h2><button class="btn ghost sm" onclick="loadMais()">Voltar</button></div>
  <p class="mut sm" style="margin:0 0 8px">Pergunte sobre estoque, compras, contagens, visitas, fornecedores e produção. Ela responde com base no banco e respeita suas permissões.</p>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${['O que foi feito hoje no estoque?','Quais produtos estão abaixo do mínimo?','Quais contagens estão aguardando auditoria?','Quais compras foram lançadas hoje?'].map(q=>`<button class="chip" onclick="jessAsk('${q.replace(/'/g,"\\'")}')">${esc(q)}</button>`).join('')}</div>
  <textarea id="jessQ" class="field" rows="2" placeholder="Escreva sua pergunta…"></textarea>
  <button class="btn primary sm" style="margin-top:6px" onclick="jessAsk()">Perguntar</button>
  <div id="jessResp" style="margin-top:12px"></div>`; }
async function jessAsk(q){ const pergunta=q||(($('jessQ')&&$('jessQ').value)||''); if(!pergunta.trim()){ toast('Escreva a pergunta'); return; }
  $('jessResp').innerHTML='<div class="empty">Consultando o banco…</div>';
  try{ const d=await estFetch('/api/est/jessica','POST',{pergunta}); $('jessResp').innerHTML=`<div class="cnt-item"><div class="pn" style="color:var(--lar)">Jéssica</div><div style="white-space:pre-wrap;margin-top:4px">${esc(d.resposta||d.aviso||'Sem resposta.')}</div></div>`; }
  catch(e){ $('jessResp').innerHTML='<div class="empty">Erro ao consultar.</div>'; } }

/* mantém logado: restaura sessão ao abrir */
(function(){ try{ const s=localStorage.getItem('est_u'); if(s){ const u=JSON.parse(s); if(u&&u.id) abrirApp(u); } }catch(e){} })();
</script>
