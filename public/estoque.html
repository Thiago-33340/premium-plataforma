<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Estoque Premium RP</title>
<style>
:root{ --bg:#0b0b0c; --bg2:#121214; --bg3:#1a1a1e; --bd:#26262c; --tx:#f2f2f3; --mut:#8a8a93;
  --lar:#ff7a18; --verd:#22c55e; --amar:#f5b50a; --verm:#ef4444; --azul:#3b82f6; }
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html,body{ margin:0; padding:0; background:var(--bg); color:var(--tx); overflow-x:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
body{ min-height:100vh; }
input,select,button,textarea{ font-family:inherit; font-size:16px; }
.hide{ display:none !important; }
.mut{ color:var(--mut); } .sm{ font-size:13px; } .xs{ font-size:11px; }

#login{ position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px; background:radial-gradient(900px 500px at 50% -10%, #2a1606 0%, #0b0b0c 55%); }
#login img{ width:180px; max-width:70%; margin-bottom:8px; }
#login h1{ font-size:18px; margin:6px 0 2px; } #login p{ margin:0 0 18px; }
.card{ width:100%; max-width:380px; background:var(--bg2); border:1px solid var(--bd); border-radius:16px; padding:18px; }
.field{ width:100%; background:var(--bg3); border:1px solid var(--bd); color:var(--tx); border-radius:12px;
  padding:14px; margin:6px 0; outline:none; }
.field:focus{ border-color:var(--lar); }
.btn{ width:100%; border:none; border-radius:12px; padding:14px; font-weight:700; cursor:pointer; }
.btn.primary{ background:var(--lar); color:#1a0c00; }
.btn.ghost{ background:var(--bg3); color:var(--tx); border:1px solid var(--bd); }
.btn.danger{ background:var(--verm); color:#fff; }
.btn.sm{ width:auto; padding:9px 14px; font-size:14px; }
.err{ color:var(--verm); min-height:18px; font-size:13px; margin:6px 0 0; }
.poweredby{ margin-top:18px; color:var(--mut); font-size:12px; }

#app{ display:flex; flex-direction:column; min-height:100vh; }
header{ position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
  gap:10px; padding:12px 16px; background:rgba(11,11,12,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--bd); }
header .logo{ height:26px; }
header .who{ font-size:12px; color:var(--mut); text-align:right; line-height:1.2; }
main{ flex:1; padding:14px 14px calc(86px + env(safe-area-inset-bottom)); }
.vhead{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:4px 2px 12px; }
h2.tit{ font-size:18px; margin:0; }

.kpis{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.kpi{ background:var(--bg2); border:1px solid var(--bd); border-radius:14px; padding:14px; }
.kpi .v{ font-size:26px; font-weight:800; line-height:1; }
.kpi .l{ font-size:12px; color:var(--mut); margin-top:6px; }
.kpi.alert .v{ color:var(--amar); } .kpi.bad .v{ color:var(--verm); } .kpi.ok .v{ color:var(--verd); }
.sec{ font-size:13px; color:var(--mut); text-transform:uppercase; letter-spacing:.4px; margin:20px 2px 8px; }
.panel{ background:var(--bg2); border:1px solid var(--bd); border-radius:14px; overflow:hidden; }
.empty{ padding:18px; color:var(--mut); text-align:center; font-size:14px; }

.searchbar{ position:sticky; top:0; z-index:10; background:var(--bg); padding:4px 0 10px; }
.chips{ display:flex; gap:8px; overflow-x:auto; padding:2px 0 4px; -webkit-overflow-scrolling:touch; }
.chips::-webkit-scrollbar{ display:none }
.chip{ flex:0 0 auto; background:var(--bg3); border:1px solid var(--bd); color:var(--tx); border-radius:999px;
  padding:8px 13px; font-size:13px; cursor:pointer; white-space:nowrap; }
.chip.on{ background:var(--lar); color:#1a0c00; border-color:var(--lar); font-weight:700; }

.plist{ display:flex; flex-direction:column; gap:8px; }
.prow{ background:var(--bg2); border:1px solid var(--bd); border-radius:12px; padding:12px; display:flex; gap:10px; align-items:center; cursor:pointer; }
.prow:active{ background:var(--bg3); }
.prow .nm{ flex:1; min-width:0; }
.prow .nm b{ display:block; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.prow .nm small{ color:var(--mut); font-size:12px; }
.prow .qt{ text-align:right; flex:0 0 auto; }
.prow .qt .big{ font-weight:800; font-size:15px; }
.tag{ font-size:10px; padding:2px 7px; border-radius:999px; font-weight:700; }
.tag.zero{ background:#3a1414; color:#ff8d8d; } .tag.low{ background:#3a2e10; color:#ffd479; } .tag.ok{ background:#13301a; color:#86e0a0; }
.tag.off{ background:#222; color:#999; }

nav{ position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex; justify-content:space-around;
  background:rgba(15,15,17,.96); backdrop-filter:blur(10px); border-top:1px solid var(--bd);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom)); }
nav button{ background:none; border:none; color:var(--mut); display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:11px; padding:4px 8px; cursor:pointer; flex:1; }
nav button .ic{ font-size:20px; line-height:1; }
nav button.on{ color:var(--lar); }

#toast{ position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); transform:translateX(-50%);
  background:#000; border:1px solid var(--bd); color:#fff; padding:10px 16px; border-radius:999px; font-size:14px;
  opacity:0; transition:.2s; z-index:60; pointer-events:none; max-width:90%; text-align:center; }
#toast.on{ opacity:1; }

.modal{ position:fixed; inset:0; z-index:55; display:none; align-items:flex-end; justify-content:center; background:rgba(0,0,0,.6); }
.modal.on{ display:flex; }
.modal .box{ width:100%; max-width:480px; max-height:92vh; overflow:auto; background:var(--bg2); border:1px solid var(--bd); border-radius:18px 18px 0 0; padding:18px; }
@media(min-width:600px){ .modal{ align-items:center } .modal .box{ border-radius:18px } }
.fgrid{ display:flex; flex-direction:column; gap:4px; }
.flabel{ display:flex; flex-direction:column; gap:2px; font-size:13px; color:var(--mut); margin-top:8px; }
.fcheck{ display:flex; align-items:center; gap:10px; font-size:15px; color:var(--tx); margin-top:12px; }
.fcheck input{ width:20px; height:20px; }
.mfoot{ display:flex; gap:8px; margin-top:16px; }
.mfoot .btn{ flex:1; }

.setor-btn{ width:100%; text-align:left; background:var(--bg2); border:1px solid var(--bd); color:var(--tx); border-radius:12px; padding:16px; margin-bottom:10px; font-size:16px; font-weight:600; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px; }
.setor-btn small{ color:var(--mut); font-weight:400; font-size:12px; }
.audit-banner{ background:#2a2410; border:1px solid #5a4a16; color:#ffd479; border-radius:12px; padding:12px 14px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer; font-weight:600; }
.cnt-session{ display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:14px 16px; margin-bottom:14px; border:1px solid rgba(255,122,24,.32); border-radius:14px; background:linear-gradient(120deg,rgba(255,122,24,.14),rgba(255,122,24,.025)); }
.cnt-session .live{ display:flex; align-items:center; gap:7px; color:#ffad70; font-size:11px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; }.cnt-session .live:before{ content:''; width:8px; height:8px; border-radius:50%; background:var(--verd); box-shadow:0 0 0 4px rgba(34,197,94,.12); }
.cnt-session b{ display:block; margin-top:6px; font-size:14px; }.cnt-session small{ color:var(--mut); font-size:11px; }.cnt-save{ min-width:72px; text-align:right; color:var(--mut); font-size:11px; }
.cnt-item{ background:var(--bg2); border:1px solid var(--bd); border-radius:12px; padding:10px 12px; margin-bottom:8px; }
.cnt-div{ margin:18px 0 10px; padding:9px 12px; border-radius:10px; background:linear-gradient(90deg,rgba(249,115,22,.18),rgba(249,115,22,.04)); border:1px solid rgba(249,115,22,.4); color:var(--fg); font-weight:700; font-size:13px; display:flex; align-items:center; gap:8px; }
.cnt-div small{ color:var(--mut); font-weight:600; font-size:11px; }
.cnt-item.done{ border-color:#1d4a2a; background:linear-gradient(120deg,rgba(34,197,94,.055),var(--bg2) 45%); }
.cnt-item .top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.cnt-item .pn{ font-weight:600; font-size:15px; }
.cnt-item .ob{ font-size:10px; padding:2px 7px; border-radius:999px; background:#3a2e10; color:#ffd479; font-weight:700; flex:0 0 auto; }
.cnt-row{ display:flex; gap:8px; align-items:center; margin-top:8px; }
.cnt-row input.qt{ flex:1; text-align:center; font-size:18px; font-weight:700; }
.cnt-row .un{ color:var(--mut); font-size:13px; min-width:56px; }
.cnt-row .ig{ background:var(--bg3); border:1px solid var(--bd); color:var(--mut); border-radius:10px; padding:10px 12px; font-size:13px; cursor:pointer; }
.cnt-row .ig.on{ background:#2a2410; color:#ffd479; border-color:#5a4a16; }
.cnt-foot{ position:fixed; left:0; right:0; bottom:calc(62px + env(safe-area-inset-bottom)); padding:10px 14px; background:rgba(11,11,12,.97); border-top:1px solid var(--bd); display:flex; align-items:center; gap:10px; z-index:25; }
.cnt-foot .prog{ flex:1; font-size:13px; color:var(--mut); line-height:1.3; }
.cnt-bar{ height:4px; background:#29292f; border-radius:99px; overflow:hidden; margin-top:6px; }.cnt-bar i{ display:block; height:100%; background:var(--lar); border-radius:inherit; transition:width .2s; }
@media(max-width:520px){ .cnt-item{ padding:13px }.cnt-row{ align-items:stretch }.cnt-row .un{ min-width:64px; display:flex; align-items:center }.cnt-row input.qt{ min-width:0; padding:13px 8px }.cnt-row .ig{ padding:10px 9px }.cnt-session{ grid-template-columns:1fr }.cnt-save{ text-align:left } }

/* Titan Inventory — layout operacional */
:root{ --surface:#141416; --surface2:#1b1b1f; --line:#2b2b31; --accent-soft:rgba(255,122,24,.12); }
header{ height:64px; padding:0 24px; }
header::after{ content:'TITAN INVENTORY'; font-size:10px; letter-spacing:1.8px; color:var(--mut); margin-right:auto; }
main{ width:100%; max-width:1480px; margin:0 auto; padding:28px 32px 104px; }
.vhead{ margin-bottom:18px; }
h2.tit{ font-size:28px; letter-spacing:-.7px; }
.searchbar{ top:64px; padding:0 0 14px; }
.product-toolbar{ display:flex; align-items:center; gap:10px; }
.product-toolbar .btn{ white-space:nowrap; }
.product-summary{ color:var(--mut); font-size:13px; margin:-9px 2px 14px; }
.plist{ display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:10px; }
.prow.product-row{ min-height:92px; padding:15px 16px; border-radius:15px; background:linear-gradient(145deg,var(--surface),#111113); transition:border-color .16s,transform .16s,background .16s; }
.prow.product-row:hover{ border-color:#45454d; transform:translateY(-1px); background:var(--surface2); }
.product-icon{ width:40px; height:40px; flex:0 0 40px; display:grid; place-items:center; border-radius:12px; background:var(--accent-soft); color:var(--lar); font-size:17px; font-weight:800; }
.product-meta{ display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
.meta-pill{ font-size:10px; color:#b9b9c1; background:#202025; border:1px solid #2c2c33; padding:3px 7px; border-radius:999px; }
.kpi{ min-height:106px; padding:18px; background:linear-gradient(145deg,var(--surface),#111113); }
.kpi .v{ font-size:32px; }

.product-modal{ z-index:80; padding:18px; align-items:center; }
.product-modal .box{ padding:0; width:min(980px,100%); max-width:980px; max-height:94vh; border-radius:20px; overflow:hidden; background:#111113; box-shadow:0 28px 90px rgba(0,0,0,.55); }
.editor-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding:22px 24px 16px; border-bottom:1px solid var(--line); }
.editor-head h3{ font-size:22px; margin:0; letter-spacing:-.4px; }
.editor-head p{ margin:5px 0 0; color:var(--mut); font-size:13px; }
.icon-btn{ width:36px; height:36px; border:1px solid var(--line); border-radius:10px; background:var(--surface2); color:var(--tx); cursor:pointer; font-size:20px; }
.editor-tabs{ display:flex; gap:4px; padding:10px 18px; border-bottom:1px solid var(--line); overflow-x:auto; }
.editor-tab{ border:0; background:transparent; color:var(--mut); border-radius:9px; padding:9px 13px; font-size:13px; font-weight:700; white-space:nowrap; cursor:pointer; }
.editor-tab.on{ color:#fff; background:var(--accent-soft); box-shadow:inset 0 0 0 1px rgba(255,122,24,.28); }
.editor-body{ padding:22px 24px 26px; overflow:auto; max-height:calc(94vh - 190px); }
.editor-pane{ display:none; }.editor-pane.on{ display:block; }
.form-grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:15px; }
.form-grid .span2{ grid-column:1/-1; }
.label{ display:flex; flex-direction:column; gap:7px; color:#b5b5bd; font-size:12px; font-weight:650; }
.label .field{ margin:0; background:#19191d; padding:12px 13px; }
.help{ color:var(--mut); font-size:11px; line-height:1.45; font-weight:400; }
.switch-grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
.switch-card{ display:flex; align-items:flex-start; gap:10px; padding:13px; border:1px solid var(--line); border-radius:12px; background:#17171a; }
.switch-card input{ width:20px; height:20px; accent-color:var(--lar); }
.switch-card b{ display:block; font-size:13px; }.switch-card small{ color:var(--mut); font-size:11px; }
.sector-grid{ display:flex; flex-wrap:wrap; gap:8px; }
.sector-chip{ border:1px solid var(--line); background:#19191d; color:#bbb; padding:9px 12px; border-radius:10px; cursor:pointer; }
.sector-chip.on{ border-color:var(--lar); color:#fff; background:var(--accent-soft); }
.stock-readout{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px; border:1px solid var(--line); border-radius:14px; background:linear-gradient(120deg,var(--accent-soft),transparent); margin-bottom:18px; }
.stock-readout strong{ display:block; font-size:28px; }.stock-readout small{ color:var(--mut); }
.norm-readout{ padding:14px 16px; border:1px solid var(--line); border-radius:12px; background:linear-gradient(120deg,var(--accent-soft),transparent); font-size:13px; line-height:1.7; }
.norm-readout b{ font-weight:700; }
.hist-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; }
.hist-grid > div{ padding:10px 12px; border:1px solid var(--line); border-radius:10px; }
.hist-grid small{ display:block; color:var(--mut); font-size:11px; margin-bottom:3px; }
.hist-grid b{ font-size:15px; }
.preset-row{ display:flex; flex-wrap:wrap; gap:6px; margin:6px 0 2px; }
.sugestao-wrap{ margin-top:4px; }
.sugestao-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:8px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:6px; font-size:13px; }
.badge-rev{ display:inline-block; padding:1px 8px; border-radius:999px; background:#7a3b00; color:#ffd9a6; font-size:11px; font-weight:700; vertical-align:middle; }
.recipe-table{ width:100%; border-collapse:separate; border-spacing:0 7px; }
.recipe-table th{ color:var(--mut); font-size:10px; text-transform:uppercase; letter-spacing:.6px; text-align:left; padding:0 7px; }
.recipe-table td{ padding:7px; background:#19191d; }.recipe-table td:first-child{ border-radius:10px 0 0 10px; }.recipe-table td:last-child{ border-radius:0 10px 10px 0; }
.recipe-table .field{ margin:0; padding:10px; min-width:90px; }
.recipe-empty{ border:1px dashed #34343b; border-radius:13px; padding:24px; text-align:center; color:var(--mut); }
.editor-foot{ position:sticky; bottom:-26px; display:flex; align-items:center; gap:10px; padding:14px 0 0; margin-top:20px; background:linear-gradient(transparent,#111113 12%); }
.editor-foot .status{ flex:1; color:var(--mut); font-size:12px; }
.editor-foot .btn{ width:auto; }

@media(min-width:1050px){
  #app{ padding-left:224px; }
  header{ position:fixed; left:224px; right:0; }
  main{ padding-top:92px; }
  nav{ top:0; right:auto; width:224px; bottom:0; flex-direction:column; justify-content:flex-start; align-items:stretch; padding:92px 14px 20px; border-top:0; border-right:1px solid var(--bd); background:#0e0e10; }
  nav::before{ content:'GESTÃO'; color:#606068; font-size:10px; letter-spacing:1.5px; padding:0 12px 10px; }
  nav button{ flex:0 0 auto; flex-direction:row; justify-content:flex-start; gap:12px; padding:11px 12px; border-radius:10px; font-size:13px; }
  nav button .ic{ width:22px; font-size:17px; }
  nav button.on{ background:var(--accent-soft); }
  .kpis{ grid-template-columns:repeat(3,1fr); }
}
@media(max-width:700px){
  header{ height:58px; padding:0 14px; } header::after{ display:none; }
  main{ padding:18px 14px 94px; } h2.tit{ font-size:23px; }
  .plist{ display:flex; }.product-toolbar .secondary-action{ display:none; }
  .product-modal{ padding:0; align-items:flex-end; }
  .product-modal .box{ max-height:97vh; border-radius:18px 18px 0 0; }
  .editor-head{ padding:18px 16px 14px; }.editor-tabs{ padding:9px 10px; }.editor-body{ padding:18px 16px 22px; max-height:calc(97vh - 178px); }
  .form-grid,.switch-grid{ grid-template-columns:1fr; }.form-grid .span2{ grid-column:auto; }
  .recipe-wrap{ overflow-x:auto; }.recipe-table{ min-width:620px; }
}
</style>
</head>
<body>

<div id="login">
  <img src="/logo.png" alt="Premium Pizzas" onerror="this.style.display='none'">
  <h1>Estoque Premium RP</h1>
  <p class="mut sm">Acesso da equipe</p>
  <div class="card">
    <div id="stepUser">
      <input id="usuario" class="field" placeholder="Usuário (ex: thiago)" autocapitalize="off" autocomplete="username">
      <button class="btn primary" onclick="irPin()">Continuar</button>
    </div>
    <div id="stepPin" class="hide">
      <div class="sm mut" style="margin-bottom:4px">Usuário: <b id="uEcho"></b></div>
      <input id="pin" class="field" placeholder="PIN" inputmode="numeric" type="password" autocomplete="current-password">
      <button class="btn primary" onclick="entrar()">Entrar</button>
      <button class="btn ghost" style="margin-top:8px" onclick="voltarUser()">Voltar</button>
    </div>
    <p id="lgErr" class="err"></p>
  </div>
  <div class="poweredby">🔒 Powered by Titan Atende</div>
</div>

<div id="app" class="hide">
  <header>
    <img src="/logo.png" class="logo" alt="Premium" onerror="this.style.display='none'">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="who"><b id="hNome"></b><br><span id="hPerfil"></span></div>
      <button class="btn ghost sm" onclick="sair()">Sair</button>
    </div>
  </header>
  <main>
    <section id="v-inicio">
      <div class="vhead"><h2 class="tit">Visão do dia</h2></div>
      <div class="kpis" id="kpis"></div>
      <div class="sec">Últimas contagens</div>
      <div class="panel" id="ultContagens"><div class="empty">—</div></div>
      <div class="sec">Últimas compras</div>
      <div class="panel" id="ultCompras"><div class="empty">—</div></div>
    </section>

    <section id="v-produtos" class="hide">
      <div class="vhead"><div><h2 class="tit">Produtos</h2></div><div class="product-toolbar"><button class="btn ghost sm secondary-action" onclick="gerenciarCategorias()">Categorias</button><button class="btn ghost sm secondary-action" onclick="gerenciarConversoes()">Conversões</button><button class="btn ghost sm secondary-action" onclick="gerenciarLocais()">Locais</button><button class="btn primary sm" onclick="novoProduto()">+ Novo produto</button></div></div>
      <div id="prodSummary" class="product-summary">Carregando cadastro…</div>
      <div class="searchbar">
        <input id="busca" class="field" placeholder="Buscar produto…" oninput="buscaDebounce()">
        <div class="chips" id="chipsCat"></div>
      </div>
      <div class="plist" id="plist"><div class="empty">Carregando…</div></div>
    </section>

    <section id="v-fornecedores" class="hide">
      <div class="vhead"><h2 class="tit">Fornecedores</h2><button class="btn primary sm" onclick="novoFornecedor()">+ Novo</button></div>
      <div class="plist" id="flist"><div class="empty">Carregando…</div></div>
    </section>

    <section id="v-contagem" class="hide">
      <div id="contWrap"></div>
    </section>

    <section id="v-mais" class="hide">
      <div id="maisWrap"></div>
    </section>
  </main>

  <nav id="nav">
    <button data-v="inicio" class="on" onclick="nav('inicio')"><span class="ic">🏠</span>Início</button>
    <button data-v="produtos" onclick="nav('produtos')"><span class="ic">📦</span>Produtos</button>
    <button data-v="contagem" onclick="nav('contagem')"><span class="ic">📝</span>Contagem</button>
    <button data-v="fornecedores" onclick="nav('fornecedores')"><span class="ic">🏪</span>Fornec.</button>
    <button data-v="mais" onclick="nav('mais')"><span class="ic">⋯</span>Mais</button>
  </nav>
</div>

<div id="toast"></div>

<div class="modal" id="mPin"><div class="box">
  <h3 style="margin:0 0 4px">Defina seu PIN</h3>
  <p class="mut sm" style="margin:0 0 10px">Primeiro acesso: crie um PIN de 4 a 6 dígitos só seu.</p>
  <input id="np1" class="field" placeholder="Novo PIN" inputmode="numeric" type="password">
  <input id="np2" class="field" placeholder="Repita o PIN" inputmode="numeric" type="password">
  <p id="mPinErr" class="err"></p>
  <button class="btn primary" onclick="confirmaPin()">Salvar e entrar</button>
</div></div>

<script>
const API = location.origin;
const $ = id => document.getElementById(id);
let user = null, _pinCtx = null, _cats = [], _forns = [], _conversoes = [], _locais = [], _catSel = '', _prodMap = {}, _fornMap = {};

function toast(t){ const e=$('toast'); e.textContent=t; e.classList.add('on'); clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove('on'),2600); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function fmt(n){ n=Number(n); return Number.isInteger(n)? n : Number(n.toFixed(2)); }
function brl(n,dec){ if(n==null||n===''||!isFinite(Number(n))) return '—'; return 'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:dec||2}); }
document.addEventListener('focusin', e=>{ if(e.target.matches('input,select,textarea')){ setTimeout(()=>{ try{ e.target.scrollIntoView({block:'center',behavior:'smooth'});}catch(_){} },250); } });

function irPin(){ const u=$('usuario').value.trim(); if(!u){ $('lgErr').textContent='Digite o usuário.'; return; }
  $('uEcho').textContent=u; $('lgErr').textContent=''; $('stepUser').classList.add('hide'); $('stepPin').classList.remove('hide'); setTimeout(()=>$('pin').focus(),80); }
function voltarUser(){ $('stepPin').classList.add('hide'); $('stepUser').classList.remove('hide'); $('pin').value=''; $('lgErr').textContent=''; }
async function entrar(){ const login=$('usuario').value.trim(), pin=$('pin').value.trim(); $('lgErr').textContent='';
  if(!pin){ $('lgErr').textContent='Digite o PIN.'; return; }
  let d; try{ d=await (await fetch(API+'/api/staff/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,pin})})).json(); }
  catch(e){ $('lgErr').textContent='Falha de conexão.'; return; }
  if(d.erro){ $('lgErr').textContent=d.erro; return; }
  if(d.must_change){ _pinCtx={login:(d.usuario&&d.usuario.login)||login, pinAtual:pin}; $('mPin').classList.add('on'); setTimeout(()=>$('np1').focus(),80); return; }
  abrirApp(d.usuario); }
async function confirmaPin(){ const a=$('np1').value.replace(/\D/g,''), b=$('np2').value.replace(/\D/g,''); $('mPinErr').textContent='';
  if(a.length<4){ $('mPinErr').textContent='O PIN precisa ter 4 a 6 dígitos.'; return; }
  if(a!==b){ $('mPinErr').textContent='Os PINs não conferem.'; return; }
  let d; try{ d=await (await fetch(API+'/api/staff/trocar-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:_pinCtx.login,pin_atual:_pinCtx.pinAtual,pin_novo:a})})).json(); }
  catch(e){ $('mPinErr').textContent='Falha de conexão.'; return; }
  if(d.erro){ $('mPinErr').textContent=d.erro; return; }
  $('mPin').classList.remove('on');
  const r=await (await fetch(API+'/api/staff/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:_pinCtx.login,pin:a})})).json();
  if(r.usuario) abrirApp(r.usuario); else toast('PIN trocado. Entre de novo.'); }

function abrirApp(u){ user=u; try{ localStorage.setItem('est_u', JSON.stringify(u)); }catch(e){}
  $('login').classList.add('hide'); $('app').classList.remove('hide');
  $('hNome').textContent=u.nome||u.login||'—'; $('hPerfil').textContent=(u.perfil||'').toString().toLowerCase();
  carregarPerms(); nav('inicio'); }
function sair(){ try{ localStorage.removeItem('est_u'); }catch(e){} user=null; location.reload(); }
function temPerm(p){ if(!user) return false; if(ehGestor()) return true; return (user.perms||[]).includes(p); }
async function carregarPerms(){ if(ehGestor()){ aplicaNavPerms(); return; }
  try{ const d=await (await fetch(API+'/api/est/permissoes?usuario_id='+encodeURIComponent(user.id))).json(); user.perms=d.perms||[]; }catch(e){ user.perms=[]; }
  aplicaNavPerms(); }
const NAV_PERM={ produtos:'acessar_produtos', contagem:'acessar_contagem', fornecedores:'acessar_fornecedores' };
function maisVisivel(){ return ehGestor() || temPerm('acessar_lancamentos')||temPerm('acessar_lista_compras_inteligente')||temPerm('acessar_visitas')||temPerm('acessar_mapa_comparativo_fornecedores')||temPerm('acessar_producao_interna')||temPerm('acessar_configuracoes')||temPerm('editar_permissoes'); }
function aplicaNavPerms(){ document.querySelectorAll('#nav button').forEach(b=>{ const v=b.dataset.v; let show=true; if(NAV_PERM[v]) show=temPerm(NAV_PERM[v]); if(v==='mais') show=maisVisivel(); b.style.display=show?'':'none'; }); }

function nav(v){ const need=NAV_PERM[v]; if(need&&!temPerm(need)) v='inicio'; if(v==='mais'&&!maisVisivel()) v='inicio';
  ['inicio','produtos','contagem','fornecedores','mais'].forEach(x=> $('v-'+x).classList.toggle('hide', x!==v));
  document.querySelectorAll('#nav button').forEach(b=> b.classList.toggle('on', b.dataset.v===v));
  window.scrollTo(0,0);
  if(v==='inicio') loadInicio(); if(v==='produtos') loadProdutos(); if(v==='fornecedores') loadFornecedores(); if(v==='contagem') loadContagem(); if(v==='mais') loadMais(); }

async function loadInicio(){ if(!ehGestor()) return loadInicioColab();
  let d; try{ d=await (await fetch(API+'/api/est/dashboard')).json(); }catch(e){ return; }
  const k=(v,l,cls='')=>`<div class="kpi ${cls}"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  $('kpis').innerHTML = k(d.produtos_ativos,'Produtos ativos')
    + k(d.zerados,'Zerados', d.zerados>0?'bad':'ok')
    + k(d.abaixo_ideal,'Abaixo do ideal', d.abaixo_ideal>0?'alert':'ok')
    + k(d.sem_fornecedor,'Sem fornecedor', d.sem_fornecedor>0?'alert':'')
    + k(d.contagens_aguardando,'Contagens p/ auditar', d.contagens_aguardando>0?'alert':'')
    + k(d.fornecedores,'Fornecedores');
  const uc=d.ultimas_contagens||[]; $('ultContagens').innerHTML = uc.length? uc.map(c=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(c.setor_nome||'—')}</b><small>${esc(c.usuario_nome||'')} · ${esc(c.status_auditoria||'')}</small></div></div>`).join('') : '<div class="empty">Nenhuma contagem ainda.</div>';
  const cp=d.ultimas_compras||[]; $('ultCompras').innerHTML = cp.length? cp.map(c=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(c.fornecedor||'—')}</b><small>${esc(c.usuario_nome||'')}</small></div><div class="qt"><span class="big">R$ ${Number(c.total||0).toFixed(2)}</span></div></div>`).join('') : '<div class="empty">Nenhuma compra ainda.</div>';
}
async function loadInicioColab(){
  const sec=$('v-inicio');
  let d; try{ d=await (await fetch(API+'/api/est/meus-itens?usuario_id='+encodeURIComponent(user.id))).json(); }catch(e){ d={itens:[]}; }
  const itens=d.itens||[]; const byS={}; itens.forEach(i=>{ (byS[i.setor||'—']=byS[i.setor||'—']||[]).push(i); });
  let h=`<div class="vhead"><h2 class="tit">Olá, ${esc((user.nome||user.login||'').split(' ')[0])}</h2></div>`;
  h+=`<button class="btn primary" style="width:100%;margin:0 0 16px" onclick="nav('contagem')">📝 Fazer contagem</button>`;
  if(!itens.length){ h+='<div class="empty">Você ainda não tem itens de setor atribuídos. Peça ao gestor para definir seu setor.</div>'; }
  else { for(const s of Object.keys(byS).sort()){ h+=`<div class="sec">${esc(s)}</div><div class="panel">`+byS[s].map(i=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(i.nome)}</b><small>${esc(i.unidade||'')}</small></div><div class="qt"><span class="big">${fmt(i.estoque_atual)}</span></div></div>`).join('')+'</div>'; } }
  sec.innerHTML=h;
}

let _bt=null;
function buscaDebounce(){ clearTimeout(_bt); _bt=setTimeout(loadProdutos,300); }
async function ensureCats(){ if(!_cats.length){ try{ _cats=(await (await fetch(API+'/api/est/categorias')).json()).categorias||[]; }catch(e){} } }
async function ensureForns(){ if(!_forns.length){ try{ _forns=(await (await fetch(API+'/api/est/fornecedores')).json()).fornecedores||[]; }catch(e){} } }
async function ensureConversoes(force){ if(force)_conversoes=[]; if(!_conversoes.length){ try{ _conversoes=(await (await fetch(API+'/api/est/conversoes')).json()).conversoes||[]; }catch(e){} } }
async function ensureLocais(force){ if(force)_locais=[]; if(!_locais.length){ try{ _locais=(await (await fetch(API+'/api/est/locais')).json()).locais||[]; }catch(e){} } }
async function loadProdutos(){
  await ensureCats(); renderChips();
  const busca=encodeURIComponent($('busca').value.trim()); const cat=encodeURIComponent(_catSel);
  let d; try{ const r=await fetch(API+`/api/est/produtos?busca=${busca}&categoria=${cat}`); d=await r.json(); if(!r.ok) throw new Error(d.erro||'Falha ao carregar'); }catch(e){ $('plist').innerHTML='<div class="empty">Não foi possível carregar os produtos.</div>'; return; }
  const ps=d.produtos||[]; _prodMap={}; ps.forEach(p=>_prodMap[p.id]=p);
  const ativos=ps.filter(p=>p.ativo).length, baixos=ps.filter(p=>p.ativo&&p.estoque_ideal!=null&&Number(p.estoque_atual)<Number(p.estoque_ideal)).length;
  $('prodSummary').textContent=`${ps.length} produto${ps.length===1?'':'s'} encontrado${ps.length===1?'':'s'} · ${ativos} ativos · ${baixos} abaixo do ideal`;
  $('plist').innerHTML = ps.length? ps.map(p=>{
    const at=Number(p.estoque_atual||0), id=p.estoque_ideal!=null?Number(p.estoque_ideal):null;
    let tag=''; if(!p.ativo) tag='<span class="tag off">inativo</span>'; else if(at===0) tag='<span class="tag zero">zerado</span>'; else if(id!=null&&at<id) tag='<span class="tag low">abaixo</span>'; else tag='<span class="tag ok">ok</span>';
    return `<div class="prow product-row" onclick="editarProduto(${p.id})"><div class="product-icon">${p.pode_produzir?'⚙':'#'}</div><div class="nm"><b>${esc(p.nome)}</b><small>${esc(p.categoria||'Sem categoria')} · ${esc(p.fornecedor||'sem fornecedor')}</small><div class="product-meta">${p.pode_produzir?'<span class="meta-pill">ficha técnica</span>':''}${p.pode_comprar?'<span class="meta-pill">comprável</span>':''}${p.pode_contar?'<span class="meta-pill">contável</span>':''}</div></div>
      <div class="qt">${tag}<div class="big">${fmt(at)} <span class="mut xs">${esc(p.unidade||'')}</span></div><div class="mut xs">ideal ${id!=null?fmt(id):'—'}</div></div></div>`;
  }).join('') : '<div class="empty">Nenhum produto encontrado com esses filtros.</div>';
}
function renderChips(){ const all=[{nome:''}].concat(_cats);
  $('chipsCat').innerHTML = all.map(c=>`<button class="chip ${(_catSel===c.nome)?'on':''}" onclick="selCat('${(c.nome||'').replace(/'/g,"\\'")}')">${c.nome||'Todas'}</button>`).join(''); }
function selCat(c){ _catSel=c; renderChips(); loadProdutos(); }

async function loadFornecedores(){ let d; try{ d=await (await fetch(API+'/api/est/fornecedores')).json(); }catch(e){ return; }
  _forns=d.fornecedores||[]; _fornMap={}; _forns.forEach(f=>_fornMap[f.id]=f);
  $('flist').innerHTML = _forns.length? _forns.map(f=>`<div class="prow" onclick="editarFornecedor(${f.id})"><div class="nm"><b>${esc(f.nome)}</b><small>${esc(f.whatsapp||f.tipo||'—')}</small></div><div class="qt">${f.ativo?'':'<span class="tag off">inativo</span>'}</div></div>`).join('') : '<div class="empty">Sem fornecedores.</div>';
}

/* ===== CRUD ===== */
async function estFetch(path,method,body){ const r=await fetch(API+path,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({usuario_id:user&&user.id},body||{}))});
  const j=await r.json().catch(()=>({})); if(!r.ok){ toast(j.erro||('Erro '+r.status)); throw new Error(j.erro||r.status); } return j; }

async function novoProduto(){ abrirEditorProduto(null); }
async function editarProduto(id){ abrirEditorProduto(id); }
function campoProduto(p){ return [
  {key:'nome',label:'Nome',value:p.nome||''},
  {key:'categoria_id',label:'Categoria',type:'select',value:p.categoria_id||'',opts:[{v:'',t:'—'}].concat(_cats.map(c=>({v:c.id,t:c.nome})))},
  {key:'unidade',label:'Unidade (ex: KG, UNIDADE, CAIXA)',value:p.unidade||''},
  {key:'estoque_ideal',label:'Estoque ideal',type:'number',value:p.estoque_ideal!=null?p.estoque_ideal:''},
  {key:'estoque_minimo',label:'Estoque mínimo',type:'number',value:p.estoque_minimo!=null?p.estoque_minimo:''},
  {key:'fornecedor_preferido_id',label:'Fornecedor preferido',type:'select',value:p.fornecedor_preferido_id||'',opts:[{v:'',t:'—'}].concat(_forns.map(f=>({v:f.id,t:f.nome})))},
  {key:'pode_contar',label:'Aparece na contagem',type:'check',value:p.pode_contar!==false},
  {key:'pode_comprar',label:'Pode ser comprado',type:'check',value:p.pode_comprar!==false},
  {key:'pode_produzir',label:'Produzido internamente',type:'check',value:!!p.pode_produzir},
  {key:'observacoes',label:'Observações',type:'textarea',value:p.observacoes||''},
]; }

async function novoFornecedor(){ const v=await pedirForm('Novo fornecedor', campoForn({})); if(!v) return;
  await estFetch('/api/est/fornecedor','POST',v); toast('Fornecedor criado'); loadFornecedores(); }
async function editarFornecedor(id){ const f=_fornMap[id]; if(!f) return;
  const v=await pedirForm('Editar fornecedor', campoForn(f), 'Salvar', true);
  if(v==='__del__'){ if(await pedirConfirm('Excluir fornecedor','Inativar “'+f.nome+'”?')){ await estFetch('/api/est/fornecedor/'+id,'DELETE'); toast('Fornecedor inativado'); loadFornecedores(); } return; }
  if(!v) return; await estFetch('/api/est/fornecedor/'+id,'PATCH',v); toast('Fornecedor salvo'); loadFornecedores(); }
function campoForn(f){ return [
  {key:'nome',label:'Nome',value:f.nome||''},
  {key:'tipo',label:'Tipo (ex: Atacado, Distribuidor)',value:f.tipo||''},
  {key:'whatsapp',label:'WhatsApp / telefone',value:f.whatsapp||''},
  {key:'endereco',label:'Endereço',value:f.endereco||''},
  {key:'observacoes',label:'Observações',type:'textarea',value:f.observacoes||''},
]; }

/* ===== modais dinâmicos ===== */
function pedirForm(titulo,campos,okLabel='Criar',comExcluir=false){ return new Promise(resolve=>{
  const ov=document.createElement('div'); ov.className='modal on';
  const fields=campos.map(c=>{
    if(c.type==='select') return `<label class="flabel">${c.label}<select data-k="${c.key}" class="field">${c.opts.map(o=>`<option value="${o.v}" ${String(c.value)===String(o.v)?'selected':''}>${esc(o.t)}</option>`).join('')}</select></label>`;
    if(c.type==='check') return `<label class="fcheck"><input type="checkbox" data-k="${c.key}" ${c.value?'checked':''}> ${c.label}</label>`;
    if(c.type==='textarea') return `<label class="flabel">${c.label}<textarea data-k="${c.key}" class="field" rows="2">${esc(c.value)}</textarea></label>`;
    return `<label class="flabel">${c.label}<input data-k="${c.key}" class="field" type="${c.type||'text'}" inputmode="${c.type==='number'?'decimal':'text'}" value="${c.value!=null?esc(c.value):''}"></label>`;
  }).join('');
  const delBtn = comExcluir? '<button class="btn danger" data-act="del">Excluir</button>' : '';
  ov.innerHTML=`<div class="box"><h3 style="margin:0 0 6px">${titulo}</h3><div class="fgrid">${fields}</div>
    <div class="mfoot"><button class="btn ghost" data-act="cancel">Cancelar</button>${delBtn}<button class="btn primary" data-act="ok">${okLabel}</button></div></div>`;
  ov.querySelector('[data-act="cancel"]').onclick=()=>{ document.body.removeChild(ov); resolve(null); };
  if(comExcluir) ov.querySelector('[data-act="del"]').onclick=()=>{ document.body.removeChild(ov); resolve('__del__'); };
  ov.querySelector('[data-act="ok"]').onclick=()=>{ const out={}; ov.querySelectorAll('[data-k]').forEach(el=>{ let v= el.type==='checkbox'?el.checked:el.value; if(el.tagName==='SELECT'&&v==='')v=null; out[el.dataset.k]=v; }); if(!String(out.nome||'').trim()){ toast('Informe o nome'); return; } document.body.removeChild(ov); resolve(out); };
  document.body.appendChild(ov); const f=ov.querySelector('input,select,textarea'); if(f) setTimeout(()=>f.focus(),60);
}); }
function pedirConfirm(titulo,msg,confirmLabel='Excluir'){ return new Promise(resolve=>{
  const ov=document.createElement('div'); ov.className='modal on'; ov.style.zIndex='120';
  ov.innerHTML=`<div class="box"><h3 style="margin:0 0 6px">${titulo}</h3><p class="mut sm" style="margin:0 0 12px">${msg}</p>
    <div class="mfoot"><button class="btn ghost" data-act="c">Cancelar</button><button class="btn danger" data-act="d">${esc(confirmLabel)}</button></div></div>`;
  ov.querySelector('[data-act="c"]').onclick=()=>{ document.body.removeChild(ov); resolve(false); };
  ov.querySelector('[data-act="d"]').onclick=()=>{ document.body.removeChild(ov); resolve(true); };
  document.body.appendChild(ov);
}); }

/* ===== CONTAGEM POR SETOR ===== */
let _cnt = null, _cntSaveTimers={};
function ehGestor(){ const p=((user&&user.perfil)||'').toUpperCase(); return p==='GESTOR'||p==='GERENTE'; }
function cntHora(v){ if(!v)return 'agora'; try{return new Intl.DateTimeFormat('pt-BR',{hour:'2-digit',minute:'2-digit'}).format(new Date(v));}catch(e){return 'agora';} }
async function loadContagem(){ const w=$('contWrap'); if(_cnt){ renderContagem(); return; }
  w.innerHTML='<div class="vhead"><h2 class="tit">Contagem por setor</h2></div><div class="empty">Carregando…</div>';
  let setores=[]; try{ setores=(await (await fetch(API+'/api/est/setores')).json()).setores||[]; }catch(e){}
  setores=setores.filter(s=>s.ativo!==false);
  if(!ehGestor()){ const sp=((user&&user.setores_permitidos)||[]).map(String); if(!sp.includes('TUDO')) setores=setores.filter(s=> sp.includes(String(s.id))||sp.includes(s.nome)); }
  let aud=0; try{ aud=((await (await fetch(API+'/api/est/contagens?aguardando=1')).json()).contagens||[]).length; }catch(e){}
  let h='<div class="vhead"><h2 class="tit">Contagem por setor</h2></div>';
  if(temPerm('acessar_auditoria')) h+=`<div class="audit-banner" onclick="abrirAuditorias()"><span>⏳ ${aud} aguardando auditoria</span><span>Auditar ›</span></div>`;
  h+='<p class="mut sm" style="margin:0 0 10px">Escolha o setor. O valor <b>0</b> é válido (item contado e zerado).</p>';
  h+=setores.map(s=>`<button class="setor-btn" onclick="iniciarContagem(${s.id})"><span>${esc(s.nome)}</span><span>Contar ›</span></button>`).join('')||'<div class="empty">Sem setores.</div>';
  w.innerHTML=h; }
async function iniciarContagem(setorId){ try{ const d=await estFetch('/api/est/contagem/iniciar','POST',{setor_id:setorId}); _cnt=Object.assign({},d.contagem,{itens:d.itens||[]}); renderContagem(); if(d.retomada)toast('Contagem em andamento retomada'); }catch(e){} }
function renderContagem(){ const w=$('contWrap');
  let h=`<div class="vhead"><h2 class="tit">${esc(_cnt.setor_nome)}</h2><button class="btn ghost sm" onclick="cancelarContagem()">Sair</button></div>`;
  h+=`<div class="cnt-session"><div><div class="live">Contagem em andamento</div><b>${esc(_cnt.usuario_nome||user.nome||user.login||'Colaborador')}</b><small>Iniciada automaticamente às ${cntHora(_cnt.iniciada_em)}</small></div><div class="cnt-save" id="cntSave">Dados salvos</div></div><div id="cntList" style="padding-bottom:130px">`;
  const fixos=_cnt.itens.filter(x=>!x.geral), gerais=_cnt.itens.filter(x=>x.geral);
  h+=fixos.map(cntItemHTML).join('');
  if(gerais.length){ h+=`<div class="cnt-div">📋 Contagem geral de hoje <small>${gerais.length} ${gerais.length===1?'item':'itens'} extras</small></div>`+gerais.map(cntItemHTML).join(''); }
  h+='</div>';
  h+=`<div class="cnt-foot"><div class="prog" id="cntProg"></div><button class="btn primary sm" onclick="encerrarContagem()">Encerrar</button></div>`;
  w.innerHTML=h; atualizaProg(); }
function cntItemHTML(it){ const val=it.quantidade!=null?it.quantidade:''; const ign=it.status==='IGNORADO';
  return `<div class="cnt-item ${it.status==='CONTADO'?'done':''}" id="ci-${it.id}"><div class="top"><span class="pn">${esc(it.produto_nome)}</span>${it.obrigatorio?'<span class="ob">obrigatório</span>':''}</div>
  <div class="cnt-row"><span class="un">${esc(it.unidade||'')}</span><input class="field qt" inputmode="decimal" placeholder="0" aria-label="Quantidade de ${esc(it.produto_nome)}" value="${val}" data-it="${it.id}" oninput="onQtd('${it.id}')" ${ign?'disabled':''}>${it.obrigatorio?'':`<button class="ig ${ign?'on':''}" onclick="toggleIgnora('${it.id}')">ignorar</button>`}</div></div>`; }
function itById(id){ return _cnt.itens.find(x=>String(x.id)===String(id)); }
function onQtd(id){ const it=itById(id); const el=document.querySelector(`input[data-it="${id}"]`); const v=el.value.trim().replace(',','.');
  const n=Number(v); if(v===''||!Number.isFinite(n)||n<0){ it.quantidade=null; it.status='PENDENTE'; } else { it.quantidade=v; it.status='CONTADO'; }
  el.setCustomValidity(v!==''&&(!Number.isFinite(n)||n<0)?'Informe uma quantidade válida':'');
  $('ci-'+id).classList.toggle('done', it.status==='CONTADO'); atualizaProg(); agendaSalvarCnt(id); }
function agendaSalvarCnt(id,agora=false){ clearTimeout(_cntSaveTimers[id]); const run=async()=>{const it=itById(id),st=$('cntSave');if(!it)return;if(st)st.textContent='Salvando…';try{await estFetch('/api/est/contagem/'+_cnt.id+'/item/'+id,'PATCH',{quantidade:it.quantidade,status:it.status,observacao:it.observacao});if(st)st.textContent='Dados salvos';}catch(e){if(st)st.textContent='Falha ao salvar';}};_cntSaveTimers[id]=setTimeout(run,agora?0:500);}
function toggleIgnora(id){ const it=itById(id); it.status=it.status==='IGNORADO'?'PENDENTE':'IGNORADO'; if(it.status==='IGNORADO') it.quantidade=null; renderContagem(); agendaSalvarCnt(id,true); }
function atualizaProg(){ const tot=_cnt.itens.length, cont=_cnt.itens.filter(x=>x.status==='CONTADO').length, obr=_cnt.itens.filter(x=>x.obrigatorio&&x.status==='PENDENTE').length;

function cancelarContagem(){ _cnt=null; loadContagem(); }
async function encerrarContagem(){ const obr=_cnt.itens.filter(x=>x.obrigatorio&&x.status==='PENDENTE').length; if(obr){ toast('Faltam '+obr+' obrigatório(s)'); return; }

let _cfgSetor=null, _cfgItens=[], _cfgSetores=[];
async function cfgListaSetores(){ const w=$('maisWrap'); let setores=[]; try{ setores=(await (await fetch(API+'/api/est/setores')).json()).setores||[]; }catch(e){}

async function novoSetorCfg(){ const v=await pedirForm('Novo setor',[{key:'nome',label:'Nome do setor',value:''},{key:'ordem',label:'Ordem de exibição',type:'number',value:50}], 'Criar setor'); if(!v)return;

async function toggleSetorCfg(){ if(!_cfgSetor)return; const ativar=_cfgSetor.ativo===false; const ok=ativar||await pedirConfirm('Desativar setor','O setor deixa de aparecer para contagem, mas histórico e vínculos ficam preservados.','Desativar'); if(!ok)return;

async function cfgAbrirSetor(id){ const s=_cfgSetores.find(x=>Number(x.id)===Number(id))||{id,nome:'Setor',ordem:50,ativo:true}; _cfgSetor={id:s.id,nome:s.nome,ordem:s.ordem,ativo:s.ativo!==false};
  $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">${esc(_cfgSetor.nome)}</h2><button class="btn ghost sm" onclick="cfgListaSetores()">Voltar</button></div><div class="empty">Carregando…</div>`;
  let its=[]; try{ its=(await (await fetch(API+`/api/est/setor/${id}/config`)).json()).itens||[]; }catch(e){}
  _cfgItens=its.map(x=>({produto_id:x.produto_id,nome:x.nome,categoria:x.categoria,no_setor:x.no_setor,obrigatorio:x.obrigatorio})); renderCfg(); }
function renderCfg(){ let cur=null, body='';
  _cfgItens.forEach(it=>{ if(it.categoria!==cur){ cur=it.categoria; body+=`<div class="sec">${esc(cur||'Sem categoria')}</div>`; }
    body+=`<div class="cnt-item" style="margin-bottom:6px"><div class="cnt-row" style="margin-top:0">
      <label class="fcheck" style="margin:0;flex:1"><input type="checkbox" ${it.no_setor?'checked':''} onchange="cfgTog(${it.produto_id})"> ${esc(it.nome)}</label>
      <button class="ig ${it.obrigatorio?'on':''}" onclick="cfgObr(${it.produto_id})" ${it.no_setor?'':'disabled'}>obrig.</button></div></div>`; });
  const sel=_cfgItens.filter(x=>x.no_setor).length;
  $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">${esc(_cfgSetor.nome)}</h2><button class="btn ghost sm" onclick="cfgListaSetores()">Voltar</button></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"><button class="btn ghost sm" onclick="editarSetorCfg()">Editar nome/ordem</button><button class="btn ${_cfgSetor.ativo===false?'primary':'danger'} sm" onclick="toggleSetorCfg()">${_cfgSetor.ativo===false?'Reativar setor':'Desativar setor'}</button></div>
    ${_cfgSetor.ativo===false?'<div class="empty" style="margin-bottom:10px">Setor inativo: não aparece para o colaborador contar, mas pode ser reativado.</div>':''}
    <div style="padding-bottom:90px">${body||'<div class="empty">Sem produtos.</div>'}</div>
    <div class="cnt-foot"><div class="prog">${sel} produto(s) no setor</div><button class="btn primary sm" onclick="salvarCfg()">Salvar</button></div>`; }
function cfgItem(id){ return _cfgItens.find(x=>x.produto_id===id); }
function cfgTog(id){ const it=cfgItem(id); it.no_setor=!it.no_setor; if(!it.no_setor) it.obrigatorio=false; renderCfg(); }
function cfgObr(id){ const it=cfgItem(id); if(!it.no_setor) return; it.obrigatorio=!it.obrigatorio; renderCfg(); }
async function salvarCfg(){ const itens=_cfgItens.filter(x=>x.no_setor).map(x=>({produto_id:x.produto_id,obrigatorio:x.obrigatorio}));
  try{ await estFetch(`/api/est/setor/${_cfgSetor.id}/config`,'POST',{itens}); toast('Setor configurado ('+itens.length+' itens)'); cfgListaSetores(); }catch(e){} }

let _allProds=[], _conf=null;
async function ensureAllProds(){ if(!_allProds.length){ try{ _allProds=(await (await fetch(API+'/api/est/produtos')).json()).produtos||[]; }catch(e){} } }
function matchProduto(txt){ if(!txt) return ''; const t=String(txt).toLowerCase(); let best=''; for(const p of _allProds){ const n=p.nome.toLowerCase(); if(n===t) return p.id; if(n.includes(t)||t.includes(n)){ best=best||p.id; } } return best; }
function matchFornecedor(nome){ if(!nome) return ''; const t=String(nome).toLowerCase(); for(const f of _forns){ const n=f.nome.toLowerCase(); if(n.includes(t)||t.includes(n)) return f.id; } return ''; }
async function comprasTela(){ const w=$('maisWrap');
  w.innerHTML=`<div class="vhead"><h2 class="tit">Compras</h2><button class="btn ghost sm" onclick="loadMais()">Voltar</button></div>
   <div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn primary" onclick="abrirCamera()">📷 Foto da nota</button><button class="btn ghost" onclick="novaCompraManual()">✏️ Manual</button></div>
   <div class="sec">Últimas compras</div><div class="plist" id="compList"><div class="empty">Carregando…</div></div>`;
  let cs=[]; try{ cs=((await (await fetch(API+'/api/est/compras')).json()).compras)||[]; }catch(e){}
  $('compList').innerHTML=cs.length? cs.map(c=>`<div class="prow" style="cursor:default"><div class="nm"><b>${esc(c.fornecedor||'—')}</b><small>${esc(c.usuario_nome||'')} · ${c.itens||0} itens${c.data_compra?' · '+esc(c.data_compra):''}</small></div><div class="qt"><span class="big">R$ ${Number(c.total||0).toFixed(2)}</span></div></div>`).join('') : '<div class="empty">Nenhuma compra ainda.</div>'; }
function abrirCamera(){ const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment'; inp.onchange=()=>{ if(inp.files&&inp.files[0]) onFotoNota(inp.files[0]); }; inp.click(); }
function downscaleImg(file){ return new Promise((resolve,reject)=>{ const fr=new FileReader(); fr.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=1024; let w=img.width,h=img.height; if(w>h&&w>max){ h=Math.round(h*max/w); w=max; } else if(h>=w&&h>max){ w=Math.round(w*max/h); h=max; } const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); resolve(cv.toDataURL('image/jpeg',0.6)); }; img.onerror=reject; img.src=fr.result; }; fr.onerror=reject; fr.readAsDataURL(file); }); }
async function onFotoNota(file){ toast('Lendo a nota… aguarde'); let dataUrl; try{ dataUrl=await downscaleImg(file); }catch(e){ toast('Erro ao abrir a imagem'); return; }
  let d; try{ d=await estFetch('/api/est/compra/foto','POST',{image:dataUrl}); }catch(e){ return; }
  await ensureAllProds(); await ensureForns();
  if(!(d.itens&&d.itens.length)) toast('Nota lida, mas confira/adicione os itens');
  conferenciaCompra(d.itens||[], d.fornecedor||'', d.data||''); }
async function novaCompraManual(){ await ensureAllProds(); await ensureForns(); conferenciaCompra([],'',''); }
function conferenciaCompra(itens, fornNome, data){
  _conf={ fornecedor_id: matchFornecedor(fornNome)||'', data:data||'', linhas:(itens.length?itens:[{}]).map(it=>({ _txt:it.produto||'', produto_id:matchProduto(it.produto||''), marca:it.marca||'', quantidade:it.quantidade!=null?it.quantidade:'', unidade:it.unidade||'', valor_unitario:it.valor_unitario!=null?it.valor_unitario:'', valor_total:it.valor_total!=null?it.valor_total:'' })) };
  renderConf(); }
function renderConf(){ const rows=_conf.linhas.map((l,i)=>confRowHTML(l,i)).join('');
  $('maisWrap').innerHTML=`<div class="vhead"><h2 class="tit">Conferir compra</h2><button class="btn ghost sm" onclick="comprasTela()">Voltar</button></div>
   <label class="flabel">Fornecedor<select class="field" onchange="_conf.fornecedor_id=this.value">${[{id:'',nome:'—'}].concat(_forns).map(f=>`<option value="${f.id}" ${String(_conf.fornecedor_id)===String(f.id)?'selected':''}>${esc(f.nome)}</option>`).join('')}</select></label>
   <label class="flabel">Data<input type="date" class="field" value="${esc(_conf.data)}" onchange="_conf.data=this.value"></label>
   <div class="sec">Itens</div><div style="padding-bottom:96px">${rows}<button class="btn ghost sm" onclick="confAddRow()">+ Adicionar item</button></div>
   <div class="cnt-foot"><div class="prog" id="confProg"></div><button class="btn primary sm" onclick="confirmarCompra()">Confirmar</button></div>`;
  confProg(); }
function confRowHTML(l,i){ const opts=[{id:'',nome:'— escolher produto —'}].concat(_allProds);
  return `<div class="cnt-item" style="margin-bottom:8px">${l._txt?`<div class="xs mut" style="margin-bottom:4px">Nota: “${esc(l._txt)}”</div>`:''}
   <select class="field" onchange="confSet(${i},'produto_id',this.value)">${opts.map(p=>`<option value="${p.id}" ${String(l.produto_id)===String(p.id)?'selected':''}>${esc(p.nome)}</option>`).join('')}</select>
   <div class="cnt-row"><input class="field" style="flex:1" inputmode="decimal" placeholder="qtd" value="${esc(l.quantidade)}" onchange="confSet(${i},'quantidade',this.value)"><input class="field" style="flex:1" placeholder="unid" value="${esc(l.unidade)}" onchange="confSet(${i},'unidade',this.value)"></div>
   <div class="cnt-row"><input class="field" style="flex:1" inputmode="decimal" placeholder="R$ unit" value="${esc(l.valor_unitario)}" onchange="confSet(${i},'valor_unitario',this.value)"><input class="field" style="flex:1" inputmode="decimal" placeholder="R$ total" value="${esc(l.valor_total)}" onchange="confSet(${i},'valor_total',this.value)"></div>
   <div class="cnt-row"><input class="field" style="flex:1" placeholder="marca" value="${esc(l.marca)}" onchange="confSet(${i},'marca',this.value)"><button class="ig" onclick="confDel(${i})">remover</button></div></div>`; }
function confSet(i,k,v){ _conf.linhas[i][k]=v; if(k!=='produto_id'&&k!=='unidade'&&k!=='marca') confProg(); }
function confAddRow(){ _conf.linhas.push({}); renderConf(); }
function confDel(i){ _conf.linhas.splice(i,1); renderConf(); }
function confProg(){ const tot=_conf.linhas.reduce((s,l)=>{ const q=parseFloat(String(l.quantidade).replace(',','.'))||0; let vt=parseFloat(String(l.valor_total).replace(',','.')); if(isNaN(vt)){ const vu=parseFloat(String(l.valor_unitario).replace(',','.'))||0; vt=vu*q; } return s+(vt||0); },0);
  const el=$('confProg'); if(el) el.innerHTML='Total: <b>R$ '+tot.toFixed(2)+'</b>'; }
async function confirmarCompra(){ const linhas=_conf.linhas.filter(l=>l.produto_id).map(l=>({produto_id:Number(l.produto_id),marca:l.marca,quantidade:String(l.quantidade).replace(',','.'),unidade:l.unidade,valor_unitario:String(l.valor_unitario).replace(',','.'),valor_total:String(l.valor_total).replace(',','.')}));
  if(!linhas.length){ toast('Escolha o produto de cada item'); return; }
  try{ await estFetch('/api/est/compra','POST',{fornecedor_id:_conf.fornecedor_id||null,data_compra:_conf.data||null,itens:linhas}); toast('Compra lançada — estoque atualizado'); comprasTela(); }catch(e){} }

function renderVisita(){ const st=['','Tem','Não tem','Costuma ter','Às vezes','Marca parecida','Não verificado'];

function peTab(tab){ document.querySelectorAll('.editor-tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===tab)); document.querySelectorAll('.editor-pane').forEach(x=>x.classList.toggle('on',x.dataset.pane===tab)); }
function peClose(){ const m=$('productEditor'); if(m)m.remove(); }
function peToggleSetor(btn){ btn.classList.toggle('on'); _pe.selecionados=[...document.querySelectorAll('.sector-chip.on')].map(x=>Number(x.dataset.sid)); }
function peSyncRecipe(){ document.querySelectorAll('#peRecipeRows tr').forEach(tr=>{ const r=_pe.ficha[Number(tr.dataset.i)]; if(!r)return; r.insumo_produto_id=tr.querySelector('[data-k="insumo"]').value; r.quantidade=tr.querySelector('[data-k="qtd"]').value; r.unidade=tr.querySelector('[data-k="unidade"]').value; r.observacao=tr.querySelector('[data-k="obs"]').value; }); }
function peRenderRecipe(){ const body=$('peRecipeRows'); if(!body)return; const productOpts=sel=>'<option value="">— escolha —</option>'+_pe.produtos.filter(x=>x.ativo!==false).map(x=>`<option value="${x.id}" ${String(sel||'')===String(x.id)?'selected':''}>${esc(x.nome)}</option>`).join('');
  body.innerHTML=_pe.ficha.map((r,i)=>`<tr data-i="${i}"><td><select class="field" data-k="insumo">${productOpts(r.insumo_produto_id)}</select></td><td><input class="field" data-k="qtd" inputmode="decimal" value="${r.quantidade!=null?esc(r.quantidade):''}" placeholder="0"></td><td><input class="field" data-k="unidade" value="${esc(r.unidade||'')}" placeholder="g, ml, un"></td><td><input class="field" data-k="obs" value="${esc(r.observacao||'')}" placeholder="opcional"></td><td><button class="icon-btn" onclick="peRemoveRecipe(${i})" title="Remover">×</button></td></tr>`).join('');
  $('peRecipeEmpty').classList.toggle('hide',_pe.ficha.length>0); $('peFichaCount').textContent=_pe.ficha.length; }
function peAddRecipe(){ peSyncRecipe(); _pe.ficha.push({insumo_produto_id:'',quantidade:'',unidade:'',observacao:''}); if($('peProduzir'))$('peProduzir').checked=true; peRenderRecipe(); }
function peRemoveRecipe(i){ peSyncRecipe(); _pe.ficha.splice(i,1); peRenderRecipe(); }
function peNum(id){ const v=($(id).value||'').trim().replace(',','.'); return v===''?null:Number(v); }
// Marca a conversão como editada manualmente (o gestor mexeu na base/fator deste produto).
function peConvManual(){ _pe.conversao=_pe.conversao||{}; _pe.conversao.origem='manual'; }
// Sugestões da categoria do produto (ex.: hortifruti). Mostradas SÓ se a categoria casar — nunca de outra.
function peRenderSugestoes(){ const wrap=$('peSugestoes'); if(!wrap)return;
  const catId=$('peCategoria')&&$('peCategoria').value; const cat=_cats.find(c=>String(c.id)===String(catId)); const nome=cat?cat.nome:'';
  const list=(_conversoes||[]).filter(c=>c.ativo!==false && nome && c.categoria_ref===nome);
  if(!list.length){ wrap.innerHTML=''; return; }
  wrap.innerHTML=`<div class="sec">Sugestões da categoria “${esc(nome)}” — confirmar</div>`+list.map(c=>{
    const ftxt=c.fator!=null?`1 ${esc(c.unidade_compra||'')} = ${fmt(c.fator)} ${esc(c.unidade_base||'g')}`:'fator a confirmar';
    const rev=c.precisa_revisao?' <span class="badge-rev">precisa revisão</span>':'';
    return `<div class="sugestao-row"><div><b>${esc(c.rotulo)}</b> · ${ftxt}${rev}</div><button type="button" class="btn ghost sm" onclick="peAplicarSugestao(${c.id})">Aplicar</button></div>`;
  }).join('');
}
function peAplicarSugestao(id){ const c=(_conversoes||[]).find(x=>x.id===id); if(!c)return;
  if(c.unidade_compra&&$('peUnidade'))$('peUnidade').value=String(c.unidade_compra).toUpperCase();
  if($('peUnidadeBase'))$('peUnidadeBase').value=c.unidade_base||'g';
  if($('pePeso'))$('pePeso').value=c.fator!=null?c.fator:'';
  if($('peRevisao'))$('peRevisao').checked=!!c.precisa_revisao;
  _pe.conversao={origem:'default_categoria',confianca:c.confianca||null,precisa_revisao:!!c.precisa_revisao};
  peNormaliza(); }
// Mostra a normalização: base, fator e preço derivado — usando o fator DESTE produto. Sem fator
// confirmado (ou "precisa revisão"), não deriva preço; nada é inventado.
function peNormaliza(){ const out=$('peNormReadout'); if(!out)return;
  const unidade=(($('peUnidade')&&$('peUnidade').value)||'').trim().toUpperCase()||'UNIDADE';
  const base=(($('peUnidadeBase')&&$('peUnidadeBase').value)||'').trim();
  const fator=Number(((($('pePeso')&&$('pePeso').value)||'').replace(',','.')));
  const revisao=!!($('peRevisao')&&$('peRevisao').checked);
  const p=_pe.produto||{}; const conv=_pe.conversao||{}; const preco=p.medio_valor!=null?Number(p.medio_valor):(p.ultimo_valor!=null?Number(p.ultimo_valor):null);
  const grande=base==='g'?'kg':(base==='ml'?'L':''); const linhas=[];
  if(revisao) linhas.push('<span class="badge-rev">precisa revisão</span> confirme o fator desta conversão antes de usar no custo.');
  if(base==='un'){ linhas.push('Base: <b>unidade</b> — item discreto, sem conversão de peso.'); }
  else if(!base){ linhas.push('<span class="mut">Defina a base canônica (g, ml ou un) para ver a normalização.</span>'); }
  else if(fator>0){ linhas.push(`Fator: <b>1 ${esc(unidade)} = ${fmt(fator)} ${base}</b>`); }
  else { linhas.push(`Base: <b>${base}</b> — informe o peso/volume por 1 ${esc(unidade)} para normalizar.`); }
  const podeDerivar = !revisao && fator>0 && base && base!=='un';
  if(preco==null){ linhas.push('<span class="mut">Precificação por medida: <b>—</b> · aguardando 1ª compra (preenchida por Compras/Visitas).</span>'); }
  else if(base==='un' && !revisao){ linhas.push(`Precificação: <b>${brl(preco)}</b> / unidade.`); }
  else if(podeDerivar){ const pb=preco/fator; linhas.push(`Precificação por medida: ${esc(unidade)} <b>${brl(preco)}</b> · /${grande} <b>${brl(pb*1000,2)}</b> · /${base} <b>${brl(pb,4)}</b>`); }
  else { linhas.push('<span class="mut">Precificação por medida: <b>—</b> (sem fator confirmado).</span>'); }
  const meta=[]; if(conv.origem) meta.push('origem: '+esc(conv.origem)); if(conv.confianca) meta.push('confiança: '+esc(conv.confianca));
  if(meta.length) linhas.push('<span class="mut xs">'+meta.join(' · ')+'</span>');
  out.innerHTML=linhas.map(l=>`<div>${l}</div>`).join(''); }
function pePayload(){ _pe.selecionados=[...document.querySelectorAll('.sector-chip.on')].map(x=>Number(x.dataset.sid)); return {nome:$('peNome').value.trim(),categoria_id:$('peCategoria').value||null,subcategoria:$('peSubcategoria').value.trim(),tipo_item:($('peTipoItem')&&$('peTipoItem').value)||null,unidade:$('peUnidade').value.trim().toUpperCase(),marca_preferida:$('peMarca').value.trim(),observacoes:$('peObs').value.trim(),estoque_minimo:peNum('peMin'),estoque_ideal:peNum('peIdeal'),peso_g:peNum('pePeso'),unidade_base:($('peUnidadeBase')&&$('peUnidadeBase').value)||null,conversao_origem:(_pe.conversao&&_pe.conversao.origem)||null,conversao_confianca:(_pe.conversao&&_pe.conversao.confianca)||null,conversao_precisa_revisao:!!($('peRevisao')&&$('peRevisao').checked),fornecedor_preferido_id:$('peFornecedor').value||null,local_fisico_id:($('peLocal')&&$('peLocal').value)||null,pode_contar:$('peContar').checked,pode_comprar:$('peComprar').checked,pode_produzir:$('peProduzir').checked,ativo:$('peAtivo').checked,setores:_pe.selecionados}; }
async function peSave(){ peSyncRecipe(); const b=pePayload(), status=$('peStatus'), btn=$('peSave');
  if(!b.nome){ peTab('geral'); $('peNome').focus(); status.textContent='Informe o nome do produto.'; return; } if(!b.unidade){ peTab('geral'); $('peUnidade').focus(); status.textContent='Informe a unidade de controle.'; return; }
  if((b.estoque_minimo!=null&&!Number.isFinite(b.estoque_minimo))||(b.estoque_ideal!=null&&!Number.isFinite(b.estoque_ideal))){ peTab('estoque'); status.textContent='Revise os valores de estoque.'; return; }
  btn.disabled=true; status.textContent='Validando e salvando…';
  try{ let id=_pe.id; if(!id){ const d=await estFetch('/api/est/produto','POST',b); id=d.id; _pe.id=id; } else await estFetch('/api/est/produto/'+id,'PATCH',b);
    if(b.pode_produzir||_pe.ficha.length){ const rendimento=peNum('peRendimento'); await estFetch('/api/est/produto/'+id+'/ficha','PUT',{rendimento,itens:_pe.ficha.map(r=>({insumo_produto_id:r.insumo_produto_id,quantidade:r.quantidade,unidade:r.unidade,observacao:r.observacao}))}); }
    toast(_pe.produto&&_pe.produto.nome?'Produto atualizado':'Produto criado'); peClose(); await loadProdutos();
  }catch(e){ status.textContent=e.message||'Não foi possível salvar. Revise os campos.'; btn.disabled=false; }
}

  document.body.appendChild(m); }
async function salvarConversao(id){ const categoria_ref=$('conv-cat-'+id).value.trim(), rotulo=$('conv-rot-'+id).value.trim();
  const fatorRaw=$('conv-fat-'+id).value.trim(), rev=$('conv-rev-'+id).checked;
  if(!categoria_ref)return toast('Informe a categoria'); if(!rotulo)return toast('Informe o rótulo');
  if(!rev&&!(Number(fatorRaw.replace(',','.'))>0))return toast('Fator deve ser maior que zero (ou marque revisar)');
  try{ await estFetch('/api/est/conversao/'+id,'PATCH',{categoria_ref,rotulo,unidade_compra:$('conv-uc-'+id).value.trim(),unidade_base:$('conv-base-'+id).value,fator:rev?'':fatorRaw,precisa_revisao:rev}); await ensureConversoes(true); toast('Sugestão atualizada'); }catch(e){} }
async function novaConversao(){ const categoria_ref=$('convNovoCat').value.trim(), rotulo=$('convNovoRotulo').value.trim();
  const fatorRaw=$('convNovoFator').value.trim(), rev=$('convNovoRev').checked;
  if(!categoria_ref)return toast('Informe a categoria'); if(!rotulo)return toast('Informe o rótulo');
  if(!rev&&!(Number(fatorRaw.replace(',','.'))>0))return toast('Fator deve ser maior que zero (ou marque revisar)');
  try{ await estFetch('/api/est/conversao','POST',{categoria_ref,rotulo,unidade_compra:$('convNovoUC').value.trim(),unidade_base:$('convNovoBase').value,fator:rev?'':fatorRaw,precisa_revisao:rev}); await ensureConversoes(true); const m=$('convEditor'); if(m)m.remove(); gerenciarConversoes(); toast('Sugestão criada'); }catch(e){} }
async function excluirConversao(id){ if(!await pedirConfirm('Excluir sugestão','Some das sugestões da categoria. Os produtos mantêm o fator já salvo.'))return; try{ await estFetch('/api/est/conversao/'+id,'DELETE'); await ensureConversoes(true); const m=$('convEditor'); if(m)m.remove(); gerenciarConversoes(); toast('Sugestão excluída'); }catch(e){} }

/* ===== LOCAIS FÍSICOS (onde o item fica guardado) ===== */
function locTipoOpts(cur){ return '<option value="">—</option>'+['seco','refrigerado','congelado','produção','outro'].map(t=>`<option value="${t}" ${cur===t?'selected':''}>${t}</option>`).join(''); }
function locRow(l){ return `<div class="row" style="gap:8px;margin-bottom:8px;align-items:flex-end">
  <label class="label" style="flex:1;margin:0">Nome<input class="field" id="loc-nome-${l.id}" value="${esc(l.nome)}"></label>
  <label class="label" style="width:130px;margin:0">Tipo<select class="field" id="loc-tipo-${l.id}">${locTipoOpts(l.tipo_local)}</select></label>
  <label class="label" style="width:96px;margin:0" title="Aceita itens perecíveis?">Perecíveis<input type="checkbox" id="loc-per-${l.id}" ${l.aceita_pereciveis!==false?'checked':''}></label>
  <button class="btn ghost sm" onclick="salvarLocal(${l.id})">Salvar</button>
  <button class="icon-btn" onclick="excluirLocal(${l.id})" title="Excluir">×</button></div>`; }
async function gerenciarLocais(){ await ensureLocais(true); const m=document.createElement('div'); m.className='modal on product-modal est-modal'; m.id='locEditor';
  m.innerHTML=`<div class="box" style="max-width:720px"><div class="editor-head"><div><h3>Locais físicos</h3><p>Onde o item fica guardado. Aceita a realidade atual — não precisa de organização perfeita.</p></div><button class="icon-btn" onclick="this.closest('.modal').remove()">×</button></div>
  <div class="editor-body"><div id="locRows">${_locais.map(locRow).join('')||'<div class="empty">Nenhum local cadastrado.</div>'}</div>
  <div class="sec">Novo local</div>
  <div class="form-grid"><label class="label">Nome<input class="field" id="locNovoNome" placeholder="Ex.: Geladeira da cozinha"></label>
    <label class="label">Tipo<select class="field" id="locNovoTipo">${locTipoOpts('')}</select></label>
    <label class="switch-card" style="margin:0"><input type="checkbox" id="locNovoPer" checked><span><b>Aceita perecíveis</b><small>Refrigerado/congelado costuma aceitar.</small></span></label></div>
  <button class="btn primary sm" style="margin-top:10px" onclick="novoLocal()">+ Adicionar local</button></div></div>`;
  document.body.appendChild(m); }
async function salvarLocal(id){ const nome=$('loc-nome-'+id).value.trim(); if(!nome)return toast('Informe o nome');
  try{ await estFetch('/api/est/local/'+id,'PATCH',{nome,tipo_local:$('loc-tipo-'+id).value,aceita_pereciveis:$('loc-per-'+id).checked}); await ensureLocais(true); toast('Local atualizado'); }catch(e){} }
async function novoLocal(){ const nome=$('locNovoNome').value.trim(); if(!nome)return toast('Informe o nome');
  try{ await estFetch('/api/est/local','POST',{nome,tipo_local:$('locNovoTipo').value,aceita_pereciveis:$('locNovoPer').checked}); await ensureLocais(true); const m=$('locEditor'); if(m)m.remove(); gerenciarLocais(); toast('Local criado'); }catch(e){} }
async function excluirLocal(id){ if(!await pedirConfirm('Excluir local','Se houver produtos neste local, ele é apenas inativado (histórico preservado).'))return; try{ await estFetch('/api/est/local/'+id,'DELETE'); await ensureLocais(true); const m=$('locEditor'); if(m)m.remove(); gerenciarLocais(); toast('Local removido'); }catch(e){} }

/* mantém logado: restaura sessão ao abrir */
(function(){ try{ const s=localStorage.getItem('est_u'); if(s){ const u=JSON.parse(s); if(u&&u.id) abrirApp(u); } }catch(e){} })();
</script>
