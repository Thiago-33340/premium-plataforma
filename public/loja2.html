<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Premium Pizzas — Peça online</title>
<style>
  :root{ --preto:#0D0D0D; --laranja:#F97316; --laranja2:#fb923c; --branco:#fff; --cinza:#1c1c1e; --cinza2:#2a2a2d; --linha:#3a3a3d; --verde:#22c55e; --txt:#f5f5f5; --mut:#a1a1aa; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--preto); color:var(--txt); padding-bottom:90px; }
  header{ position:sticky; top:0; z-index:30; background:linear-gradient(180deg,#0d0d0d,#0d0d0dee); border-bottom:1px solid var(--linha); padding:12px 16px; display:flex; align-items:center; gap:10px; backdrop-filter:blur(8px); }
  header .logo{ font-weight:800; font-size:18px; letter-spacing:.5px; }
  header .logo b{ color:var(--laranja); }
  header .slogan{ font-size:11px; color:var(--mut); margin-left:auto; }
  .cats{ position:sticky; top:53px; z-index:20; background:#0d0d0d; display:flex; gap:8px; overflow-x:auto; padding:10px 16px; border-bottom:1px solid var(--linha); scrollbar-width:none; }
  .cats::-webkit-scrollbar{ display:none; }
  .cats button{ flex:0 0 auto; background:var(--cinza); color:var(--txt); border:1px solid var(--linha); border-radius:20px; padding:7px 14px; font-size:13px; font-weight:600; }
  .cats button.on{ background:var(--laranja); color:#000; border-color:var(--laranja); }
  .wrap{ padding:16px; max-width:760px; margin:0 auto; }
  h2.cat{ font-size:15px; margin:22px 0 10px; color:var(--laranja); text-transform:uppercase; letter-spacing:1px; }
  .card{ background:var(--cinza); border:1px solid var(--linha); border-radius:14px; padding:14px; margin-bottom:10px; display:flex; gap:12px; align-items:center; }
  .card .info{ flex:1; min-width:0; }
  .card .nome{ font-weight:700; font-size:15px; }
  .card .desc{ font-size:12px; color:var(--mut); margin-top:3px; line-height:1.35; }
  .card .preco{ font-weight:700; color:var(--laranja); margin-top:6px; font-size:14px; }
  .card .badge{ font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; background:#3a2a10; color:var(--laranja2); margin-left:6px; }
  .btn{ background:var(--laranja); color:#000; border:none; border-radius:10px; padding:10px 16px; font-weight:700; font-size:14px; }
  .btn:disabled{ opacity:.4; }
  .btn.ghost{ background:transparent; color:var(--txt); border:1px solid var(--linha); }
  .btn.add{ flex:0 0 auto; border-radius:50%; width:40px; height:40px; font-size:22px; line-height:1; padding:0; }
  .esgotado{ opacity:.5; }
  .esgotado .add{ background:var(--cinza2); color:var(--mut); }
  /* modal */
  .modal{ position:fixed; inset:0; z-index:50; background:#000a; display:none; align-items:flex-end; justify-content:center; }
  .modal.on{ display:flex; }
  .sheet{ background:#141416; width:100%; max-width:760px; max-height:92vh; border-radius:18px 18px 0 0; display:flex; flex-direction:column; animation:up .22s ease; }
  @keyframes up{ from{ transform:translateY(40px); opacity:.6 } }
  .sheet header{ position:static; background:#141416; border-bottom:1px solid var(--linha); }
  .sheet .body{ overflow-y:auto; padding:16px; flex:1; }
  .sheet .foot{ border-top:1px solid var(--linha); padding:12px 16px; display:flex; gap:10px; align-items:center; }
  .pizzaviz{ width:120px; height:120px; margin:0 auto 14px; display:block; }
  .grupo{ margin:18px 0 6px; }
  .grupo .gtit{ font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; }
  .grupo .greq{ font-size:11px; color:var(--mut); font-weight:500; }
  .grupo .gpill{ font-size:10px; font-weight:700; color:#000; background:var(--laranja); border-radius:6px; padding:1px 7px; }
  .opt{ display:flex; align-items:center; gap:10px; padding:11px 12px; border:1px solid var(--linha); border-radius:11px; margin-top:8px; background:var(--cinza); }
  .opt.sel{ border-color:var(--laranja); background:#241a0e; }
  .opt .on{ flex:1; min-width:0; }
  .opt .onome{ font-weight:600; font-size:14px; }
  .opt .odesc{ font-size:11px; color:var(--mut); margin-top:2px; }
  .opt .opreco{ font-size:13px; color:var(--laranja2); font-weight:700; white-space:nowrap; }
  .opt.lock{ opacity:.45; }
  .stepper{ display:flex; align-items:center; gap:8px; }
  .stepper button{ width:30px; height:30px; border-radius:8px; border:1px solid var(--linha); background:var(--cinza2); color:#fff; font-size:18px; font-weight:700; }
  .check{ width:22px; height:22px; border-radius:6px; border:2px solid var(--linha); flex:0 0 auto; }
  .opt.sel .check{ background:var(--laranja); border-color:var(--laranja); position:relative; }
  .opt.sel .check::after{ content:"✓"; color:#000; font-size:15px; font-weight:900; position:absolute; inset:0; text-align:center; line-height:18px; }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .chip{ background:var(--laranja); color:#000; font-weight:700; font-size:12px; border-radius:20px; padding:5px 10px; display:flex; gap:6px; align-items:center; }
  .chip b{ cursor:pointer; }
  /* carrinho */
  .cartbar{ position:fixed; bottom:0; left:0; right:0; z-index:40; background:var(--laranja); color:#000; display:none; align-items:center; justify-content:space-between; padding:14px 18px; font-weight:800; }
  .cartbar.on{ display:flex; }
  .citem{ border-bottom:1px solid var(--linha); padding:12px 0; }
  .citem .cn{ font-weight:700; }
  .citem .cd{ font-size:12px; color:var(--mut); margin-top:3px; }
  .citem .cr{ display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
  .field{ width:100%; background:var(--cinza); border:1px solid var(--linha); color:#fff; border-radius:10px; padding:12px; font-size:15px; margin-top:8px; }
  .seg{ display:flex; gap:8px; margin-top:8px; }
  .seg button{ flex:1; background:var(--cinza); border:1px solid var(--linha); color:#fff; border-radius:10px; padding:11px; font-weight:600; }
  .seg button.on{ background:var(--laranja); color:#000; border-color:var(--laranja); }
  .toast{ position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#000; border:1px solid var(--laranja); color:#fff; padding:10px 18px; border-radius:30px; z-index:60; font-weight:600; font-size:13px; opacity:0; transition:.25s; pointer-events:none; }
  .toast.on{ opacity:1; }
  .muted{ color:var(--mut); font-size:13px; }
  .row{ display:flex; gap:10px; } .row>*{ flex:1; }
</style>
</head>
<body>
<header>
  <div class="logo">PREMIUM <b>PIZZAS</b></div>
  <div class="slogan">COM AMOR ❤️ — SJRP</div>
</header>
<div class="cats" id="cats"></div>
<div class="wrap" id="catalogo"><p class="muted">Carregando cardápio…</p></div>

<div class="cartbar" id="cartbar" onclick="abrirCarrinho()">
  <span id="cartqtd">0 itens</span>
  <span id="carttot">R$ 0,00</span>
  <span>Ver carrinho →</span>
</div>

<!-- modal builder -->
<div class="modal" id="modal">
  <div class="sheet">
    <header><div class="logo" id="mTitulo">Produto</div><button class="btn ghost" style="margin-left:auto;padding:6px 12px" onclick="fecharModal()">✕</button></header>
    <div class="body" id="mBody"></div>
    <div class="foot">
      <div class="stepper"><button onclick="qtdDelta(-1)">−</button><span id="mQtd" style="min-width:24px;text-align:center;font-weight:700">1</span><button onclick="qtdDelta(1)">+</button></div>
      <button class="btn" id="mAdd" style="flex:1" onclick="addAoCarrinho()">Adicionar • R$ 0,00</button>
    </div>
  </div>
</div>

<!-- modal carrinho/checkout -->
<div class="modal" id="cart">
  <div class="sheet">
    <header><div class="logo">Seu pedido</div><button class="btn ghost" style="margin-left:auto;padding:6px 12px" onclick="fecharCarrinho()">✕</button></header>
    <div class="body" id="cBody"></div>
    <div class="foot"><button class="btn" style="flex:1" id="cGo" onclick="irCheckout()">Continuar</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = location.origin;
const BRL = v => 'R$ ' + Number(v||0).toFixed(2).replace('.',',');
let CAT=[], cart=[], build=null;

async function carregar(){
  try{
    const r = await fetch(API+'/api/catalogo'); const d = await r.json();
    CAT = (d.categorias||[]).filter(c=>c.produtos && c.produtos.length);
    render();
  }catch(e){ document.getElementById('catalogo').innerHTML='<p class="muted">Não foi possível carregar o cardápio. Tente novamente.</p>'; }
}
function render(){
  const cats=document.getElementById('cats'); cats.innerHTML='';
  CAT.forEach((c,i)=>{ const b=document.createElement('button'); b.textContent=c.nome; if(i===0)b.className='on';
    b.onclick=()=>{ document.querySelectorAll('.cats button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); document.getElementById('cat_'+c.id).scrollIntoView({behavior:'smooth',block:'start'}); };
    cats.appendChild(b); });
  const el=document.getElementById('catalogo'); el.innerHTML='';
  CAT.forEach(c=>{
    const h=document.createElement('h2'); h.className='cat'; h.id='cat_'+c.id; h.textContent=c.nome; el.appendChild(h);
    c.produtos.forEach(p=>{
      const falta = p.status==='EM_FALTA';
      const card=document.createElement('div'); card.className='card'+(falta?' esgotado':'');
      const precoTxt = p.tipo==='MONTAVEL' ? ('a partir de '+BRL(precoBaseMontavel(p))) : (p.gratuito?'Cortesia':BRL(p.preco_base));
      card.innerHTML = `<div class="info"><div class="nome">${p.nome}${falta?'<span class="badge">indisponível</span>':''}</div>
        ${p.descricao?`<div class="desc">${p.descricao}</div>`:''}
        <div class="preco">${precoTxt}</div></div>`;
      const add=document.createElement('button'); add.className='btn add'; add.textContent='+'; add.disabled=falta;
      add.onclick=()=> p.tipo==='MONTAVEL' ? abrirBuilder(p) : addSimples(p);
      card.appendChild(add); el.appendChild(card);
    });
  });
}
// menor preço possível de um montável = base + menores obrigatórios
function precoBaseMontavel(p){
  let t=Number(p.preco_base||0);
  (p.grupos||[]).forEach(g=>{ if(g.min>0){ const ativos=g.opcoes.filter(o=>o.status==='ATIVO'); if(!ativos.length)return;
    const menor=Math.min(...ativos.map(o=>Number(o.preco||0))); t += menor * g.min; } });
  return t;
}

/* ---------- BUILDER ---------- */
function abrirBuilder(p){
  build={ produto:p, qtd:1, sel:{} };   // sel[grupoId] = [opcao,...]
  (p.grupos||[]).forEach(g=> build.sel[g.id]=[]);
  document.getElementById('mTitulo').textContent=p.nome;
  document.getElementById('mQtd').textContent='1';
  renderBuilder();
  document.getElementById('modal').classList.add('on');
}
function fecharModal(){ document.getElementById('modal').classList.remove('on'); build=null; }
function grupoVisivel(g){
  const cond=g.condicao&&g.condicao.mostrar_se; if(!cond) return true;
  const p=build.produto; const gref=(p.grupos||[]).find(x=>x.nome===cond.grupo); if(!gref) return true;
  const escolhido=(build.sel[gref.id]||[])[0];
  if(!escolhido) return false;
  if(cond.diferente_de!=null) return escolhido.nome!==cond.diferente_de;
  if(cond.igual_a!=null) return escolhido.nome===cond.igual_a;
  return true;
}
function renderBuilder(){
  const p=build.produto, b=document.getElementById('mBody'); b.innerHTML='';
  b.appendChild(pizzaViz());
  (p.grupos||[]).forEach(g=>{
    if(!grupoVisivel(g)){ build.sel[g.id]=[]; return; }
    const wrap=document.createElement('div'); wrap.className='grupo';
    const n=(build.sel[g.id]||[]).length;
    const req = g.min>0 ? `obrigatório · ${n}/${g.max}` : `opcional · até ${g.max}`;
    wrap.innerHTML=`<div class="gtit">${g.nome} <span class="greq">(${req})</span></div>`;
    // chips para grupo com repetição (sabores)
    if(g.repete && g.max>1){
      const chips=document.createElement('div'); chips.className='chips';
      (build.sel[g.id]||[]).forEach((o,i)=>{ const c=document.createElement('span'); c.className='chip'; c.innerHTML=`${o.nome} <b data-i="${i}">✕</b>`;
        c.querySelector('b').onclick=()=>{ build.sel[g.id].splice(i,1); renderBuilder(); }; chips.appendChild(c); });
      if((build.sel[g.id]||[]).length) wrap.appendChild(chips);
    }
    g.opcoes.filter(o=>o.status!=='OCULTO').forEach(o=>{
      const falta=o.status==='EM_FALTA';
      const arr=build.sel[g.id]||[];
      const isSel = arr.some(x=>x.id===o.id);
      const div=document.createElement('div'); div.className='opt'+(isSel&&!(g.repete&&g.max>1)?' sel':'')+(falta?' lock':'');
      const precoTxt = Number(o.preco)>0 ? '+ '+BRL(o.preco) : (g.nome.toLowerCase().includes('sabor')&&p.nome.includes('Grande')?'':'');
      let right;
      if(g.repete && g.max>1){ // sabores: botão adicionar
        right = `<button class="btn" style="padding:6px 12px" ${falta||arr.length>=g.max?'disabled':''}>+ ${o.nome.length>0?'':''}add</button>`;
        div.innerHTML=`<div class="on"><div class="onome">${o.nome}${falta?' · esgotado':''}</div>${o.descricao?`<div class="odesc">${o.descricao}</div>`:''}</div><div class="opreco">${Number(o.preco)>0?BRL(o.preco)+'/metade':''}</div>`;
        const bt=document.createElement('button'); bt.className='btn'; bt.style.cssText='padding:8px 12px;flex:0 0 auto'; bt.textContent='Adicionar'; bt.disabled=falta||arr.length>=g.max;
        bt.onclick=()=>{ if(arr.length<g.max){ arr.push(o); renderBuilder(); } };
        div.appendChild(bt);
      } else if(g.max===1){ // single
        div.innerHTML=`<div class="check"></div><div class="on"><div class="onome">${o.nome}${falta?' · esgotado':''}</div>${o.descricao?`<div class="odesc">${o.descricao}</div>`:''}</div><div class="opreco">${precoTxt}</div>`;
        if(!falta) div.onclick=()=>{ build.sel[g.id]=[o]; renderBuilder(); };
      } else { // multi sem repetição (adicionais/extras/recheio)
        div.innerHTML=`<div class="check"></div><div class="on"><div class="onome">${o.nome}${falta?' · esgotado':''}</div>${o.descricao?`<div class="odesc">${o.descricao}</div>`:''}</div><div class="opreco">${precoTxt}</div>`;
        if(!falta) div.onclick=()=>{ const a=build.sel[g.id]; const k=a.findIndex(x=>x.id===o.id);
          if(k>=0) a.splice(k,1); else if(a.length<g.max) a.push(o); renderBuilder(); };
      }
      wrap.appendChild(div);
    });
    b.appendChild(wrap);
  });
  // total + validade
  const tot=calcBuild(); const ok=buildValido();
  const btn=document.getElementById('mAdd'); btn.textContent=`Adicionar • ${BRL(tot)}`; btn.disabled=!ok;
}
function pizzaViz(){
  const p=build.produto; const sg=(p.grupos||[]).find(g=>g.nome.toLowerCase().includes('sabor'));
  const sab = sg? (build.sel[sg.id]||[]) : [];
  const a=sab[0]?sab[0].nome:'', b=sab[1]?sab[1].nome:(sab[0]?sab[0].nome:'');
  const div=document.createElement('div'); div.style.textAlign='center';
  div.innerHTML=`<svg class="pizzaviz" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="46" fill="#2a2118" stroke="#F97316" stroke-width="3"/>
    <path d="M50 6 A44 44 0 0 1 50 94 Z" fill="${sab[1]?'#3a2a14':'#2a2118'}"/>
    <line x1="50" y1="6" x2="50" y2="94" stroke="#F97316" stroke-width="1.5" opacity="${sab.length>1?1:0}"/>
    <text x="50" y="52" text-anchor="middle" font-size="9" fill="#fff" opacity=".85">${sab.length?'🍕':'🍕'}</text>
  </svg>
  <div class="muted" style="margin-top:-6px">${sab.length? (sab.length>1? a+' / '+b : a) : 'Monte sua pizza'}</div>`;
  return div;
}
function calcBuild(){ let t=Number(build.produto.preco_base||0);
  Object.values(build.sel).forEach(arr=>arr.forEach(o=>t+=Number(o.preco||0))); return t*build.qtd; }
function buildValido(){
  return (build.produto.grupos||[]).every(g=>{ if(!grupoVisivel(g)) return true; const n=(build.sel[g.id]||[]).length; return n>=g.min && n<=g.max; });
}
function qtdDelta(d){ if(!build)return; build.qtd=Math.max(1,build.qtd+d); document.getElementById('mQtd').textContent=build.qtd; renderBuilder(); }
function addAoCarrinho(){
  if(!buildValido())return;
  const p=build.produto; const selecoes=[]; const partes=[];
  (p.grupos||[]).forEach(g=>{ if(!grupoVisivel(g))return; (build.sel[g.id]||[]).forEach(o=>{ selecoes.push({grupo:g.nome,nome:o.nome,preco:Number(o.preco||0)}); }); });
  // resumo legível
  (p.grupos||[]).forEach(g=>{ if(!grupoVisivel(g))return; const arr=build.sel[g.id]||[]; if(!arr.length)return;
    partes.push(arr.map(o=>o.nome).join(g.repete?' / ':', ')); });
  cart.push({ tipo:'montavel', produto_id:p.id, nome:p.nome, preco_base:Number(p.preco_base||0), selecoes, quantidade:build.qtd, resumo:partes.join(' · '), unit:calcBuild()/build.qtd });
  fecharModal(); atualizarCart(); toast('Adicionado ao carrinho');
}
function addSimples(p){ const ex=cart.find(c=>c.tipo==='simples'&&c.produto_id===p.id);
  if(ex){ ex.quantidade++; } else cart.push({tipo:'simples',produto_id:p.id,nome:p.nome,preco:Number(p.preco_base||0),quantidade:1,unit:Number(p.preco_base||0),resumo:p.gratuito?'Cortesia':''});
  atualizarCart(); toast(p.nome+' adicionado'); }

/* ---------- CARRINHO ---------- */
function itemTotal(c){ return (c.unit!=null?c.unit:c.preco)*c.quantidade; }
function atualizarCart(){ const q=cart.reduce((s,c)=>s+c.quantidade,0); const t=cart.reduce((s,c)=>s+itemTotal(c),0);
  const bar=document.getElementById('cartbar'); bar.classList.toggle('on',q>0);
  document.getElementById('cartqtd').textContent=q+(q===1?' item':' itens'); document.getElementById('carttot').textContent=BRL(t); }
function abrirCarrinho(){ renderCarrinho(); document.getElementById('cart').classList.add('on'); }
function fecharCarrinho(){ document.getElementById('cart').classList.remove('on'); }
let checkoutStep=0, cliente=null, tipoEntrega='RETIRADA';
function renderCarrinho(){
  checkoutStep=0; const b=document.getElementById('cBody'); b.innerHTML='';
  if(!cart.length){ b.innerHTML='<p class="muted">Carrinho vazio.</p>'; document.getElementById('cGo').style.display='none'; return; }
  document.getElementById('cGo').style.display='block'; document.getElementById('cGo').textContent='Continuar';
  cart.forEach((c,i)=>{ const d=document.createElement('div'); d.className='citem';
    d.innerHTML=`<div class="cn">${c.nome} ${c.resumo?'':''}</div>${c.resumo?`<div class="cd">${c.resumo}</div>`:''}
      <div class="cr"><div class="stepper"><button>−</button><span style="min-width:22px;text-align:center;font-weight:700">${c.quantidade}</span><button>+</button></div>
      <b style="color:var(--laranja)">${BRL(itemTotal(c))}</b></div>`;
    const [minus,plus]=d.querySelectorAll('.stepper button');
    minus.onclick=()=>{ c.quantidade--; if(c.quantidade<=0)cart.splice(i,1); renderCarrinho(); atualizarCart(); };
    plus.onclick=()=>{ c.quantidade++; renderCarrinho(); atualizarCart(); };
    b.appendChild(d); });
  const tot=cart.reduce((s,c)=>s+itemTotal(c),0);
  const f=document.createElement('div'); f.style.cssText='margin-top:14px;font-weight:800;display:flex;justify-content:space-between'; f.innerHTML=`<span>Subtotal</span><span>${BRL(tot)}</span>`; b.appendChild(f);
}
function irCheckout(){
  const b=document.getElementById('cBody');
  if(checkoutStep===0){ // dados
    checkoutStep=1; b.innerHTML=`<div class="muted">Identifique-se (login pelo seu WhatsApp)</div>
      <input class="field" id="ckNome" placeholder="Seu nome" value="${cliente?cliente.nome||'':''}">
      <input class="field" id="ckTel" placeholder="WhatsApp com DDD (ex: 5517999999999)" inputmode="numeric" value="${cliente?cliente.telefone:''}">
      <div style="margin-top:14px" class="muted">Como quer receber?</div>
      <div class="seg" id="segTipo">
        <button data-t="RETIRADA" class="${tipoEntrega==='RETIRADA'?'on':''}">Retirada</button>
        <button data-t="DELIVERY" class="${tipoEntrega==='DELIVERY'?'on':''}">Entrega</button></div>
      <div id="endBox"></div>`;
    b.querySelectorAll('#segTipo button').forEach(x=>x.onclick=()=>{ tipoEntrega=x.dataset.t; b.querySelectorAll('#segTipo button').forEach(y=>y.classList.remove('on')); x.classList.add('on'); endBox(); });
    endBox();
    document.getElementById('cGo').textContent='Revisar e enviar';
  } else { enviar(); }
}
function endBox(){ const e=document.getElementById('endBox'); if(!e)return;
  e.innerHTML = tipoEntrega==='DELIVERY' ? `<input class="field" id="ckEnd" placeholder="Rua, número, bairro">
    <input class="field" id="ckComp" placeholder="Complemento / referência (opcional)">` : ''; }
async function enviar(){
  const nome=(document.getElementById('ckNome')||{}).value||''; const tel=((document.getElementById('ckTel')||{}).value||'').replace(/\D/g,'');
  if(tel.length<12){ toast('Informe um WhatsApp válido com DDD'); return; }
  const go=document.getElementById('cGo'); go.disabled=true; go.textContent='Enviando…';
  try{
    await fetch(API+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telefone:tel,senha:tel,nome})});
    const body={ tipo:tipoEntrega, cliente:{telefone:tel,nome}, itens:cart,
      endereco: tipoEntrega==='DELIVERY'?{linha:(document.getElementById('ckEnd')||{}).value||'',complemento:(document.getElementById('ckComp')||{}).value||''}:null,
      pagamento:{forma:'DIN'}, observacao:'' };
    const r=await fetch(API+'/api/pedidos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.ok){ cart=[]; atualizarCart(); fecharCarrinho(); toast('Pedido enviado! Nº '+(d.pedido.numero||d.pedido.id)); }
    else { toast(d.erro||'Erro ao enviar'); go.disabled=false; go.textContent='Revisar e enviar'; }
  }catch(e){ toast('Falha de conexão'); go.disabled=false; go.textContent='Revisar e enviar'; }
}
let tt; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('on'),2600); }
carregar();
</script>
